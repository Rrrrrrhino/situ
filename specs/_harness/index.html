<script>
const $ = s => document.querySelector(s);
const api = () => window.pywebview.api;
const urlInput=$('#url'), goBtn=$('#go'), levelSel=$('#level'),
      statusEl=$('#status'), hint=$('#hint'), reading=$('#reading'),
      navpill=$('#navpill'), navPos=$('#navPos'), exportBtn=$('#exportBtn'),
      panelEx=$('#panelEx'), panelNb=$('#panelNb'), nbCount=$('#nbCount'),
      tabEx=$('#tabEx'), tabNb=$('#tabNb'), drop=$('#drop'), fileInput=$('#file'),
      ctx=$('#ctx'), pregenChk=$('#pregenChk'), bookmarkBtn=$('#bookmarkBtn'),
      readBtn=$('#readBtn'), player=$('#player'), plPlay=$('#plPlay'), plStop=$('#plStop'),
      plFollow=$('#plFollow'), plClose=$('#plClose'), accentBtn=$('#accentBtn');
/* 首页骨架快照：renderBook/renderArticle 会整个接管 #reading.innerHTML（书模式的翻页条、
   文章模式的正文），离开阅读态回首页时得把 #reading 换回这份原始首页骨架，renderHome() 才有
   #bookWall/#clipBox 可填。之前的 renderShelf 靠 #shelf 还在，其实一直是同一个坑，只是
   document.querySelector 返回 null 时静默 return，没炸出来。 */
const _HOME_SKELETON = reading.innerHTML;

let navOrder=[], curIdx=-1, curEl=null, lastTitle='', lastMeta='', llmOn=false, pregenTimer=null;
let _hoverWarmed=new Set(), _hoverTimer=null;

/* ---------- 书签防误触：窗口刚被点击激活时，这一击不当放置/删除 ----------
   app.py 打了 acceptsFirstMouse 补丁后，激活窗口的那一击会照常落进网页；
   用户点空白只是想切前台，却被当成放书签。窗口 focus 后 450ms 内的放置/
   点线删除一律当"仅激活"处理，直接 return。冷启动第一击同样要防（先初始化
   一次 _winFocusTs，而不是等第一次 focus 事件才有值）。 */
let _winFocusTs=performance.now();
const BK_FOCUS_GUARD_MS=450;
window.addEventListener('focus', ()=>{ _winFocusTs=performance.now(); });

function setStatus(msg,err=false){statusEl.textContent=msg;statusEl.classList.toggle('err',err);statusEl.classList.add('show');}
function clearStatus(){statusEl.classList.remove('show');}
function setBusy(b){goBtn.disabled=b;goBtn.textContent=b?'处理中…':'解析';}

/* ---------- parse ---------- */
async function run(source){
  setBusy(true); clearStatus(); setStatus('① 抽取正文…');
  try{
    const r = await api().process({source, level:levelSel.value});
    if(r.error){ setStatus('❌ '+r.error, true); }
    else if(r.mode==='book'){ renderBook(r); clearStatus(); }
    else { renderArticle(r); clearStatus(); }
  }catch(e){ setStatus('❌ '+(e.message||e), true); }
  finally{ setBusy(false); }
}

/* Load a dropped/picked file by content (data: URL) — see readAndRun. */
async function runFile(name, dataUrl){
  setBusy(true); clearStatus(); setStatus('① 读取文件…');
  try{
    const r = await api().process_file({name, data_url:dataUrl, level:levelSel.value});
    if(r.error){ setStatus('❌ '+r.error, true); }
    else if(r.mode==='book'){ renderBook(r); clearStatus(); }
    else { renderArticle(r); clearStatus(); }
  }catch(e){ setStatus('❌ '+(e.message||e), true); }
  finally{ setBusy(false); }
}

/* Make every word in the title clickable, just like body words: wrap each
   word in <span class="w"> inside a <span class="sent"> that carries the title
   as sentence context. The existing reading-click delegate then explains it. */
function wrapTitleWords(title){
  title = title || '';
  const re=/[A-Za-z]+(?:['’\-][A-Za-z]+)*/g;   // letters, with internal '/- only
  let html='', last=0, m;
  while((m=re.exec(title))){
    if(m.index>last) html+=escapeHtml(title.slice(last,m.index));
    html+=`<span class="w">${escapeHtml(m[0])}</span>`;
    last=re.lastIndex;
  }
  if(last<title.length) html+=escapeHtml(title.slice(last));
  return `<span class="sent" data-sentence="${escapeHtml(title)}">${html}</span>`;
}
/* Fallback for restored archives saved before titles were clickable. */
function enhanceTitle(){
  const h=reading.querySelector('.doc-title');
  if(!h || h.querySelector('.w, .sent')) return;
  const t=(h.textContent||'').trim();
  if(t) h.innerHTML=wrapTitleWords(t);
}

/* 标题下方的来源：若是 http(s) 网址→渲成可点超链接（点击走 open_external 在系统浏览器开原文，
   便于和原文对照）；否则（手动粘贴/纯文本来源）原样显示。 */
function srcMetaHTML(source){
  const s=(source||'').trim();
  if(/^https?:\/\//i.test(s)){
    return '<a class="doc-src-link" href="#" data-href="'+escapeHtml(s)+'" title="在浏览器打开原文">'+escapeHtml(s)+' ↗</a>';
  }
  return escapeHtml(s);
}
function renderArticle(r){
  bookMode=false; reading.classList.remove('book-mode');
  document.body.classList.add('reading'); document.body.classList.remove('book-mode-on');
  llmOn = !!r.llm_enabled;
  lastTitle=r.title; lastMeta=`${r.source} · ${r.total_tokens} 词 · 生词 ${r.vocab_count} 个`;
  // 封面图（og:image）放正文最上方作「特写开场」——已随文章抽取拿到、零 LLM 成本；fetchpriority=high 尽早下载。
  // 加进 DOM 后会自然随 readingSnapshot 写进快照 → 回看该文章时原样恢复（无需改存/取档链路）。
  const coverImg = r.image ? `<img class="doc-cover" src="${escapeHtml(r.image)}" alt="" fetchpriority="high" decoding="async" draggable="false" onerror="this.remove()">` : '';
  reading.innerHTML =
    `<div class="reading-inner">
       ${coverImg}
       <h1 class="doc-title">${wrapTitleWords(r.title)}</h1>
       <div class="doc-meta">${srcMetaHTML(r.source)}　·　${r.total_tokens} 词　·　生词 ${r.vocab_count} 个</div>
       ${r.article_html}
     </div>`;
  buildNav();
  _hoverWarmed.clear();
  stopPlayback();
  exportBtn.style.display=''; bookmarkBtn.style.display=''; readBtn.style.display='';
  refreshNbCount();
  switchTab('ex');
  panelEx.innerHTML='<div class="ex-empty">点正文里任意单词看讲解（蓝色是系统标的生词），<br>或用顶部 ◂ ▸ 逐个浏览生词。</div>';
  reading.scrollTop=0;
  setTimeout(()=>{ _bkPositionSlotA(); _bkSlotIntro('bkSlotA'); }, 60);   // 页缘书签槽跟住正文列 + 开卷提示
  doSave();  // create a library entry for this freshly parsed article
  warmReadAloud();   // pre-download the read-aloud audio so 朗读 starts instantly
  if(!r.llm_enabled){
    setStatus('⚠️ 还没填 API Key，目前只能高亮、无法讲解。点右上角「⚙ 设置」填入即可。', true);
  } else {
    maybePregen();
  }
}

/* ---------- navigation ---------- */
function buildNav(){
  const seen=new Set(); navOrder=[];
  reading.querySelectorAll('mark.vocab, .w.vocab').forEach(m=>{
    const l=m.dataset.lemma; if(l && !seen.has(l)){seen.add(l); navOrder.push(m);}
  });
  curIdx=-1; curEl=null;
  if(navOrder.length){ navpill.classList.add('show'); navPos.textContent=`0 / ${navOrder.length}`; }
  else { navpill.classList.remove('show'); }
}
function rebuildNavKeepCurrent(){
  const curLemma = curEl ? curEl.dataset.lemma : null;
  const seen=new Set(); navOrder=[];
  reading.querySelectorAll('mark.vocab, .w.vocab').forEach(m=>{
    const l=m.dataset.lemma; if(l && !seen.has(l)){seen.add(l); navOrder.push(m);}
  });
  navpill.classList.toggle('show', navOrder.length>0);
  if(curLemma){
    const i=navOrder.findIndex(m=>m.dataset.lemma===curLemma);
    if(i>=0){ curIdx=i; navPos.textContent=`${i+1} / ${navOrder.length}`; }
  }
}
function setCurrent(el, scroll=true){
  if(curEl) curEl.classList.remove('current');
  curEl=el; el.classList.add('current');
  // Only scroll when navigating (◂ ▸ / 回到原文). Plain clicks must NOT move the
  // article — the word is already where the reader is looking.
  if(scroll) el.scrollIntoView({behavior:'smooth', block:'center'});
}
function navTo(idx){
  if(!navOrder.length) return;
  curIdx=(idx+navOrder.length)%navOrder.length;
  const el=navOrder[curIdx];
  setCurrent(el);
  navPos.textContent=`${curIdx+1} / ${navOrder.length}`;
  explain(el);
}

/* ---------- explanation ---------- */
function sentOf(el){ const s=el.closest('.sent'); return s?s.dataset.sentence:''; }

async function explain(el){
  switchTab('ex');
  const isVocab = el.classList.contains('vocab');
  const word = el.dataset.word || el.textContent;
  const lemma = el.dataset.lemma || '';
  const sentence = sentOf(el);
  _panelKey=(lemma||word||'').trim().toLowerCase();   // ④ 面板立刻切走：让上一个词的在途追问 sink 知道自己已不在场
  const myKey=_panelKey;
  panelEx.innerHTML=`<div class="loading"><span class="spinner"></span> 正在讲解 <b>${escapeHtml(word)}</b>…</div>`;
  try{
    const args={word, lemma, sentence, level: el.dataset.level||'', freq: el.dataset.freq||''};
    // D 流式：后端有 explain_word_start 就走「起流 + 轮询渐进渲染」；
    // 没有（老包/harness stub）原样走一次性 explain_word，行为不变。
    const r=await llmCall(async()=>{
      const A=api();
      if(typeof A.explain_word_start!=='function') return A.explain_word(args);
      const s=await A.explain_word_start(args);
      if(!s || s.mode!=='stream') return s && s.result;
      return streamExplainIntoPanel(s, myKey);
    });
    if(!r){ if(_panelKey===myKey) panelEx.innerHTML='<div class="ex-empty">讲解失败，请重试</div>'; return; }
    if(r.ok===false){ if(_panelKey===myKey) panelEx.innerHTML=`<div class="ex-empty">${escapeHtml(r.error||'讲解失败')}</div>`; return; }
    if(_panelKey===myKey) showExplanation(r, {word, sentence});   // 已切去别的词就不抢面板，数据已入缓存/生词本
    prefetchAudio(word);   // pronounce the surface form (transactions / completed), not the lemma
    // If a plain word was clicked, promote it to a colored, navigable vocab word
    if(!isVocab){
      el.classList.add('vocab');
      el.dataset.cat='vocab';
      el.dataset.word=word;
      el.dataset.lemma=r.lemma||word.toLowerCase();
      el.dataset.freq=r.freq_tier||'common';
      if(r.level) el.dataset.level=r.level;
      rebuildNavKeepCurrent();
    }
    refreshNbCount();
    scheduleSave();  // persist updated notebook + highlights
  }catch(e){ panelEx.innerHTML=`<div class="ex-empty">出错：${escapeHtml(''+e)}</div>`; }
}
/* D 流式讲解：轮询 explain_word_poll，把已到的字段渐进渲染进主面板；
   done 后返回与 explain_word 完全同形的最终 result（后续 showExplanation/记账照旧）。
   用户切走（_panelKey 变了）就停止写 DOM，但继续轮询把流收完——结果反正进缓存。 */
async function streamExplainIntoPanel(s, myKey){
  const meta=s.meta||{};
  let lastHtml='';
  for(;;){
    let p;
    try{ p=await api().explain_word_poll({sid:s.sid}); }
    catch(e){ return {ok:false, error:''+e}; }
    if(!p || p.gone) return {ok:false, error:'讲解流已失联，请重试'};
    if(p.done) return p.result;
    if(_panelKey===myKey){
      const html=streamingExplanationHtml(meta, p.fields||{});
      if(html!==lastHtml){ panelEx.innerHTML=html; lastHtml=html; }
    }
    await new Promise(r=>setTimeout(r,150));
  }
}
/* 把流式增量字段拼成与 explanationHtml 同款的面板骨架：字段到哪块渲到哪块，
   尾部挂一条小 spinner 表示还在写。复用 explanationHtml 保证样式/频率色零漂移。 */
function streamingExplanationHtml(meta, fields){
  const f=k=>(fields[k]&&fields[k].text)||'';
  const r={ word:meta.word||'', lemma:meta.lemma||'',
            freq_band:meta.freq_band||'', freq_name:meta.freq_name||'',
            phonetic:f('phonetic'), pos:f('pos'), literal:f('literal'),
            contextual:f('contextual'), explanation:f('explanation') };
  return explanationHtml(r)
    +'<div class="loading" style="margin-top:8px"><span class="spinner"></span> 讲解生成中…</div>';
}

/* a pronunciation button — the B「纯声波弧」icon in a 28px transparent hit-area.
   Centralized so the icon/markup stays identical everywhere (panel · 重点词汇 · 生词本).
   stroke=currentColor → inherits .say{color:var(--accent)} so it follows the theme. */
const SAY_SVG='<svg class="say-i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true"><path d="M7.5 9a5 5 0 0 1 0 6"/><path d="M11.5 6a9.5 9.5 0 0 1 0 12"/><path d="M15.5 3.5a14 14 0 0 1 0 17"/></svg>';
function sayBtn(text, title){
  return `<button class="say" data-say="${escapeHtml(text)}" title="${escapeHtml(title||'听发音')}">${SAY_SVG}</button>`;
}
/* ---- 收藏「重点词汇」进生词本 ---- */
const ADD_SVG='<svg class="say-i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>';
const CHK_SVG='<svg class="say-i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>';
const _collectedKeys=new Set();   // §-keys already in the notebook (pre-marks the ＋ button as ✓)
function phraseKey(w){ return '§'+(w||'').trim().toLowerCase().replace(/\s+/g,' '); }
function refreshCollectedKeys(list){
  (list||[]).forEach(r=>{ const k=r&&r.lemma; if(k&&k[0]==='§') _collectedKeys.add(k); });
}
function collectBtn(word, gloss, sent, collected){
  return `<button class="kw-collect${collected?' on':''}" data-collect="${escapeHtml(word)}"`+
    ` data-gloss="${escapeHtml(gloss||'')}" data-sent="${escapeHtml(sent||'')}"`+
    ` title="${collected?'已在生词本':'收藏进生词本'}">${collected?CHK_SVG:ADD_SVG}</button>`;
}
const FREQ_VAR={A:'--fA',B:'--fB',C:'--fC',D:'--fD',E:'--fE'};   // 与生词本/全局同一套频率色
function explanationHtml(r){
  const kind=(r.kind||'').toLowerCase();
  if(kind==='sentence') return selectionHtml(r,'句子');
  if(kind==='phrase')   return selectionHtml(r,'短语');
  // ---- single word (default) ----
  const w = r.word||r.lemma||'';
  const fv=FREQ_VAR[r.freq_band];
  return `
    <div class="ex-word">
      <span${fv?` style="color:var(${fv})"`:''}>${escapeHtml(w)}</span>
      ${sayBtn(w)}
      ${r.phonetic?`<span class="ph">${escapeHtml(r.phonetic)}</span>`:''}
      ${r.freq_band?`<span class="ex-freq" title="词频 ${escapeHtml(r.freq_band)} · ${escapeHtml(r.freq_name||'')}（A 最常用 → E 生僻）">${escapeHtml(r.freq_band)}</span>`:''}
    </div>
    <div class="ex-pos">${escapeHtml(r.pos||'')}</div>
    ${r.literal?`<div class="ex-row"><span class="lbl">本义</span><div class="val"${fv?` style="color:var(${fv})"`:''}>${escapeHtml(r.literal)}</div></div>`:''}
    ${r.contextual?`<div class="ex-row"><span class="lbl">这里</span><div class="val"${fv?` style="color:var(${fv})"`:''}>${escapeHtml(r.contextual)}</div></div>`:''}
    ${r.explanation?`<div class="ex-talk"><span class="lbl">讲解</span>${escapeHtml(r.explanation)}</div>`:''}
    ${(r.lemma||w)?`<div class="ex-actions"><button class="btn ghost loc" data-loc="${escapeHtml(r.lemma||w.toLowerCase())}">↩ 回到原文</button></div>`:''}
  `;
}
// phrase / sentence explanation: 含义 →（句子加）重点词汇 → 讲解
function selectionHtml(r, kindLabel){
  const t=r.text||r.word||'';
  const sent=r.sentence||'';
  const kw=(r.key_words||[]).filter(k=>k&&k.word).map(k=>{
    const done=_collectedKeys.has(phraseKey(k.word));
    const kfv=FREQ_VAR[k.freq_band];   // 单词型 key word 按频率档着色；多词搭配无 band，保持赭色强调
    return `<li><span class="kw-t"><b${kfv?` style="color:var(${kfv})"`:''}>${escapeHtml(k.word)}</b>${k.gloss?` <span class="g">${escapeHtml(k.gloss)}</span>`:''}</span>${collectBtn(k.word,k.gloss,sent,done)}${sayBtn(k.word)}</li>`;
  }).join('');
  return `
    <div class="ex-sel">
      <span class="ex-sel-kind">${kindLabel}</span>
      ${sayBtn(t,'朗读')}
    </div>
    <div class="ex-seltext">${escapeHtml(t)}</div>
    ${r.meaning?`<div class="ex-row"><span class="lbl">含义</span><div class="val">${escapeHtml(r.meaning)}</div></div>`:''}
    ${kw?`<div class="ex-row"><span class="lbl">重点词汇</span><ul class="ex-kw">${kw}</ul></div>`:''}
    ${r.talk?`<div class="ex-talk"><span class="lbl">讲解</span>${mdLite(r.talk)}</div>`:''}
  `;
}
/* ---------- open-ended follow-up Q&A ---------- */
// [显示标签, 发给模型的完整指令, mode]。mode 决定后端切换哪套系统提示：
// "deep"=词汇深解（脱离语境讲词本身、长）、"freq"=常见程度（5 档+例句）；
// 其余 mode 走默认追问（已放开长度）。问句气泡只显示短标签，完整指令仍发给模型。
const ASK_CHIPS=[
  ['词汇深解','请脱离当前这句话的语境，帮我把这个词本身彻底讲透、建立词感：核心画面、它在真实英语里最常见的几种用法（每种配地道例句+简短中文）、再把这些用法背后共通的内核串一句话。我对这个词不太熟或容易记混，需要长解析没关系，越能让我"看见"和"感受"到这个词越好。','deep'],
  ['常见程度','请评判这个词在当前这句话里的这个具体用法到底有多常见，从「极其常见/非常常见/常见/罕见/极其罕见」里选恰好一档；若只在某领域/语体里常见请点明。再给 2-3 个体现这个用法的例句（配简短中文），帮我决定要不要专门习得它。','freq'],
  ['易混词辨析','把人们（尤其中国英语学习者）真正容易跟它混淆的词列出来辨析——可以是意思相近的近义词，也可以是长得像的近形词；逐个说清区别、各自更适合用在什么场合，并配例句。只放你确实有把握容易混的，宁缺毋滥；没把握就别硬凑。','confuse'],
  ['词根·记忆法','用真正顶尖、好用的记忆策略帮我把这个词焊进长期记忆：拆词根/词缀讲清构词逻辑、给一个生动好记的联想或小故事、必要时讲一点词源来历，让我以后看到就能想起意思。需要长就尽管长，务求好记、有效。','mnemonic'],
  ['这句里再细讲','就这个词在当前这句话里的用法掰开揉碎讲透：为什么这里用它最贴切、它在句中起什么作用、有没有更地道或可替换的说法、有哪些值得注意的搭配，配例句帮我彻底理解。讲细讲透没关系。','context'],
];
/* render a follow-up answer: 常见程度 (mode freq) starts with a machine-readable
   "@@FREQ@@ <档位> | <领域>" line we turn into a styled verdict header; everything
   else is plain light-Markdown. */
function renderAnswer(a){
  a=(a||'');
  const m=a.match(/^\s*@@FREQ@@\s*([^\n|]+?)\s*(?:\|\s*([^\n]*))?(?:\n|$)/);
  if(m){
    const level=(m[1]||'').trim(), domain=(m[2]||'').trim();
    const body=a.slice(m[0].length);
    return `<div class="freq-verdict">${escapeHtml(level)}`+
           (domain?`<small>${escapeHtml(domain)}</small>`:'')+`</div>`+mdLite(body);
  }
  return mdLite(a);
}
/* very light Markdown → HTML (bold, bullet lines, line breaks) */
function mdLite(t){
  let s=escapeHtml(t||'').replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  const lines=s.split('\n'); let out='', inUl=false;
  for(const ln of lines){
    const m=ln.match(/^\s*[-•]\s+(.*)$/);
    if(m){ if(!inUl){out+='<ul>';inUl=true;} out+='<li>'+m[1]+'</li>'; }
    else { if(inUl){out+='</ul>';inUl=false;} if(ln.trim()) out+=ln+'<br>'; }
  }
  if(inUl) out+='</ul>';
  return out.replace(/(<br>)+$/,'');
}
function priorTextOf(r){
  const kind=(r.kind||'').toLowerCase();
  if(kind==='sentence'||kind==='phrase'){
    const kw=(r.key_words||[]).filter(k=>k&&k.word)
      .map(k=>k.word+(k.gloss?('（'+k.gloss+'）'):'')).join('、');
    return [r.meaning&&('含义：'+r.meaning), kw&&('重点词：'+kw), r.talk].filter(Boolean).join('；');
  }
  return [r.literal&&('本义：'+r.literal), r.contextual&&('这里：'+r.contextual), r.explanation]
    .filter(Boolean).join('；');
}
// The follow-up shell is now class-based (no ids) so several can coexist — e.g. one
// in the explanation panel and one expanded inline inside the notebook.
function followupShellHtml(r){
  const kind=(r&&r.kind||'').toLowerCase();
  const noun = kind==='sentence' ? '这句话' : kind==='phrase' ? '这个短语' : '这个词';
  const chips=ASK_CHIPS.map((c,i)=>`<button class="ask-chip" data-ai="${i}">${escapeHtml(c[0])}</button>`).join('');
  return `<div class="ask">
    <div class="ask-hd">继续追问${noun}</div>
    <div class="ask-thread"></div>
    <div class="ask-chips">${chips}</div>
    <div class="ask-input">
      <input class="ask-box" type="text" placeholder="就${noun}随便问…（回车发送）" autocomplete="off" spellcheck="false">
      <button class="ask-send" title="发送">↑</button>
    </div>
  </div>`;
}
/* Each .ask block carries its own context here, so an explanation in the main panel
   and one expanded inline in the notebook never step on each other. */
const askCtx=new WeakMap();   // .ask element -> {word,lemma,sentence,prior,history,phraseEl}

/* ---- ④ 追问后台化：切词不丢、回看必复原 ----
   点新词时 explain()/showExplanation() 会整块替换 panelEx.innerHTML，把上一个词在途的
   .ask-a + 捕获的 aEl 从 DOM 摘除；但 sendAsk 的请求本身从不 abort，后台照跑到底、
   后端也已把答案写进 notebook（④a）。真正要修的是「看不见」和「回看不复原」：
   _pendingAsks：稳定 key（与后端 ask_followup 记 notebook 的 key 同一套：
   (lemma||word).trim().toLowerCase()）→ 该 key 下【在途】追问数组
   [{label, promise, status}]；promise 落定后从数组移除、结果并入该 key 客户端
   followups 缓存（后端也已持久，双保险）。mountExplanation 渲染某词时：已完成的走
   r.followups；仍在途的从 _pendingAsks 补一条「问句+活 spinner」并把 promise.then
   重新绑定到新建的 aEl——但只在“此刻面板仍显示该 key”时才写 DOM（用 _panelKey 判断），
   避免切走又切回之间的悬空写入。 */
const _pendingAsks=new Map();      // key -> [{label, promise, status:'pending'|'done'|'err'}]
let _panelKey=null;                // 当前主面板(panelEx)展示的词/短语 key，切词即变
function _pendingKeyOf(ctx){ return ((ctx&&(ctx.lemma||ctx.word))||'').trim().toLowerCase(); }
function _pendingListFor(key){
  if(!key) return [];
  let list=_pendingAsks.get(key);
  if(!list){ list=[]; _pendingAsks.set(key, list); }
  return list;
}
/* Render the structured explanation + follow-up area into ANY container and arm its
   context. Used for the main panel and for inline notebook expansion.
   isPanel=true 时（主面板）会顺带切 _panelKey + 把该 key 仍在途的追问补一条活 spinner
   （④，见 sendAsk 里的登记）；notebook 内联展开不参与"当前面板"判定，故不传。 */
function mountExplanation(container, r, ctx, isPanel){
  ctx=ctx||{};
  container.innerHTML = explanationHtml(r) + followupShellHtml(r);
  const block=container.querySelector('.ask');
  if(!block) return;
  const c={ word:(ctx.word||r.text||r.word||r.lemma||'').trim(), lemma:(r.lemma||ctx.lemma||'').trim(),
            sentence:(ctx.sentence||r.sentence||'').trim(), prior:priorTextOf(r), history:[],
            band:(r.freq_band||'')+(r.freq_name?('·'+r.freq_name):''),
            phraseEl:ctx.phraseEl||null };
  const hist=r.followups||[];
  if(hist.length){
    // Reopened history starts expanded (切回某词时直接看到答案；点问句仍可手动折叠).
    block.querySelector('.ask-thread').innerHTML =
      hist.map(h=>`<div class="ask-q">${escapeHtml(h.q)}</div><div class="ask-a">${renderAnswer(h.a)}</div>`).join('');
    c.history=hist.slice();
  }
  askCtx.set(block, c);
  const key=_pendingKeyOf(c);
  if(isPanel) _panelKey=key;
  // 补渲染仍在途的追问（已完成的走上面 r.followups，两者不重叠——完成即移出 _pendingAsks）
  const pending=_pendingListFor(key).filter(p=>p.status==='pending');
  if(pending.length){
    const thread=block.querySelector('.ask-thread');
    pending.forEach(p=>{
      const qEl=document.createElement('div'); qEl.className='ask-q'; qEl.textContent=p.label; thread.appendChild(qEl);
      const aEl=document.createElement('div'); aEl.className='ask-a'; aEl.innerHTML='<span class="spinner"></span>'; thread.appendChild(aEl);
      // 把这条在途追问的"落笔点"重新绑定到刚建的 aEl；只在此刻面板仍显示这个 key 时才写，
      // 已切走就静默丢弃（数据已在客户端 followups 缓存 + 后端 notebook 双保险里）。
      p.sink=(answerHtml, isErr, errText)=>{
        if(isPanel && _panelKey!==key) return;
        if(!aEl.isConnected) return;
        if(isErr){ aEl.classList.add('err'); aEl.textContent=errText||'追问失败，请重试'; }
        else{ aEl.innerHTML=answerHtml; }
      };
    });
  }
}
/* the main explanation panel */
function showExplanation(r, ctx){ mountExplanation(panelEx, r, ctx, true); }

/* opts={label,mode}: quick-ask buttons send the full `question` to the model but show
   a short `label` in the thread; free-typed questions pass neither (label=question).
   ④ 后台化：请求本身从不 abort（llmCall 只计 busy 数，见其注释）；这里额外把它登记进
   _pendingAsks，即便面板被切走（block/aEl 被摘除）promise 落定时也不抛错、且切回时
   mountExplanation 能找到它、把落笔点重新绑到新 aEl 上。 */
async function sendAsk(block, question, opts){
  question=(question||'').trim();
  if(!question || !block) return;
  opts=opts||{}; const label=(opts.label||question); const mode=opts.mode||'';
  const ctx=askCtx.get(block); if(!ctx) return;
  const thread=block.querySelector('.ask-thread'); if(!thread) return;
  const qEl=document.createElement('div'); qEl.className='ask-q'; qEl.textContent=label; thread.appendChild(qEl);
  const aEl=document.createElement('div'); aEl.className='ask-a'; aEl.innerHTML='<span class="spinner"></span>'; thread.appendChild(aEl);
  aEl.scrollIntoView({block:'nearest'});
  const key=_pendingKeyOf(ctx);
  const isPanelNow=(block.closest && block.closest('#panelEx')===panelEx);
  const entry={ label, status:'pending' };
  entry.sink=(answerHtml, isErr, errText)=>{
    if(isPanelNow && _panelKey!==key) return;   // 面板已切到别的词 → 静默丢弃，数据已在缓存里
    if(!aEl.isConnected) return;                // 面板整块被换掉，这个 aEl 已不在 DOM
    if(isErr){ aEl.classList.add('err'); aEl.textContent=errText||'追问失败，请重试'; }
    else{ aEl.innerHTML=answerHtml; }
  };
  const list=_pendingListFor(key);
  list.push(entry);
  const settle=(fn)=>{
    entry.status='done';
    const i=list.indexOf(entry); if(i>=0) list.splice(i,1);   // 落定即移出在途表，避免与 followups 缓存重叠渲染
    fn();
  };
  entry.promise=llmCall(()=>api().ask_followup({word:ctx.word, lemma:ctx.lemma, sentence:ctx.sentence,
      prior:ctx.prior, history:ctx.history.slice(-40), question, mode, label, band:ctx.band||''}))
    .then(r=>{
      if(r && r.ok){
        settle(()=>{
          entry.sink(renderAnswer(r.answer), false);
          ctx.history.push({q:label,a:r.answer});
          // a phrase/sentence band keeps its 追问 history in its own data-ex so it persists with the snapshot
          if(ctx.phraseEl){ try{ const d=JSON.parse(ctx.phraseEl.dataset.ex||'{}'); d.followups=ctx.history.slice(); ctx.phraseEl.dataset.ex=JSON.stringify(d); _syncPhraseEx(ctx.phraseEl); }catch(_){} }
          scheduleSave();
        });
      }else{
        settle(()=>entry.sink(null, true, (r&&r.error)||'追问失败，请重试'));
      }
    })
    .catch(e=>{ settle(()=>entry.sink(null, true, '出错：'+e)); });
  try{ aEl.scrollIntoView({block:'nearest'}); }catch(_){}
  return entry.promise;
}
/* chips / send / Enter — delegated on document so it works in the panel AND in the
   notebook's inline expansion; the active .ask block is resolved per click. */
document.addEventListener('click', e=>{
  // click a question bubble to fold / unfold its answer
  const q=e.target.closest('.ask-q');
  if(q){ q.classList.toggle('collapsed'); return; }
  const chip=e.target.closest('.ask-chip');
  if(chip){ const c=ASK_CHIPS[+chip.dataset.ai]; sendAsk(chip.closest('.ask'), c[1], {label:c[0], mode:c[2]||''}); return; }
  const send=e.target.closest('.ask-send');
  if(send){ const block=send.closest('.ask'); const b=block&&block.querySelector('.ask-box');
            if(b){ const v=b.value; b.value=''; sendAsk(block, v); } }
});
document.addEventListener('keydown', e=>{
  if(e.target && e.target.classList && e.target.classList.contains('ask-box') && e.key==='Enter'){
    e.preventDefault(); const v=e.target.value; e.target.value=''; sendAsk(e.target.closest('.ask'), v);
  }
});

/* locate a word back in the article by its lemma, scroll + highlight */
function locateInArticle(lemma){

/* Real-person pronunciation (有道, 美音). The backend downloads each word's mp3
   ONCE and keeps it permanently on disk, then serves it as an in-memory data URI.
   Playing from in-memory data (never the network on replay) makes every click —
   including the 2nd, 3rd … — instant and reliable in WKWebView. Failed loads are
   never cached, so a flaky first attempt can be retried by clicking again. */
const _audioCache=new Map();   // (word|accent) -> ready <audio> (data URI)
let _curAudio=null;
let _player={sents:[],idx:-1,playing:false,follow:true,audio:null,token:0};
let _lastAudioErr='';   // why the last get_audio failed (e.g. MiniMax key 失效) — shown if read-aloud can't proceed
let _playFails=0;       // consecutive sentence-audio failures during read-aloud; 2 in a row ⇒ engine down, stop with a message
// one global accent toggle (英音 uk / 美音 us) — applies to single words AND read-aloud
let _accent=(localStorage.getItem('santu_accent')==='us')?'us':'uk';
function updateAccentUI(){
  if(!accentBtn) return;
  accentBtn.textContent=(_accent==='us')?'美音':'英音';
  accentBtn.title='发音口音：'+((_accent==='us')?'美音':'英音')+'（单词与朗读统一生效，点击切换）';
  accentBtn.classList.toggle('accent-us', _accent==='us');
}
function setAccent(a){
  _accent=(a==='us')?'us':'uk';
  try{ localStorage.setItem('santu_accent', _accent); }catch(_){}
  _audioCache.clear();                                   // old-accent clips must not replay
  if(_curAudio){ try{ _curAudio.pause(); }catch(_){} _curAudio=null; }
  updateAccentUI();
  if(reading.querySelector('.sent')) warmReadAloud();     // pre-download in the new accent too
}
async function _ensureAudio(word){
  const acc=_accent, key=word+'|'+acc;
  // The cache holds the in-flight PROMISE, not just the resolved <audio>. That way a
  // background warm-up and a real 朗读 click for the same sentence share ONE backend
  // fetch — so clicking 朗读 right after opening reuses the already-running download
  // instead of kicking off a second 10s generation.
  let pending=_audioCache.get(key);
  if(pending) return pending;
  const isPhrase=/\s/.test((word||'').trim());   // a read-aloud sentence vs a single dictionary word
  pending=(async()=>{
    try{
      const r=await api().get_audio({word, accent:acc});
      if(r && r.ok && r.data){ const a=new Audio(r.data); a.preload='auto'; return a; }
      if(r && r.error){ _lastAudioErr=r.error; }   // remember why, for the read-aloud message
    }catch(e){}
    _audioCache.delete(key);   // not cached → a later attempt can retry
    // Direct 有道 streaming only helps single words; 有道 returns HTTP 500 for any
    // multi-word sentence, and a doomed <audio> would HANG the read-aloud forever.
    // So a failed sentence resolves to null and the player skips/reports it cleanly.
    if(isPhrase) return null;
    return new Audio('https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(word)+'&type='+(acc==='us'?'2':'1'));
  })();
  _audioCache.set(key, pending);
  return pending;
}
async function prefetchAudio(word){
  word=(word||'').trim();
  if(word && !_audioCache.has(word+'|'+_accent)){ try{ await _ensureAudio(word); }catch(_){} }
}
async function speak(word){
  word=(word||'').trim(); if(!word) return;
  if(_player.playing) pausePlayback();   // a deliberate single-word listen pauses the read-aloud
  try{
    if(_curAudio){ try{ _curAudio.pause(); }catch(_){} }
    const a=await _ensureAudio(word); _curAudio=a;
    try{ a.currentTime=0; }catch(_){}
    a.play().catch(()=>{});
  }catch(e){}
}
/* delegate clicks on any 🔊 button (explanation panel + notebook) */
document.addEventListener('click',e=>{
  const b=e.target.closest('.say'); if(!b) return;
  e.stopPropagation();
  speak(b.dataset.say);
});

/* delegate clicks on any ＋ 收藏 button (重点词汇 → 生词本) */
document.addEventListener('click',async e=>{
  const b=e.target.closest('.kw-collect'); if(!b) return;
  e.stopPropagation();
  if(b.classList.contains('on')) return;                 // already collected → no-op
  const word=b.dataset.collect||'', gloss=b.dataset.gloss||'', sent=b.dataset.sent||'';
  if(!word) return;
  b.classList.add('on'); b.title='已在生词本'; b.innerHTML=CHK_SVG;   // optimistic
  try{
    const r=await api().collect_keyword({word,gloss,sentence:sent});
    if(r && r.ok){
      if(r.key) _collectedKeys.add(r.key);
      scheduleSave();      // persist the notebook into this book's archive
      refreshNbCount();    // bump the 生词本 tab counter
    }else{
      b.classList.remove('on'); b.title='收藏进生词本'; b.innerHTML=ADD_SVG;
    }
  }catch(err){
    b.classList.remove('on'); b.title='收藏进生词本'; b.innerHTML=ADD_SVG;
  }
});

/* ---------- full-article read-aloud ----------
   Walks the existing .sent spans in document order, fetching each sentence's
   audio through the same (MiniMax-first) get_audio pipeline, prefetching the
   next sentence so playback flows. Two modes via the 跟读高亮 toggle:
     • on  → highlight the current sentence + auto-scroll it into view
     • off → just read, leave the page alone
   token: bumped on stop / restart to invalidate in-flight fetches & onended
   callbacks. pause/resume do NOT bump it, so a paused sentence resumes cleanly. */
function collectSentences(){
  const out=[];
  reading.querySelectorAll('.sent').forEach(el=>{
    const t=(el.dataset.sentence||el.textContent||'').trim().replace(/\s+/g,' ');
    if(t && /[A-Za-z]/.test(t)) out.push({el,text:t});
  });
  return out;
}
/* Pre-download the whole article's read-aloud audio in the background the moment an
   article opens, in document order, so 朗读 starts instantly instead of waiting ~10s
   for the first sentence to be generated on demand. A few sentences fetch in parallel;
   _warmToken cancels the run if another article opens or the accent changes. The disk
   cache on the backend means this cost is paid once per article + accent. */
let _warmToken=0;
// While the user is waiting on a 讲解/追问 (LLM) request, the background audio warm-up
// must step aside — otherwise its parallel downloads can starve that request and make it
// fail to connect. Every LLM call bumps this counter; the warm-up pauses while it's > 0.
let _llmBusy=0;
function llmCall(fn){
  _llmBusy++;
  return Promise.resolve().then(fn).finally(()=>{ _llmBusy--; });
}
async function warmReadAloud(){
  const myToken=++_warmToken;
  await new Promise(r=>setTimeout(r,300));   // let the page settle first
  if(myToken!==_warmToken) return;
  const sents=collectSentences();
  if(!sents.length) return;
  let i=0;
  const worker=async()=>{
    while(i<sents.length){
      if(myToken!==_warmToken) return;       // a newer article/accent took over
      while(_llmBusy>0){                      // yield the network to the user's 讲解 request
        if(myToken!==_warmToken) return;
        await new Promise(r=>setTimeout(r,300));
      }
      const s=sents[i++];
      await prefetchAudio(s.text);
    }
  };
  // 3 in flight keeps the front of the article ready fast without flooding the API
  await Promise.all([worker(),worker(),worker()]);
}
function updatePlayerUI(){
  const p=_player;
  plPlay.textContent = p.playing ? '❚❚' : '▶';
  plPlay.title = p.playing ? '暂停' : '播放';
}
/* which 0-based page a .sent element sits on, in book mode's horizontal columns.
   A sentence can straddle a column break (start on page N, spill onto N+1); using
   its START page left the view a page behind while the read-aloud was already into
   the spill. We key off the sentence's LAST line-rect instead, so a straddling
   sentence flips at its start. Geometry: absolute x in the scroll container
   (visual left + scrollLeft) / page step — same snap the pager uses. */
function _pageOfElement(el){
  const inner=document.getElementById('readingInner');
  if(!inner || !_pageW) return _pageIdx;
  const rects=el.getClientRects();
  const r=rects.length ? rects[rects.length-1] : el.getBoundingClientRect();
  const ir=inner.getBoundingClientRect();
  const absX=(r.left-ir.left)+inner.scrollLeft;
  return Math.max(0, Math.min(_pageTotal-1, Math.floor(absX/_pageW)));
}
function markReading(i){
  reading.querySelectorAll('.sent.reading-now').forEach(s=>s.classList.remove('reading-now'));
  if(_player.follow){
    const el=_player.sents[i] && _player.sents[i].el;
    if(el){
      el.classList.add('reading-now');
      if(bookMode){
        // book mode pages horizontally via scrollLeft — flip to the sentence's page
        // through the pager (snaps to the exact boundary). scrollIntoView would land
        // between pages and show two half-pages at once.
        const page=_pageOfElement(el);
        if(page!==_pageIdx){ _pageIdx=page; _applyPageTransform(); _updatePagerBar(); _renderBkLayer(); _renderDotLayer(); scheduleSave(); }
      } else {
        el.scrollIntoView({behavior:'smooth',block:'center'});
      }
    }
  }
  updatePlayerUI();
}
async function playerPlayCurrent(){
  const p=_player;
  if(!p.playing) return;
  if(p.idx<0 || p.idx>=p.sents.length){ stopPlayback(); return; }
  const myToken=p.token, s=p.sents[p.idx];
  markReading(p.idx);
  let a=null;
  try{ a=await _ensureAudio(s.text); }catch(_){}
  if(p.token!==myToken) return;        // stopped / restarted while fetching
  if(!a){ playerFail(myToken); return; }   // no audio for this sentence (engine down) — count + maybe stop
  p.audio=a; _curAudio=a;
  // warm a sliding window of upcoming sentences so the next clip is already buffered
  // when this one ends — that's what keeps the read-aloud flowing without gaps.
  for(let k=1;k<=3;k++){ const n=p.sents[p.idx+k]; if(n) prefetchAudio(n.text); }
  // A clip can finish (onended) OR fail to load (onerror) OR a.play() can reject.
  // Without an error path the read-aloud froze on the failing sentence; `settled`
  // makes whichever fires first win, exactly once.
  let settled=false;
  a.onended=()=>{ if(settled) return; settled=true; _playFails=0; if(p.token===myToken && p.playing) playerAdvance(myToken); };
  a.onerror=()=>{ if(settled) return; settled=true; if(p.token===myToken && p.playing) playerFail(myToken); };
  try{ a.currentTime=0; }catch(_){}
  a.play().catch(()=>{ if(settled) return; settled=true; if(p.token===myToken && p.playing) playerFail(myToken); });
}
function playerAdvance(token){
  const p=_player;
  if(p.token!==token || !p.playing) return;
  if(p.idx+1>=p.sents.length){ stopPlayback(); setStatus('✓ 全文朗读完毕'); setTimeout(clearStatus,1800); return; }
  p.idx++; playerPlayCurrent();
}
// A sentence had no playable audio. One bad sentence → just skip it. But two in a
// row means the voice engine itself is down (有道 can't read sentences, so this is
// almost always a MiniMax key/额度 problem) → stop and tell the user what to fix,
// instead of the old silent freeze.
function playerFail(token){
  const p=_player;
  if(p.token!==token || !p.playing) return;
  _playFails++;
  if(_playFails>=2){
    stopPlayback();
    setStatus('🔇 朗读中断 · '+(_lastAudioErr||'语音服务暂时不可用，请稍后重试'));
    setTimeout(clearStatus,6000);
    return;
  }
  playerAdvance(token);
}
function startPlayback(){
  const sents=collectSentences();
  if(!sents.length){ setStatus('没有可朗读的内容'); setTimeout(clearStatus,1500); return; }
  const p=_player;
  _playFails=0; _lastAudioErr='';   // fresh run — don't inherit a prior failure
  p.token++; p.sents=sents; p.idx=0; p.playing=true; p.follow=!!plFollow.checked;
  player.classList.add('show');
  if(_restorePlayerPos) _restorePlayerPos();
  updatePlayerUI();
  playerPlayCurrent();
}
function pausePlayback(){
  const p=_player; if(!p.playing) return;
  p.playing=false;
  if(p.audio){ try{ p.audio.pause(); }catch(_){} }
  updatePlayerUI();
}
function resumePlayback(){
  const p=_player;
  if(!p.sents.length || p.idx<0){ startPlayback(); return; }
  p.playing=true;
  if(p.audio && p.audio.paused && !p.audio.ended){ p.audio.play().catch(()=>{}); updatePlayerUI(); }
  else { playerPlayCurrent(); }
}
function stopPlayback(){
  const p=_player; p.token++; p.playing=false;
  if(p.audio){ try{ p.audio.pause(); }catch(_){} }
  p.audio=null; p.idx=-1;
  reading.querySelectorAll('.sent.reading-now').forEach(s=>s.classList.remove('reading-now'));
  player.classList.remove('show');
  updatePlayerUI();
}
readBtn.addEventListener('click',()=>{
  if(!_player.sents.length || _player.idx<0) startPlayback();
  else _player.playing ? pausePlayback() : resumePlayback();
});
plPlay.addEventListener('click',()=>{ _player.playing ? pausePlayback() : resumePlayback(); });
plStop.addEventListener('click',()=>stopPlayback());
plClose.addEventListener('click',()=>stopPlayback());
plFollow.addEventListener('change',()=>{
  _player.follow=!!plFollow.checked;
  if(!_player.follow) reading.querySelectorAll('.sent.reading-now').forEach(s=>s.classList.remove('reading-now'));
  else if(_player.idx>=0) markReading(_player.idx);
});
accentBtn.addEventListener('click',()=>setAccent(_accent==='us'?'uk':'us'));
updateAccentUI();

/* drag the read-aloud bar by ANY blank part of the pill (clicks on the buttons /
   checkbox still work); position persists across sessions */
let _restorePlayerPos=null;
(function(){
  if(!player) return;
  const KEY='situ_player_pos';
  function clamp(x,y){
    const r=player.getBoundingClientRect();
    return {x:Math.max(6,Math.min(x,window.innerWidth-r.width-6)),
            y:Math.max(6,Math.min(y,window.innerHeight-r.height-6))};
  }
  function applyPos(p){ player.style.left=p.x+'px'; player.style.top=p.y+'px'; player.style.transform='none'; }
  _restorePlayerPos=function(){
    try{ const s=JSON.parse(localStorage.getItem(KEY)||'null'); if(s) applyPos(clamp(s.x,s.y)); }catch(_){}
  };
  let drag=null;
  player.addEventListener('pointerdown',e=>{
    if(e.target.closest('button,input,label,a')) return;   // let the controls take the click
    e.preventDefault();
    const r=player.getBoundingClientRect();
    drag={dx:e.clientX-r.left, dy:e.clientY-r.top};
    player.classList.add('dragging');
    try{ player.setPointerCapture(e.pointerId); }catch(_){}
  });
  player.addEventListener('pointermove',e=>{
    if(!drag) return;
    applyPos(clamp(e.clientX-drag.dx, e.clientY-drag.dy));
  });
  function endDrag(e){
    if(!drag) return; drag=null;
    player.classList.remove('dragging');
    try{ player.releasePointerCapture(e.pointerId); }catch(_){}
    const r=player.getBoundingClientRect();
    try{ localStorage.setItem(KEY, JSON.stringify({x:Math.round(r.left), y:Math.round(r.top)})); }catch(_){}
  }
  player.addEventListener('pointerup',endDrag);

})();
// spacebar toggles pause/resume while the read-aloud bar is showing — but never when
// the user is typing in a field, and we swallow the default page-scroll on Space.
document.addEventListener('keydown',(e)=>{
  if(e.code!=='Space' && e.key!==' ') return;
  if(!player.classList.contains('show')) return;
  const t=e.target;
  if(t && (t.isContentEditable || /^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName))) return;
  e.preventDefault();
  _player.playing ? pausePlayback() : resumePlayback();
});

/* ---------- notebook ---------- */
async function refreshNbCount(){
  // the tab counter reflects the ACTIVE (not-yet-mastered) list
  try{ const list=await api().get_notebook(); nbCount.textContent=list.filter(r=>!r.known).length; refreshCollectedKeys(list); }catch(e){}
}
let _nbList=[], _nbFilter='all', _nbSort='freq', _nbView='active';
const NB_TAG={word:'词', phrase:'词块', sentence:'句', para:'段'};
function nbKindOf(r){ const k=(r.kind||'').toLowerCase(); return (k==='phrase'||k==='sentence'||k==='para')?k:'word'; }
function nbLvl(r){   // 词文字永远染频率色（A→E），与排序维度无关（对齐全局生词本 gvFreqVar 的拍板行为）
  const kind=nbKindOf(r);
  if(kind==='word'&&r.freq_band) return cssv({A:'--fA',B:'--fB',C:'--fC',D:'--fD',E:'--fE'}[r.freq_band]);
  return cssv('--muted');
}
async function showNotebook(){
  try{ _nbList=await api().get_notebook(); }catch(e){ _nbList=[]; }
  nbCount.textContent=_nbList.filter(r=>!r.known).length;
  refreshCollectedKeys(_nbList);
  renderNbList();
}
function renderNbList(){
  const list=_nbList||[];
  const knownTotal=list.filter(r=>r.known).length;
  if(_nbView==='known' && knownTotal===0) _nbView='active';   // never strand in an empty 已掌握 view
  const inView=r=>(_nbView==='known' ? !!r.known : !r.known);
  const openAll=`<button class="nb-openall" id="nbOpenAll">⤢ 打开生词本大视图 · 分组 / 复制 / 导出</button>`;
  if(!list.length){ panelNb.innerHTML=openAll+'<div class="ex-empty">点开过的生词、词块、句子会收集到这里。</div>'; return; }
  const counts={word:0,phrase:0,sentence:0,para:0};
  list.forEach(r=>{ if(inView(r)) counts[nbKindOf(r)]++; });
  const chip=(k,label)=>`<button class="nb-chip${_nbFilter===k?' on':''}" data-k="${k}">${label}${k==='all'?'':` <i>${counts[k]||0}</i>`}</button>`;
  const sBtn=(m,label)=>`<button class="${_nbSort===m?'on':''}" data-sort="${m}">${label}</button>`;
  const sortSeg=`<div class="nb-sortseg" title="排序维度">${sBtn('freq','频率')}${sBtn('order','章节')}${sBtn('clicks','点击')}</div>`;
  const knownChip=knownTotal?`<button class="nb-chip nb-known-view${_nbView==='known'?' on':''}" data-view="1" title="已收入「已掌握」的词条都在这里，可随时移出">✓ 已掌握 <i>${knownTotal}</i></button>`:'';
  const chips=`<div class="nb-filter">${chip('all','全部')}${chip('word','词')}${chip('phrase','词块')}${chip('sentence','句子')}${chip('para','段落')}${knownChip}</div>`;
  // 排序索引：频率→A-E 档（再按 daily_rank）；章节→文内 order；点击→次数降序。其余原序兜底。
  let order=list.map((_,i)=>i);
  const bo={A:1,B:2,C:3,D:4,E:5};
  if(_nbSort==='freq'){
    const rk=i=>{ const r=list[i]; return (nbKindOf(r)==='word'&&r.freq_band)?(bo[r.freq_band]*1e7+(r.daily_rank||0)):Infinity; };
    order.sort((a,b)=>{ const ra=rk(a),rb=rk(b); return ra!==rb?ra-rb:a-b; });
  }else if(_nbSort==='order'){
    const ok=i=>{ const r=list[i]; return r.order!=null?r.order:Infinity; };
    order.sort((a,b)=>{ const ra=ok(a),rb=ok(b); return ra!==rb?ra-rb:a-b; });
  }else if(_nbSort==='clicks'){
    order.sort((a,b)=>{ const d=(list[b].clicks||0)-(list[a].clicks||0); return d!==0?d:a-b; });
  }
  const items=order.map(i=>{
    const r=list[i];
    if(!inView(r)) return '';
    const kind=nbKindOf(r);
    if(_nbFilter!=='all' && _nbFilter!==kind) return '';
    const disp=r.word||r.text||r.lemma||'';
    const head=disp.length>72 ? disp.slice(0,70).trim()+'…' : disp;   // long selections: clip the row title (full text shows when expanded)
    const sub=kind==='word' ? (r.contextual||'') : (r.meaning||'');
    const col=nbLvl(r);
    const freq=(kind==='word' && r.freq_band)
      ? `<span class="nb-freq" title="词频 ${escapeHtml(r.freq_band)} · ${escapeHtml(r.freq_name||'')}（A 最常用 → E 生僻）">${escapeHtml(r.freq_band)}</span>` : '';
    const clk=(r.clicks>1)?`<span class="nb-freq" title="点击次数">×${r.clicks}</span>`:'';
    return `<div class="nb-item" data-i="${i}" data-kind="${kind}"${col?` data-lvl="1" style="--lvl:${col}"`:''}>
      <div class="nb-hd">
        <button class="nb-star ${r.star?'on':''}" data-star="${i}" title="收藏">${GV_SVG.star}</button>
        <span class="nb-tag t-${kind}">${NB_TAG[kind]}</span>
        <span class="nw">${escapeHtml(head)}</span>
        ${kind==='word'&&r.phonetic?`<span class="ph">${escapeHtml(r.phonetic)}</span>`:''}
        ${freq}${clk}
        ${sayBtn(disp)}
      </div>
      ${sub?`<div class="c">${escapeHtml(sub)}</div>`:''}
      <div class="nb-exp"></div>
    </div>`;
  }).join('');
  const empty = items ? '' :
    (_nbView==='known' ? '<div class="ex-empty">这里还没有「已掌握」的词条。<br>展开任意词条，点底部「＋ 收入"已掌握"」即可归档。</div>'
                       : '<div class="ex-empty">这一类暂时没有词条。</div>');
  panelNb.innerHTML=openAll+chips+sortSeg+items+empty;
}
function toggleNbItem(it){
  const exp=it.querySelector('.nb-exp');
  const wasOpen=it.classList.contains('open');
  // accordion: collapse any other open item first
  panelNb.querySelectorAll('.nb-item.open').forEach(o=>{
    if(o!==it){ o.classList.remove('open'); const x=o.querySelector('.nb-exp'); if(x) x.innerHTML=''; }
  });
  if(wasOpen){ it.classList.remove('open'); exp.innerHTML=''; return; }
  it.classList.add('open');
  const r=_nbList[+it.dataset.i]; if(!r) return;
  mountExplanation(exp, r, {word:r.word||r.text||r.lemma, lemma:r.lemma||'', sentence:r.sentence||''});
  // a restrained 已掌握 control — only here, in the expanded card
  const foot=document.createElement('div'); foot.className='nb-mastery';
  foot.innerHTML = r.known
    ? '<button class="nb-known-btn undo">↩ 移出「已掌握」</button>'

/* mark / unmark a notebook entry as 已掌握. Marking also strips the word's highlight
   from the article (a vocab tile reverts to a plain — still clickable — word; a phrase
   band is unwrapped), so a mastered item stops drawing the eye while reading. */
function unvocab(el){
  const span=document.createElement('span'); span.className='w'; span.textContent=el.textContent;
  el.replaceWith(span);
}
function removeArticleMark(r){
  const lemma=r.lemma||'';
  if(lemma && lemma[0]==='§'){
    const txt=(r.text||r.word||'').trim();
    reading.querySelectorAll('.phrase').forEach(ph=>{ if((ph.dataset.phrase||'').trim()===txt) removePhrase(ph); });
  } else if(lemma){
    let touched=false;
    reading.querySelectorAll('mark.vocab, .w.vocab').forEach(el=>{ if(el.dataset.lemma===lemma){ unvocab(el); touched=true; } });
    if(touched) rebuildNavKeepCurrent();
  }
}
async function toggleKnown(it){
  if(!it) return;
  const r=_nbList[+it.dataset.i]; if(!r) return;
  const key=r.lemma||''; if(!key) return;
  const next=!r.known;
  try{ await api().set_known({key, known:next}); }catch(e){}
  r.known=next;
  if(next) removeArticleMark(r);
  renderNbList(); refreshNbCount(); scheduleSave();
}
// one delegated handler: filter chips, 🔊 (play only — never expand), row toggle
panelNb.addEventListener('click', e=>{
  if(e.target.closest('#nbOpenAll')){ gvOpen('doc'); return; }   // 打开大视图（本篇）
  const star=e.target.closest('.nb-star');
  if(star){ e.stopPropagation(); const r=_nbList[+star.dataset.star];
    if(r){ const ns=!r.star; r.star=ns; const key=r.lemma||''; if(key){ try{ api().set_star({key,star:ns}); }catch(_){} }
      star.classList.toggle('on',ns); } return; }   // 只切 .on，CSS 填满星星
  const kb=e.target.closest('.nb-known-btn');     // 收入/移出 已掌握 (inside the expansion)
  if(kb){ e.stopPropagation(); toggleKnown(kb.closest('.nb-item')); return; }

  if(viewBtn){ _nbView=(_nbView==='known'?'active':'known'); renderNbList(); return; }

  // Inside the expansion, only true interactive bits (追问输入/按钮/链接/选区) keep the card open;
  // clicking any blank area of the expanded body still collapses the card — consistent with 整卡可点。
  if(e.target.closest('a,button,input,textarea,select,label,[contenteditable],.ask-chip,.ask-send,.ask-box')) return;
  const it=e.target.closest('.nb-item');

});

/* ===================== 生词本大视图（全局 / 本篇 · 三维排序 · 分层着色 · 分组复制导出） =====================
   清单行（无卡片/无左彩条），整行文本永远染「频率」色（A-E），与排序维度无关；排序只重排顺序。 */
const gvWrap=$('#gvWrap'), gvBody=$('#gvBody'), gvTitle=$('#gvTitle'),

const GV_F={A:'--fA',B:'--fB',C:'--fC',D:'--fD',E:'--fE'}, GV_C=['--c1','--c2','--c3','--c4'],

const GV_SVG={

  say:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6.5 9H3v6h3.5L11 19V5z"/><path d="M15 9a4 4 0 0 1 0 6"/><path d="M17.8 6.5a7.5 7.5 0 0 1 0 11"/></svg>',

};
/* 行文本颜色永远＝频率色（A→E），与排序维度无关（用户拍板）；无频率档回落 --muted。 */
function gvFreqVar(r){ return r.band?GV_F[r.band]:'--muted'; }
const cssv=n=>getComputedStyle(document.documentElement).getPropertyValue(n).trim();
let _gv={scope:'global',type:'all',sort:'freq',group:0,q:'',viewKnown:false,sel:new Set(),raw:[],srcHue:{}};

function gvSrcId(r){ return _gv.scope==='global'
  ? ((r.sources[0]&&r.sources[0].doc_id)||r.chapTitle||'?')
  : (r.chapIdx!=null?('c'+r.chapIdx):(r.chapTitle||'全文')); }
function gvNorm(r){
  const kraw=(r.kind||'word').toLowerCase();
  let kind=GV_K2[kraw]||(String(r.lemma||'').startsWith('§')?'c':'w');
  return { key:r.lemma||r.key||r.word||'', word:(r.word||r.text||r.lemma||'').replace(/^§/,''),
    phon:r.phonetic||'', zh:r.contextual||r.meaning||r.zh||r.literal||'',
    band:r.freq_band||'', rank:(r.daily_rank!=null?r.daily_rank:null),
    clicks:r.clicks||0, order:(r.order!=null?r.order:null),
    chapTitle:r.chapter_title||'', chapIdx:(r.chapter_idx!=null?r.chapter_idx:null),
    kind, star:!!r.star, known:!!r.known, sources:r.sources||[] };
}
async function gvOpen(scope){
  _gv.scope=scope||'global'; _gv.sel.clear(); _gv.q=''; if(gvSearch) gvSearch.value='';
  gvSyncScope(); gvWrap.classList.add('show'); await gvReload();

function gvSyncScope(){
  document.querySelectorAll('#gvScope button').forEach(b=>b.classList.toggle('on',b.dataset.scope===_gv.scope));
  gvTitle.textContent=_gv.scope==='global'?'全局生词本':'本篇生词本';
}
async function gvReload(){
  let list=[];
  try{ list=_gv.scope==='global'?await api().get_global_notebook():await api().get_notebook(); }catch(e){ list=[]; }
  _gv.raw=(list||[]).map(gvNorm);
  const seen={}; let i=0;
  _gv.raw.forEach(r=>{ const id=gvSrcId(r); if(!(id in seen)) seen[id]=i++; });
  _gv.srcHue=seen; gvRender();
}
function gvFiltered(){
  let a=_gv.raw.filter(r=>_gv.viewKnown?r.known:!r.known);
  if(_gv.type!=='all') a=a.filter(r=>r.kind===_gv.type);
  if(_gv.q){ const q=_gv.q.toLowerCase(); a=a.filter(r=>r.word.toLowerCase().includes(q)||(r.zh||'').toLowerCase().includes(q)); }
  const bo={A:1,B:2,C:3,D:4,E:5};
  if(_gv.sort==='freq') a.sort((x,y)=>(bo[x.band]||9)-(bo[y.band]||9)||(x.rank||9e9)-(y.rank||9e9));
  else if(_gv.sort==='order') a.sort((x,y)=>(x.order==null?9e15:x.order)-(y.order==null?9e15:y.order));
  else a.sort((x,y)=>y.clicks-x.clicks);
  return a;
}
function gvLegendHTML(){

function gvGroups(){ const a=gvFiltered(); if(!_gv.group) return [a]; const gs=[]; for(let i=0;i<a.length;i+=_gv.group) gs.push(a.slice(i,i+_gv.group)); return gs; }
function gvRender(){

function gvText(rows){ return rows.map(r=>r.word+(r.zh?'\t'+r.zh:'')).join('\n'); }
function gvCSV(rows){
  const q=s=>'"'+String(s==null?'':s).replace(/"/g,'""')+'"';

async function gvCopy(rows){

  if(!ok){ try{ await navigator.clipboard.writeText(text); ok=true; }catch(e){} }
  setStatus(ok?`⧉ 已复制 ${rows.length} 条到剪贴板`:'❌ 复制失败',!ok); setTimeout(clearStatus,1600);

reading.addEventListener('click',e=>{
  // click on an existing bookmark line = delete it (no persistent ✕ any more)
  if(e.target.closest('.bookmark')){
    // 焦点保护：窗口刚被这一击激活的话，只当激活，不删
    if(performance.now()-_winFocusTs < BK_FOCUS_GUARD_MS) return;
    e.stopPropagation(); removeBookmark(e.target.closest('.bookmark')); return;
  }
  // dragging to select text must not also fire a word explanation / bookmark placement
  const _s=window.getSelection();
  if(_s && !_s.isCollapsed && _s.toString().trim()) return;
  // a click on a phrase band (not on a word inside it) reopens that phrase
  const ph=e.target.closest('.phrase');
  if(ph && !e.target.closest('.w, mark.vocab')){ reopenPhrase(ph, e); return; }
  // a click on a highlight band (not on a word/phrase inside it) → 改色/移除小工具条

    setCurrent(m, false); explain(m);   // no scroll on click — article stays put
    return;

  /* 正文/空白点击 100% 自由——书签只经左页边书签槽 #bkSlotA 放置（误触方案 A）。 */
});

/* Hover-prefetch: resting on a highlighted word warms its explanation (+audio)
   into the cache, so the click that follows feels instant. Never writes to the
   notebook (uses prewarm_word). Gated by the same 预生成 toggle / LLM availability. */
reading.addEventListener('mouseover', e=>{
  if(!llmOn || !pregenChk.checked) return;
  const m=e.target.closest('mark.vocab, .w.vocab'); if(!m) return;
  const word=(m.dataset.word||m.textContent||'').trim(); if(!word) return;
  const key=(m.dataset.lemma||word).toLowerCase();
  if(_hoverWarmed.has(key)) return;
  clearTimeout(_hoverTimer);
  _hoverTimer=setTimeout(()=>{
    _hoverWarmed.add(key);
    const sentence=sentOf(m);
    try{ api().prewarm_word({word, lemma:m.dataset.lemma||'', sentence, level:m.dataset.level||'', freq:m.dataset.freq||''}); }catch(_){}
    prefetchAudio(word);
  }, 180);
});
reading.addEventListener('mouseout', ()=>{ if(_hoverTimer){ clearTimeout(_hoverTimer); _hoverTimer=null; } });

/* ---------- manual phrase selection → amber "marker" highlight + 追问 ---------- */
/* Selecting any text in the article pops a floating toolbar. 「讲解·追问」 wraps the
   phrase in a persistent warm-amber band (a different visual channel from the blue
   vocabulary text, so highlighted words inside still read clearly) and explains it;
   the explanation (+follow-ups) rides along in the span's data-ex, so it survives a
   reload via the article snapshot and reopens instantly on click. 「✕」 discards —
   guarding against a mis-drag (before look-up) or a mis-touch (after). */
let _selRange=null, _selText='', _selSent='', _curPhrase=null, _phraseSeq=0;
let _curHl=null, _hlSeq=0;   // 点已有色块高亮时选中的 span（类比 _curPhrase）
const selbar=document.createElement('div'); selbar.className='selbar'; document.body.appendChild(selbar);
let _selPt=null;   // 拖选松手点（explainSelection 收藏后放置工具条用）
// 工具条一律锚定「点击点 / 松手点」（永远落在可视页上），再整体夹进可视区——与元素几何
// 解耦，彻底避免书模式分页分栏时 getBoundingClientRect() 的联合矩形跑到屏外、工具条被
// clamp 到角落（历史反复出现的「选色条自动跑偏」根因，已用 preview 量证：跨栏块 union
// rect left 可达 810+、窗宽仅 626，旧 placeBar 必把条钉到右上角）。
function _showBarAtPoint(x, y){
  selbar.classList.add('show');                 // 先显示才能量到真实宽高
  const bw=selbar.offsetWidth||140, bh=selbar.offsetHeight||34, M=8;
  let left=x-bw/2, top=y-bh-12;
  if(top<M) top=y+18;                            // 上方放不下 → 放到点下方
  left=Math.max(M, Math.min(window.innerWidth-bw-M, left));
  top=Math.max(M, Math.min(window.innerHeight-bh-M, top));
  selbar.style.left=left+'px'; selbar.style.top=top+'px';
}
function _evPt(ev){ return (ev && ev.clientX!=null) ? {x:ev.clientX,y:ev.clientY}
  : (_selPt || {x:window.innerWidth/2, y:80}); }
function hideBar(){ selbar.classList.remove('show'); }
// 七色圆点 HTML（划选工具条 / 已有高亮改色工具条共用）
const HL_COLORS=['A','B','C','D','E','F','P'];

}

selbar.addEventListener('click', async e=>{

    }
    try{ window.getSelection().removeAllRanges(); }catch(_){}
    _selRange=null; hideBar();
    if(text){
      try{
        const r=await api().collect_keyword({word:text, gloss:'', sentence:sent});
        if(r && r.ok!==false){
          if(typeof _collectedKeys!=='undefined') _collectedKeys.add(phraseKey(text));
          try{ refreshNbCount(); }catch(_){}
          // 生词本面板正开着 → 立即重拉列表，新收藏的词块当场出现（不必切走再切回）
          try{ if(panelNb && panelNb.style.display!=='none') showNotebook(); }catch(_){}
        }

      }catch(_){ setStatus('❌ 收藏失败', true); setTimeout(clearStatus,1600); }
    }
    if(pid) scheduleSave();   // 文章模式随快照持久
    return;
  }
  if(e.target.closest('.sb-copy')){
    const text=_selText;
    try{ window.getSelection().removeAllRanges(); }catch(_){}
    _selRange=null; hideBar();
    if(text){ try{ api().copy_text({text}); }catch(_){} }
    return;
  }
  if(e.target.closest('.sb-del')){
    if(selbar.dataset.mode==='phrase' && _curPhrase){ removePhrase(_curPhrase); }
    else if(selbar.dataset.mode==='hl' && _curHl){ unwrapHl(_curHl); }
    else { try{ window.getSelection().removeAllRanges(); }catch(_){} _selRange=null; }
    hideBar();
  }
});

document.addEventListener('mouseup', e=>{
  if(selbar.contains(e.target)) return;
  setTimeout(()=>{
    const sel=window.getSelection();
    const t=sel ? sel.toString().trim().replace(/\s+/g,' ') : '';
    if(!t || t.length<2 || t.length>20000 || !sel.rangeCount){ if(selbar.dataset.mode!=='phrase' && selbar.dataset.mode!=='hl') hideBar(); return; }
    const range=sel.getRangeAt(0);
    if(!reading.contains(range.commonAncestorContainer)){ hideBar(); return; }
    let node=range.commonAncestorContainer; node=(node&&node.nodeType===1)?node:(node?node.parentElement:null);
    const sentEl=node && node.closest ? node.closest('.sent') : null;
    _selRange=range.cloneRange(); _selText=t; _selSent=sentEl?(sentEl.dataset.sentence||''):'';
    _selPt={x:e.clientX, y:e.clientY};   // 松手点：工具条锚这里，绝不用跨栏的联合矩形
    showSelectBar(_selPt.x, _selPt.y);
  },10);
});
