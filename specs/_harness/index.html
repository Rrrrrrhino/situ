/* ----- 多列翻页核心 ----- */
function _initPager(){
  const vp=document.getElementById('pagerViewport');
  const track=document.getElementById('pagerTrack');
  const inner=document.getElementById('readingInner');
  if(!vp||!track||!inner) return;

  /* 防御：vpW 可能因面板挤压为 0（尤其 preview 工具小窗口环境），兜底用父容器宽 */
  let vpW=vp.clientWidth||vp.offsetWidth;
  let vpH=vp.clientHeight||vp.offsetHeight;
  if(vpW<100){
    const main=vp.closest('.main')||document.querySelector('.main');
    vpW=main ? Math.max(400, main.offsetWidth - 374) : Math.max(400, window.innerWidth - 374);
  }
  if(vpH<100) vpH=Math.max(400, window.innerHeight - 180);
  const SIDE=48; // px，每侧页边距
  /* 策略（关键：列距必须 == 翻页步长 == vpW，否则下一列会渗进本页且逐页漂移）：
     - inner 宽=vpW，border-box，左右各留 SIDE 页边
     - column-width = vpW-2*SIDE（=内容宽），column-gap = 2*SIDE
       → 列距 = (vpW-2SIDE)+(2SIDE) = vpW；第 2 列起点恰好被推到 vpW 之外
       → scrollWidth = N*vpW，每页一列、左右页边对称
     - 翻页步长 = vpW；track overflow:hidden 当窗口裁切
  */
  _pageW=vpW;
  _pageGap=0;

  /* track：固定尺寸 + overflow:hidden 充当"窗口" */
  track.style.width=vpW+'px';
  track.style.height=vpH+'px';
  track.style.overflow='hidden';
  track.style.position='relative';
  track.style.willChange='transform';

  /* inner：列距对齐 vpW，按高断列 */
  inner.style.width=vpW+'px';
  inner.style.height=vpH+'px';
  inner.style.boxSizing='border-box';
  inner.style.columnWidth=(vpW-2*SIDE)+'px';
  inner.style.columnGap=(2*SIDE)+'px';
  inner.style.columnFill='auto';
  inner.style.paddingLeft=SIDE+'px';
  inner.style.paddingRight=SIDE+'px';
  inner.style.paddingTop='34px';
  inner.style.paddingBottom='30px';
  /* 关键（WKWebView 适配）：inner 自身做横向滚动容器（overflow-x:auto + overflow-y:hidden）。
     翻页用 inner.scrollLeft，而非对 track 做 transform——WKWebView 对「transform 移动多列溢出列」
     有绘制 bug（移进来的列不渲染，表现为第 2/3 页空白），改用程序化滚动 WebKit 渲染可靠。
     overflow-x:auto 同时给了多列分片所需的裁切上下文（纯 visible 在 WKWebView 可能不分列）。
     水平滚动条由 CSS ::-webkit-scrollbar 隐藏。 */
  inner.style.overflowX='auto';
  inner.style.overflowY='hidden';

  /* 强制回流 */
  void inner.scrollWidth;

  /* 页数 = inner.scrollWidth / vpW */
  _pageTotal=Math.max(1, Math.round(inner.scrollWidth / vpW));

  /* 夹紧 */
  if(_pageIdx>=_pageTotal) _pageIdx=_pageTotal-1;
  if(_pageIdx<0) _pageIdx=0;

  /* 存档页码恢复（必须在 _pageTotal 算出之后才设，否则夹紧逻辑会把它清掉） */
  if(_restorePage){ _pageIdx=Math.max(0,Math.min(_restorePage,_pageTotal-1)); _restorePage=0; }

  _applyPageTransform();
  _updatePagerBar();
  _renderBkLayer();   // 书签横线重画时机：开章/字号变/窗口变都汇于此
  _renderDotLayer(); _renderPagerTicks();   // 圆点贴同一时机重画
}

function _applyPageTransform(){
  // WKWebView 适配：用 inner.scrollLeft 翻页（不用 track transform，详见 _initPager 注释）
  const inner=document.getElementById('readingInner');
  if(!inner) return;
  inner.scrollLeft=_pageIdx*(_pageW+_pageGap);
}

/* 全局页码估算：四土不用 epub.js，没有连续 locations，故用「自校准」估算——
   拿当前章的真实页数(_pageTotal)÷当前章字数，得到「本次字号/窗口下的每页字数」cpp，
   再用 cpp 估算其余各章页数。当前章永远用真实页数，跨章/改字号/缩放会自动重校准。
   总数会随章节轻微漂移（各章疏密不同），这是估算的固有代价，可接受。 */
function _globalPage(){
  const chars=[];
  for(let i=0;i<bookCount;i++){
    const t=bookToc[i];
    chars.push(Math.max(1, (t && t.chars) ? t.chars : 1));
  }
  const curChars=chars[bookIdx]||1;
  const cpp=(_pageTotal>0)?(curChars/_pageTotal):curChars;   // 每页字数（按当前章实测校准）
  const est=i=>(i===bookIdx)?_pageTotal:Math.max(1, Math.round(chars[i]/cpp));
  let before=0; for(let i=0;i<bookIdx;i++) before+=est(i);
  let total=0;  for(let i=0;i<bookCount;i++) total+=est(i);
  const cur=Math.min(total, before+_pageIdx+1);
  return {cur, total};
}
function _updatePagerBar(){
  const pgPrev=document.getElementById('pgPrev');
  const pgNext=document.getElementById('pgNext');
  const pgLbl=document.getElementById('pgLbl');
  if(pgLbl){
    // 多章书：显示全局页码（章内页码已由顶部「第 X 章 / 共 Y 章」给出上下文）；单章/异常回落章内页码
    if(bookCount>1 && _pageTotal>0 && bookToc.length===bookCount){
      const g=_globalPage();
      pgLbl.textContent=`${g.cur} / ${g.total}`;
    }else{
      pgLbl.textContent=`${_pageIdx+1} / ${_pageTotal}`;
    }
  }
  if(pgPrev) pgPrev.disabled=(_pageIdx<=0 && bookIdx<=0);
  if(pgNext) pgNext.disabled=(_pageIdx>=_pageTotal-1 && bookIdx>=bookCount-1);
}

/* ----- 书签横线覆盖层：#bkLayer（absolute，不推动正文）-----
   只画本章、当前页上的书签；每条线横向 = 锚点 fragment 的左右边界。
   side='b'（默认，旧记录无该字段按此兼容）：线贴在 blocks[ord] 的阅读序第一个
   fragment 顶部（"块顶"边界，ord 指向块本身）。
   side='a'：线贴在 blocks[ord-1] 的最后一个 fragment 底部（"块底"边界，ord 指向
   下一块——放置时 ord 记的是"这条线之后是第几块"，对 side='a' 而言线在 ord-1 块之后）。
   这样列尾空白点出来的线贴在本列末段之后，不会因为整块 getBoundingClientRect()
   的联合矩形而跳到下一列/下一页顶部。 */
function _renderBkLayer(){
  const layer=document.getElementById('bkLayer');
  const vp=document.getElementById('pagerViewport');
  const inner=document.getElementById('readingInner');
  if(!layer||!vp) return;
  layer.innerHTML='';
  if(!inner || !_pageW) return;
  const blocks=_bkBlocks();
  const vpRect=vp.getBoundingClientRect();
  const marks=_bookmarks.filter(b=>b.ch===bookIdx);
  marks.forEach(bk=>{
    const ord=bk.ord;
    const side=bk.side||'b';
    if(ord<0||ord>blocks.length) return;
    // side='b'：锚在 blocks[ord] 的首 fragment（ord==blocks.length 越界时退化为
    // 末块的末 fragment，兼容旧数据里 ord==章末 的写法）。
    // side='a'：锚在 blocks[ord-1] 的末 fragment；ord<=0 时无上一块，跳过不画。
    let refEl, wantLast;
    if(side==='a'){
      if(ord<=0) return;
      refEl=blocks[ord-1]; wantLast=true;
    } else {
      const isEnd=(ord>=blocks.length);
      refEl=isEnd?blocks[blocks.length-1]:blocks[ord];
      wantLast=isEnd;
    }
    if(!refEl) return;
    const page=_bkFragPage(refEl, wantLast);
    if(page!==_pageIdx) return;   // 只画当前页
    const r=_bkFragRect(refEl, wantLast);
    if(!r) return;
    // 块间距一半，用相邻块的行距估算（默认 12px 兜底，正文行高 1.85 时约 0.9em）
    const gapHalf=10;
    const y = (side==='a' ? (r.bottom - vpRect.top + gapHalf) : (r.top - vpRect.top - gapHalf));
    const x1 = r.left - vpRect.left;
    const x2 = r.right - vpRect.left;
    const el=document.createElement('div');
    el.className='bk-line';
    el.dataset.bkId=bk.id;
    el.style.left=x1+'px';
    el.style.width=(x2-x1)+'px';
    el.style.top=y+'px';
    el.innerHTML=`<span class="bk-chip"><span class="bk-chip-date">${fmtBkDate(bk.added_at)}</span><span class="bk-chip-del">✕ 移除</span></span>`;
    layer.appendChild(el);
  });
}

/* 跳转落点闪烁：给对应线加 1.1s 微光动画一次 */
function _flashBkLine(id){
  requestAnimationFrame(()=>{
    const el=document.querySelector(`.bk-line[data-bk-id="${id}"]`);
    if(!el) return;
    el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
  });
}

/* 正文点击（书模式）—— 误触方案 A 后，正文/空白一律免费：
   这里只保留「点书签线 = 切换删除」，放置改由左页边书签槽 #bkSlot 触发。
   删除仍保留焦点保护（书签无撤销，防"点窗激活即误删"这一击）。 */
function _bkHandlePagerClick(e){
  if(!bookMode) return;
  if(e.target.closest('.bk-line')){
    // 焦点保护：窗口刚被这一击激活的话，只当激活，不删
    if(performance.now()-_winFocusTs < BK_FOCUS_GUARD_MS) return;
    const id=e.target.closest('.bk-line').dataset.bkId;
    const bk=_bookmarks.find(b=>b.id===id);
    if(bk) _bkDelete(bk);
    return;
  }
  /* 其它一律不处理——点正文/空白 100% 自由（书签只经页缘书签槽放置）。 */
}

/* 只按 Y 找当前页最近的段落边界（页缘书签槽用；X 完全不参与）——
   复用 _bkBoundaries（已按当前页可见 fragment 过滤），取 |y-边界Y| 最小者。 */
function _bkBoundaryAtY(clientY){
  const blocks=_bkBlocks(); if(!blocks.length) return null;
  const vp=document.getElementById('pagerViewport'); if(!vp) return null;
  const boundaries=_bkBoundaries(blocks, vp.getBoundingClientRect());
  if(!boundaries.length) return null;
  let best=null, bd=Infinity;
  boundaries.forEach(en=>{
    const ey=(en.side==='b'?en.rect.top:en.rect.bottom);
    const d=Math.abs(clientY-ey);
    if(d<bd){ bd=d; best=en; }
  });
  return best;   // {ord, side, rect}
}

/* 在命中边界处落书签（书模式）——同一 (ch,ord) 已存在则切换删除。
   page/frac 采集用命中边界本身的 fragment（跨列时整块联合矩形会算错页/纵向比例）。 */
function _bkPlaceAtBoundary(hit){
  const { ord, side }=hit;
  const existing=_bkFind(bookIdx, ord);
  if(existing){ _bkDelete(existing); return; }
  const vp=document.getElementById('pagerViewport'); if(!vp) return;
  const vpRect=vp.getBoundingClientRect();
  const blocks=_bkBlocks();
  const page=_bkFragPage(blocks[side==='b'?ord:ord-1], side==='a');
  const lineTopInPage = (side==='b' ? hit.rect.top : hit.rect.bottom) - vpRect.top;
  const {snap, frac}=_bkSnapshot(blocks, ord, page, lineTopInPage);
  const bk={
    id:_bkId(), ch:bookIdx, ord, side, added_at: Date.now()/1000,
    excerpt:_bkExcerpt(blocks, ord), snap, frac,
  };
  _bookmarks.push(bk);
  _bookmarks.sort((a,b)=> a.ch-b.ch || a.ord-b.ord);
  _renderBkLayer();
  _renderBkGrid();
  scheduleSave();
}

/* 页缘书签槽（书模式）鼠标交互：移动→armed + ＋跟随行高 + 版心落线预览；点→放置。 */
function _bkSlotMove(e){
  const slot=document.getElementById('bkSlot');
  const plus=slot && slot.querySelector('.bk-slot-plus');
  const guide=document.getElementById('bkSlotGuide');
  const vp=document.getElementById('pagerViewport');
  const hit=_bkBoundaryAtY(e.clientY);
  if(!hit || !vp){ if(slot)slot.classList.remove('armed'); if(guide)guide.classList.remove('show'); return; }
  const vpRect=vp.getBoundingClientRect();
  const ey=(hit.side==='b'?hit.rect.top:hit.rect.bottom);
  const gapHalf=10;
  const y=(ey - vpRect.top) + (hit.side==='a'?gapHalf:-gapHalf);   // 与 _renderBkLayer 落线一致
  if(plus) plus.style.top=y+'px';
  if(slot) slot.classList.add('armed');
  if(guide){ guide.style.top=y+'px'; guide.classList.add('show'); }
}
function _bkSlotLeave(){
  const slot=document.getElementById('bkSlot'), guide=document.getElementById('bkSlotGuide');
  if(slot) slot.classList.remove('armed');
  if(guide) guide.classList.remove('show');
}
function _bkSlotClick(e){
  e.stopPropagation();
  const hit=_bkBoundaryAtY(e.clientY);
  if(hit) _bkPlaceAtBoundary(hit);
}

/* 开卷一次性提示：每会话第一次进入阅读时，让页边书签槽的细线亮一下，帮用户发现它。
   书模式/文章模式共用一次（同一手势，学一次就够）。 */
let _barPeekShown=false;
function _barToolsPeekOnce(){
  if(_barPeekShown) return; _barPeekShown=true;
  const t=document.getElementById('barTools'); if(!t) return;
  t.classList.add('peek'); setTimeout(()=>t&&t.classList.remove('peek'), 1600);
}
let _bkSlotIntroShown=false;
function _bkSlotIntro(id){
  if(_bkSlotIntroShown) return;
  _bkSlotIntroShown=true;
  const el=document.getElementById(id); if(!el) return;
  el.classList.add('intro');
  setTimeout(()=>el && el.classList.remove('intro'), 1800);
}

function pagePrev(){
  if(_pageIdx>0){
    _pageIdx--;
    _applyPageTransform();
    _updatePagerBar();
    _renderBkLayer();
    _renderDotLayer();
    scheduleSave();   // 记住页码
  } else if(bookIdx>0){
    /* 第一页再往前 → 上一章（落在第0页，best-effort） */
    gotoChapter(bookIdx-1);
  }
}

function pageNext(){
  if(_pageIdx<_pageTotal-1){
    _pageIdx++;
    _applyPageTransform();
    _updatePagerBar();
    _renderBkLayer();
    _renderDotLayer();
    scheduleSave();   // 记住页码
  } else if(bookIdx<bookCount-1){
    /* 最后一页再往后 → 下一章 */
    gotoChapter(bookIdx+1);
  }
}

/* resize 时重算页数 */
let _resizeTimer=null;
window.addEventListener('resize',()=>{
  if(!bookMode) return;
  clearTimeout(_resizeTimer);
  _resizeTimer=setTimeout(_initPager, 120);
});

/* ----- D. 目录抽屉 ----- */
function renderTocList(){
  const tocList=document.getElementById('tocList');
  if(!tocList||!bookToc.length) return;
  tocList.innerHTML=bookToc.map((t,i)=>
    `<button class="toc-item${i===bookIdx?' current':''}" data-idx="${i}">${escapeHtml(`第 ${i+1} 章 · ${t.title}`)}</button>`
  ).join('');
  tocList.addEventListener('click',e=>{
    const btn=e.target.closest('.toc-item'); if(!btn) return;
    const idx=+btn.dataset.idx;
    closeTocDrawer();
    gotoChapter(idx);
  },{once:false});
}

function openTocDrawer(tab){
  /* 刷新高亮 */
  document.querySelectorAll('.toc-item').forEach((b,_)=>{
    b.classList.toggle('current', +b.dataset.idx===bookIdx);
  });
  document.getElementById('tocOverlay').classList.add('show');
  document.getElementById('tocDrawer').classList.add('open');
  _switchTocTab(tab||'toc');
}

function closeTocDrawer(){
  const ov=document.getElementById('tocOverlay');
  const dr=document.getElementById('tocDrawer');
  if(ov) ov.classList.remove('show');
  if(dr) dr.classList.remove('open');
}

/* ----- 目录抽屉「目录 | 书签」双 tab 切换 ----- */
function _switchTocTab(tab){
  const tabToc=document.getElementById('tocTabToc'), tabBk=document.getElementById('tocTabBk');
  const paneToc=document.getElementById('tocPaneToc'), paneBk=document.getElementById('tocPaneBk');
  if(!tabToc||!tabBk||!paneToc||!paneBk) return;
  const onBk=(tab==='bk');
  tabToc.classList.toggle('on', !onBk);
  tabBk.classList.toggle('on', onBk);
  paneToc.classList.toggle('on', !onBk);
  paneBk.classList.toggle('on', onBk);
  if(onBk) _renderBkGrid();
}

/* ----- 书签网格（缩略图，两列）-----
   排序按 (ch, ord) 书内先后；点击格子跳转：若 ch != bookIdx 先换章，
   渲染完成后 blocks[ord] → _pageOfElement 算页 → 翻页 → 线闪烁。 */
function _renderBkGrid(){
  const grid=document.getElementById('bkGrid');
  const cnt=document.getElementById('bkTabCount');
  if(cnt) cnt.textContent=String(_bookmarks.length);
  if(!grid) return;
  if(!_bookmarks.length){
    grid.innerHTML='<div class="bk-grid-empty">还没有书签。阅读时把鼠标移到正文左侧页边，点一下即可放置。</div>';
    return;
  }
  const sorted=[..._bookmarks].sort((a,b)=> a.ch-b.ch || a.ord-b.ord);
  grid.innerHTML=sorted.map(bk=>{
    const chapTitle=(bookToc[bk.ch]&&bookToc[bk.ch].title)||`第 ${bk.ch+1} 章`;
    return `<div class="bk-cell" data-bk-id="${bk.id}" title="${escapeHtml(bk.excerpt||'')}">
      <div class="bk-thumb">${_bkThumbHtml(bk)}</div>
      <div class="bk-cap"><b>第 ${bk.ch+1} 章</b>${fmtBkDate(bk.added_at)}</div>
    </div>`;
  }).join('');
}
function _bkThumbHtml(bk){
  const snap=bk.snap||[];
  const inner=snap.map(s=>`<${s.t}>${escapeHtml(s.x||'')}</${s.t}>`).join('');
  const frac=(typeof bk.frac==='number')?bk.frac:0.5;
  const del=`<button class="bk-thumb-x" data-bk-id="${bk.id}" title="删除">✕</button>`;
  return `<div class="bk-thumb-in">${inner}</div><div class="bk-thumb-line" style="top:${(frac*100).toFixed(1)}%"></div>${del}`;
}
/* #bkGrid 是静态 DOM（在 index.html 里只出现一次，不随 renderBook 重建），
   事件在脚本初始化时绑定一次即可，无需每次 render 重绑。 */
document.getElementById('bkGrid')?.addEventListener('click', async e=>{
  const delBtn=e.target.closest('.bk-thumb-x');
  if(delBtn){
    e.stopPropagation();
    const bk=_bookmarks.find(b=>b.id===delBtn.dataset.bkId);
    if(bk) _bkDelete(bk);
    return;
  }
  const cell=e.target.closest('.bk-cell'); if(!cell) return;
  const bk=_bookmarks.find(b=>b.id===cell.dataset.bkId); if(!bk) return;
  closeTocDrawer();
  await _bkJumpTo(bk);
});

/* 跳转到某条书签：若不同章先换章，渲染完成后按 (ch,ord) 现算页码并翻页、闪烁 */
async function _bkJumpTo(bk){
  if(bk.ch!==bookIdx){
    await gotoChapter(bk.ch);
  }
  // gotoChapter/renderChapterContent 内部有 setTimeout(_initPager,100)，
  // 这里等它跑完再取块几何，避免 _pageW 还是旧值
  await new Promise(res=>setTimeout(res, 140));
  const blocks=_bkBlocks();
  const ord=Math.min(bk.ord, blocks.length);
  const side=bk.side||'b';
  // 与 _renderBkLayer 同一套 side 判定：side='a' 锚在 ord-1 的末 fragment，
  // side='b' 锚在 ord 的首 fragment（ord==章末退化为末块末 fragment）。
  let refEl, wantLast;
  if(side==='a' && ord>0){ refEl=blocks[ord-1]; wantLast=true; }
  else { const isEnd=(ord>=blocks.length); refEl=isEnd?blocks[blocks.length-1]:blocks[ord]; wantLast=isEnd; }
  if(refEl){
    const page=_bkFragPage(refEl, wantLast);
    if(page!==_pageIdx){ _pageIdx=page; _applyPageTransform(); _updatePagerBar(); _renderBkLayer(); _renderDotLayer(); }
  }
  _flashBkLine(bk.id);
}

/* ----- E. gotoChapter ----- */
async function gotoChapter(idx){
  if(idx<0||idx>=bookCount) return;
  setBusy(true);
  try{
    const r=await api().load_chapter({idx});
    if(r.error){ setStatus('❌ '+r.error, true); setBusy(false); return; }
    bookIdx=r.chapter_idx!=null?r.chapter_idx:idx;
    _pageIdx=0;
    renderChapterContent(r);
    updateBookBar();
    /* 刷新目录高亮 */
    document.querySelectorAll('.toc-item').forEach(b=>{
      b.classList.toggle('current', +b.dataset.idx===bookIdx);
    });
    switchTab('ex');
    refreshNbCount();
    panelEx.innerHTML='<div class="ex-empty">点正文里任意单词看讲解（蓝色是系统标的生词）。</div>';
    /* 预热轮询（后端 load_chapter 已自动 start_pregen） */
    _bookStartPregenPoll();
    scheduleSave();   // 换章后记录新章节进度
  }catch(e){ setStatus('❌ '+(e.message||e), true); }
  finally{ setBusy(false); }
}

/* ----- 预热状态轮询（只轮询，不调 start_pregen） ----- */
function _bookStartPregenPoll(){
  stopPregenPoll();
  if(!llmOn||!pregenChk.checked) return;
  /* 直接开始轮询，后端已自动起了 pregen */
  pregenTimer=setInterval(pollPregen, 600);
  pollPregen();
}

/* ----- F. jumpToContext / locateInArticle 书模式适配 ----- */
/* 覆盖原 locateInArticle：书模式下额外跳页 */
const _origLocateInArticle=locateInArticle;
function locateInArticle(lemma){
  _origLocateInArticle(lemma);
  if(bookMode) _jumpToPageOfEl(curEl);
}
function _jumpToPageOfEl(el){
  if(!el||!bookMode) return;
  const inner=document.getElementById('readingInner');
  if(!inner) return;
  /* offsetLeft 相对于 inner（column container）*/
  const col=Math.floor(el.offsetLeft/(_pageW+_pageGap));
  if(col>=0 && col<_pageTotal && col!==_pageIdx){
    _pageIdx=col;
    _applyPageTransform();
    _updatePagerBar();
    _renderBkLayer();
    _renderDotLayer();
  }
}

/* ============================================================
   END 书模式
   ============================================================ */

/* ============================================================
   阅读沉浸：环形浮标菜单 + 顶栏淡出 + 阅读进度
   ============================================================ */
(function(){
  const rfm=document.getElementById('rfm'), fab=document.getElementById('rfmFab');
  if(!rfm||!fab) return;
  const petals=[].slice.call(rfm.querySelectorAll('.petal'));
  const labels=[].slice.call(rfm.querySelectorAll('.lbl'));
  const Rc=124, RL=160, START=0, END=90, n=petals.length;
  petals.forEach((p,i)=>{
    const t=n>1?i/(n-1):0, rad=(START+(END-START)*t)*Math.PI/180;
    const cx=Math.cos(rad), sy=Math.sin(rad);
    p.style.setProperty('--x',(cx*Rc).toFixed(1)+'px');
    p.style.setProperty('--y',(-sy*Rc).toFixed(1)+'px');
    p.style.transitionDelay=(0.03+0.04*i)+'s';
    if(labels[i]){ labels[i].style.setProperty('--lx',(cx*RL).toFixed(1)+'px'); labels[i].style.setProperty('--ly',(-sy*RL).toFixed(1)+'px'); }
  });
  const closeMenu=()=>rfm.classList.remove('open');

  /* the moon FAB is draggable: a clean tap toggles the petal menu, a drag relocates
     it anywhere (position persists). Petals still fan up-right from wherever it lands. */
  const RFM_KEY='situ_rfm_pos';
  try{ const s=JSON.parse(localStorage.getItem(RFM_KEY)||'null');
       if(s){ rfm.style.left=s.x+'px'; rfm.style.top=s.y+'px'; rfm.style.bottom='auto'; } }catch(_){}
  let drag=null, moved=false;
  fab.addEventListener('pointerdown',e=>{
    e.stopPropagation();
    const r=rfm.getBoundingClientRect();
    drag={dx:e.clientX-r.left, dy:e.clientY-r.top, sx:e.clientX, sy:e.clientY}; moved=false;
    try{ fab.setPointerCapture(e.pointerId); }catch(_){}
  });
  fab.addEventListener('pointermove',e=>{
    if(!drag) return;
    if(!moved && Math.abs(e.clientX-drag.sx)+Math.abs(e.clientY-drag.sy)>4) moved=true;
    if(!moved) return;
    const b=rfm.getBoundingClientRect();
    rfm.style.left=Math.max(6,Math.min(e.clientX-drag.dx, window.innerWidth-b.width-6))+'px';
    rfm.style.top =Math.max(6,Math.min(e.clientY-drag.dy, window.innerHeight-b.height-6))+'px';
    rfm.style.bottom='auto';
  });
  fab.addEventListener('pointerup',e=>{
    if(!drag) return;
    try{ fab.releasePointerCapture(e.pointerId); }catch(_){}
    if(moved){
      const r=rfm.getBoundingClientRect();
      try{ localStorage.setItem(RFM_KEY, JSON.stringify({x:Math.round(r.left), y:Math.round(r.top)})); }catch(_){}
    } else { rfm.classList.toggle('open'); }   // clean tap → toggle the menu
    drag=null;
  });
  document.addEventListener('click',e=>{ if(rfm.classList.contains('open') && !e.target.closest('#rfm')) closeMenu(); });

  /* petal actions reuse the existing controls */
  const FS_ORDER=['small','medium','large','xlarge'];
  function cycleFontSize(){
    let cur=localStorage.getItem('santu_fs')||'medium';
    const i=FS_ORDER.indexOf(cur); setFontSize(FS_ORDER[(i+1)%FS_ORDER.length]);
  }
  function cycleTheme(){
    const sws=[].slice.call(document.querySelectorAll('.themebar .sw'));
    if(!sws.length) return;
    const cur=document.body.dataset.theme;
    let i=sws.findIndex(s=>s.dataset.theme===cur); if(i<0) i=0;
    sws[(i+1)%sws.length].click();
  }
  const ACTS={
    shelf: ()=>{ const b=document.getElementById('libBtn'); if(b) b.click(); },
    toc:   ()=>{ if(bookMode) openTocDrawer(); else setStatus('本文没有章节目录', false); },
    size:  cycleFontSize,
    theme: cycleTheme,
    read:  ()=>{ const b=document.getElementById('readBtn'); if(b && b.style.display!=='none') b.click(); },
    add:   ()=>{ const f=document.getElementById('file'); if(f) f.click(); },
  };
  petals.forEach(p=>p.addEventListener('click',e=>{ e.stopPropagation(); const fn=ACTS[p.dataset.act]; if(fn) fn(); closeMenu(); }));

  /* thin reading-progress line (article mode; book mode keeps its own pager) */
  const prog=document.querySelector('#readProg > i');
  function updateProg(){
    if(!prog || bookMode) return;
    const max=reading.scrollHeight-reading.clientHeight;
    prog.style.width=(max>0?Math.min(100,reading.scrollTop/max*100):0).toFixed(1)+'%';
  }
  if(reading) reading.addEventListener('scroll',updateProg,{passive:true});
})();
