<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="color-scheme" content="light dark">
<title>三土 · 英语阅读</title>
<style>
/* 本地字体（原 Google Fonts <link> 会同步阻塞首屏，用户网络走代理时慢/断会导致
   长时间白屏；改成本地 woff2 + font-display:swap，启动不再等外网）。
   Bitter 是 variable font（wght 轴 100–900），一个文件覆盖 400/500/600。 */
@font-face{font-family:'Bitter';font-style:normal;font-weight:100 900;font-display:swap;
  src:url('assets/fonts/bitter-normal.woff2') format('woff2');}
@font-face{font-family:'Bitter';font-style:italic;font-weight:400;font-display:swap;
  src:url('assets/fonts/bitter-italic.woff2') format('woff2');}
@font-face{font-family:'Spectral';font-style:normal;font-weight:400;font-display:swap;
  src:url('assets/fonts/spectral-400.woff2') format('woff2');}
@font-face{font-family:'Spectral';font-style:normal;font-weight:500;font-display:swap;
  src:url('assets/fonts/spectral-500.woff2') format('woff2');}
@font-face{font-family:'Spectral';font-style:normal;font-weight:600;font-display:swap;
  src:url('assets/fonts/spectral-600.woff2') format('woff2');}
@font-face{font-family:'Spectral';font-style:italic;font-weight:400;font-display:swap;
  src:url('assets/fonts/spectral-italic-400.woff2') format('woff2');}
:root{
  --bg:#f7f2e8; --paper:#fffdf7; --fg:#34302a; --muted:#a89c86; --border:#e9e0cd;
  --accent:#9c7a3e; --accent-soft:rgba(156,122,62,.13);
  --clay:#b1623c; --marker:rgba(190,150,80,.30);
  --article-fs:17px;
  --read-font:'Bitter',Georgia,"PingFang SC",serif;  /* 正文阅读字体（用户选定 Bitter） */
  /* 生词本分层调色盘：冷暖交替（绿·琥珀·黛蓝·陶红·黛紫·橄榄），低饱和档案调——
     相邻档冷暖跳变 → 一眼可分；都压暗故整体仍和谐（"色彩呼吸"）。三个排序维度共用。 */
  --fA:#5f7a58; --fB:#4a6b85; --fC:#71628a; --fD:#ad5f48; --fE:#b0894a;  /* 频率 A→E：绿蓝紫红黄 */
  --c1:#5f7a58; --c2:#b0894a; --c3:#4a6b85; --c4:#ad5f48;                /* 点击 1→4+ */
  --h0:#5f7a58; --h1:#b0894a; --h2:#4a6b85; --h3:#ad5f48; --h4:#71628a; --h5:#8a8048; /* 章节/出处轮转 */
  /* 色块高亮呼吸盘七色：琥珀·豆绿·黛蓝·陶红·黛紫·橄榄·藕粉（低饱和纸感，逐字照抄已批准 mockup） */
  --cA:#b0894a; --cB:#5f7a58; --cC:#4a6b85; --cD:#ad5f48; --cE:#71628a; --cF:#8a8048; --cP:#b3798b;
  --wA:rgba(176,137,74,.30); --wB:rgba(95,122,88,.26); --wC:rgba(74,107,133,.22);
  --wD:rgba(173,95,72,.22);  --wE:rgba(113,98,138,.22); --wF:rgba(138,128,72,.26); --wP:rgba(179,121,139,.24);
  /* 首页书墙/剪报盒专用：黛蓝油墨（标题/序号点缀，非满屏）+ 封面套色轮转七色（逐字照抄 homepage-mock.html） */
  --ink:#4a6b85;
  --amber:#b0894a; --green:#5f7a58; --navy:#4a6b85; --clay:#ad5f48; --plum:#71628a; --olive:#8a8048; --mauve:#b3798b;
  --han:'LXGW WenKai','PingFang SC',system-ui,sans-serif;
}
/* vocab ink themes — chrome accent stays ochre; a theme only sets --vc/--vr/--cur */
body[data-theme="blue"]      {--vc:#3a5d7d;--vr:#8eafc6;--cur:rgba(58,93,125,.13)}
body[data-theme="indigo"]    {--vc:#45487e;--vr:#9396c0;--cur:rgba(69,72,126,.13)}
body[data-theme="teal"]      {--vc:#2f6b62;--vr:#83b1a9;--cur:rgba(47,107,98,.13)}
body[data-theme="terracotta"]{--vc:#a4542a;--vr:#c79169;--cur:rgba(164,84,42,.13)}

*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg);color:var(--fg);
  font:15px/1.6 -apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Helvetica,Arial,sans-serif}
/* position:fixed + inset:0 pins #app to the exact window rect — bulletproof against
   the WKWebView percentage-height quirk (height:100% resolved SHORT, leaving dead
   space under the page bar; 100vh overshot the transparent titlebar instead).
   padding-top:30px is the slim strip that keeps the macOS traffic-lights clear of the
   top bar (home) / book-bar (reading) alike. */
#app{position:fixed;inset:0;display:flex;flex-direction:column;padding-top:30px}

/* ---------------- top bar ---------------- */
.topbar{flex-shrink:0;background:var(--paper);border-bottom:1px solid var(--border);
  padding:8px 22px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.brand{font-size:19px;font-weight:600;letter-spacing:.2em;color:var(--fg);white-space:nowrap}
.brand .dot{color:var(--accent)}
.url-wrap{flex:1;min-width:240px;display:flex;gap:8px}
input[type=text]{flex:1;padding:9px 13px;font-size:14px;border:1px solid var(--border);border-radius:10px;
  background:#fff;outline:none;font-family:inherit}
input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
button{font-family:inherit;cursor:pointer}
.btn{padding:9px 16px;font-size:14px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-weight:500}
.btn:hover{filter:brightness(1.06)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.ghost{background:transparent;color:var(--fg);border:1px solid var(--border)}
.btn.ghost:hover{border-color:var(--accent);color:var(--accent);filter:none;background:var(--accent-soft)}
select{padding:8px 9px;border:1px solid var(--border);border-radius:9px;background:#fff;font-family:inherit;font-size:13px}

.themebar{display:flex;align-items:center;gap:6px}
.sw{width:18px;height:18px;border-radius:50%;border:2px solid var(--paper);box-shadow:0 0 0 1px var(--border);cursor:pointer;padding:0}
.sw.active{box-shadow:0 0 0 2px var(--fg)}
.pg{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);white-space:nowrap;cursor:pointer}
.pg input{cursor:pointer}

.navpill{display:none;align-items:center;gap:4px;background:#fff;border:1px solid var(--border);
  border-radius:999px;padding:3px 5px}
.navpill.show{display:flex}
.navpill .lbl{font-size:12px;color:var(--muted);padding:0 6px;white-space:nowrap}
.navpill button{border:none;background:none;color:var(--fg);font-size:15px;line-height:1;
  padding:4px 8px;border-radius:999px;min-width:28px}
.navpill button:hover{background:var(--accent-soft);color:var(--accent)}
.navpill .pos{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:46px;text-align:center}

/* ---------------- status ---------------- */
/* status is a FLOATING toast (position:fixed) — it must never take a layout row,
   otherwise showing/hiding it (e.g. "讲解预备中…") shoves the book-bar down then
   lets it jump back up, and steals height from the bottom page bar. */
.status{position:fixed;left:12px;top:50%;transform:translateY(-50%);
  display:none;writing-mode:vertical-rl;max-height:72vh;
  padding:13px 6px;font-size:12.5px;border-radius:13px;letter-spacing:.08em;line-height:1.5;
  background:var(--accent-soft);color:var(--accent);
  box-shadow:0 8px 22px rgba(70,50,20,.16);z-index:75;overflow:hidden}
.status.show{display:block}
.status.err{background:#f6e4dc;color:#a4452a}

/* ---------------- body: reading + panel ---------------- */
.main{flex:1;display:flex;min-height:0}
.reading{flex:1;overflow:auto;padding:44px 44px 120px}
.reading-inner{max-width:680px;margin:0 auto}
.reading,.reading-inner,.reading .w,.reading .vocab,.reading .sent,.reading p,.reading li,
.reading h1,.reading h2,.reading h3,.reading blockquote{
  -webkit-user-select:text;user-select:text;cursor:text}
.reading .w,.reading .vocab{cursor:pointer}

.hint{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--muted);text-align:center;gap:14px;padding:30px}
.hint .big{font-size:42px;line-height:1;color:var(--accent);font-family:'Spectral',Georgia,serif}
.hint code{background:#fff;border:1px solid var(--border);border-radius:5px;padding:1px 6px;font-family:"SF Mono",Menlo,monospace}
.drop{margin-top:8px;border:1.5px dashed var(--border);border-radius:12px;padding:16px 26px;font-size:13px;cursor:pointer;transition:.15s}
.drop:hover,.drop.over{border-color:var(--accent);background:var(--accent-soft);color:var(--fg)}
/* full-window drag veil — appears while dragging a file anywhere over the window */
.dragveil{position:fixed;inset:0;z-index:100000;display:none;align-items:center;justify-content:center;
  background:rgba(40,30,14,.30);-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
.dragveil.show{display:flex}
.dragveil-card{display:flex;flex-direction:column;align-items:center;gap:9px;
  padding:46px 64px;border-radius:20px;border:2px dashed rgba(255,255,255,.7);
  background:rgba(255,255,255,.10);color:#fff;text-align:center;pointer-events:none}
.dragveil-icon{font-size:40px;line-height:1;opacity:.92;animation:dvbob 1.1s ease-in-out infinite}
@keyframes dvbob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
.dragveil-title{font:600 22px/1 'Spectral',Georgia,serif;letter-spacing:.04em}
.dragveil-sub{font-size:13px;opacity:.85}

/* article typography */
article{font:var(--article-fs)/1.85 var(--read-font);color:#322d25;letter-spacing:.02em;word-spacing:.10em}
article h2{font-size:1.3em;font-weight:600;line-height:1.4;margin:1.7em 0 .55em;font-family:var(--read-font);color:var(--fg);letter-spacing:.01em}
article h3{font-size:1.06em;font-weight:600;color:#3a382f;margin:1.4em 0 .45em;font-family:var(--read-font);letter-spacing:.01em}
article h1.doc-title{font-size:1.76em;line-height:1.28;margin:0 0 8px;font-family:var(--read-font);color:var(--fg);letter-spacing:.005em}
/* 文章封面「特写开场」：满栏宽、按原图比例完整显示（不裁切，用户要求）、软阴影+细线框，印刷特写感。加载失败自 remove。 */
.doc-cover{display:block;width:100%;height:auto;border-radius:6px;
  margin:2px 0 22px;background:var(--paper);box-shadow:0 12px 26px -18px rgba(70,45,12,.5),inset 0 0 0 1px rgba(70,45,12,.06)}
.doc-meta{color:var(--muted);font-size:12.5px;margin-bottom:32px;font-family:-apple-system,sans-serif}
/* 来源超链接：点击在系统浏览器打开原文（走 open_external 桥，不在应用内导航） */
.doc-src-link{color:var(--accent);text-decoration:none;border-bottom:1px solid transparent;cursor:pointer}
.doc-src-link:hover{border-bottom-color:currentColor}
article p{margin:0 0 1.2em;text-align:justify;-webkit-hyphens:auto;hyphens:auto}

/* vocab highlighting */
.vocab{background:none;color:var(--vr);cursor:pointer;transition:color .15s,background .2s;border-radius:4px}
.vocab[data-freq="common"]{color:var(--vc)}
.vocab:hover{background:var(--cur)}
mark.vocab{font-style:normal}
.w{cursor:pointer;border-radius:4px;transition:background .15s}
.w:hover{background:var(--cur)}
.vocab.current,.w.current{background:var(--cur);box-shadow:0 0 0 3px var(--cur);animation:cur-in .45s ease-out}
@keyframes cur-in{0%{box-shadow:0 0 0 7px var(--cur)}100%{box-shadow:0 0 0 3px var(--cur)}}

/* ---------------- explanation panel ---------------- */
.panel{width:372px;flex-shrink:0;border-left:1px solid var(--border);background:var(--paper);
  display:flex;flex-direction:column;min-height:0}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-tabs button{flex:1;padding:13px 8px;border:none;background:none;font-size:13px;color:var(--muted);
  border-bottom:2px solid transparent}
.panel-tabs button.active{color:var(--fg);border-bottom-color:var(--accent);font-weight:600}
.panel-body{flex:1;overflow:auto;padding:24px 22px 40px}

.ex-empty{color:var(--muted);font-size:13px;line-height:1.85;text-align:center;margin-top:60px}
.ex-word{font:600 27px/1.15 'Spectral',Georgia,serif;color:var(--fg);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ex-word .ph{font:400 14px/1 -apple-system,sans-serif;color:var(--accent)}
.say{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;
  border:none;background:none;border-radius:50%;cursor:pointer;padding:0;flex:none;
  color:var(--accent);vertical-align:middle;transition:background .14s}
.say:hover{background:var(--accent-soft)}
.say:active{transform:scale(.92)}
.say-i{display:block;width:16px;height:16px}
.kw-collect{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;
  border:none;background:none;border-radius:50%;cursor:pointer;padding:0;flex:none;margin-top:-1px;
  color:var(--muted);vertical-align:middle;transition:background .14s,color .14s}
.kw-collect:hover{background:var(--accent-soft);color:var(--accent)}
.kw-collect:active{transform:scale(.92)}
.kw-collect.on{color:var(--accent);background:var(--accent-soft);cursor:default}
.kw-collect .say-i{width:15px;height:15px}
#accentBtn{min-width:46px;text-align:center}
#accentBtn.accent-us{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}
.ex-pos{font-size:12.5px;color:var(--muted);margin:8px 0 20px}
.ex-row{margin-bottom:16px}
.ex-row .lbl{display:inline-block;font-size:11px;color:#fff;background:var(--accent);
  border-radius:5px;padding:2px 8px;margin-bottom:6px;letter-spacing:.04em}
.ex-row .val{font-size:15px;line-height:1.7;color:var(--fg)}
.ex-talk{margin-top:18px;padding:14px 16px;background:var(--accent-soft);border-radius:12px;
  font-size:14.5px;line-height:1.85;color:var(--fg)}
.ex-talk .lbl{font-size:11px;color:var(--accent);font-weight:600;letter-spacing:.06em;display:block;margin-bottom:6px}
.ex-talk b{color:var(--accent)}
.ex-talk ul{margin:6px 0 0;padding-left:18px}
.ex-sel{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.ex-sel-kind{font-size:11px;color:#fff;background:var(--accent);border-radius:5px;padding:2px 9px;letter-spacing:.06em}
.ex-seltext{font:600 17px/1.55 'Spectral',Georgia,serif;color:var(--fg);margin-bottom:17px;padding:9px 13px;
  background:var(--marker);border-left:3px solid var(--accent);border-radius:0 6px 6px 0}
.ex-kw{margin:6px 0 0;padding:0;list-style:none}
.ex-kw li{display:flex;align-items:flex-start;gap:6px;font-size:14px;line-height:1.7;color:var(--fg);
  padding:5px 0;border-bottom:1px dashed var(--border)}
.ex-kw li:last-child{border-bottom:none}
.ex-kw li .kw-t{flex:1;min-width:0}
.ex-kw li .say{margin-top:-1px}
.ex-kw b{font-family:'Spectral',Georgia,serif;color:var(--accent);margin-right:4px}
.ex-kw .g{color:#5c5852}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--accent-soft);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{color:var(--muted);font-size:13px;margin-top:30px;text-align:center}
.ex-actions{margin-top:20px}
.ex-actions .loc{width:100%;font-size:13px;padding:9px 12px;display:flex;align-items:center;justify-content:center;gap:6px}

/* follow-up Q&A */
.ask{margin-top:22px;padding-top:16px;border-top:1px solid var(--border)}
.ask-hd{font-size:11px;color:var(--muted);letter-spacing:.08em;margin-bottom:11px}
.ask-thread{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.ask-thread:empty{display:none}
.ask-q{align-self:flex-end;max-width:88%;background:var(--accent);color:#fff;font-size:13px;line-height:1.6;
  padding:7px 12px;border-radius:13px 13px 3px 13px;cursor:pointer;user-select:none;transition:filter .12s}
.ask-q:hover{filter:brightness(1.08)}
.ask-q::before{content:'▾';font-size:9px;opacity:.75;margin-right:6px;display:inline-block;
  transform:translateY(-1px);transition:transform .15s}
.ask-q.collapsed::before{transform:translateY(-1px) rotate(-90deg)}
.ask-q.collapsed + .ask-a{display:none}
.ask-a{align-self:flex-start;max-width:95%;background:var(--accent-soft);color:var(--fg);font-size:14px;line-height:1.82;
  padding:10px 13px;border-radius:13px 13px 13px 3px;white-space:normal}
.ask-a b{color:var(--accent)}
.ask-a ul{margin:6px 0;padding-left:18px}
.ask-a.err{background:#f6e7df;color:#9a4422}
.freq-verdict{text-align:center;font-size:17px;font-weight:700;color:var(--accent);
  letter-spacing:.06em;line-height:1.3;margin:1px 0 11px;
  padding-bottom:9px;border-bottom:1px solid var(--accent-soft)}
.freq-verdict small{display:block;font-size:11.5px;font-weight:400;color:var(--muted);
  letter-spacing:.04em;margin-top:3px}
.ask-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:11px}
.ask-chip{border:1px solid var(--border);background:#fff;color:var(--accent);font-size:12.5px;
  padding:6px 12px;border-radius:999px;cursor:pointer;transition:.15s;font-family:inherit}
.ask-chip:hover{background:var(--accent-soft);border-color:var(--accent)}
.ask-input{display:flex;gap:8px;align-items:center}
.ask-input input{flex:1;padding:9px 14px;font-size:13.5px;border:1px solid var(--border);border-radius:999px;
  background:#fff;font-family:inherit;color:var(--fg)}
.ask-input input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.ask-send{flex-shrink:0;border:none;background:var(--accent);color:#fff;font-size:16px;line-height:1;
  width:36px;height:36px;border-radius:50%;cursor:pointer;font-family:inherit}
.ask-send:active{transform:scale(.93)}

/* floating selection toolbar */
.selbar{position:fixed;z-index:9998;display:none;gap:3px;align-items:center;
  background:var(--accent);border-radius:999px;padding:3px;box-shadow:0 6px 18px rgba(70,50,20,.3)}
.selbar.show{display:inline-flex}
.selbar button{border:none;background:none;color:#fff;font:500 12.5px/1 inherit;font-family:inherit;
  padding:6px 12px;border-radius:999px;cursor:pointer;white-space:nowrap}
.selbar button:hover{background:rgba(255,255,255,.18)}
.selbar .sb-del{padding:6px 11px}
/* 划选工具条七色圆点 + 复制（②③④⑥ 色块高亮批次新增，讲解按钮不变、始终第一位） */
.selbar .sb-sep{width:1px;height:14px;background:rgba(255,255,255,.28);flex-shrink:0}
.selbar .sb-c{width:15px;height:15px;border-radius:50%;cursor:pointer;flex-shrink:0;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.35);transition:transform .12s}
.selbar .sb-c:hover{transform:scale(1.15)}
.selbar .sb-c.on{box-shadow:inset 0 0 0 2px #fff}
.selbar .sb-copy{padding:6px 11px}
.selbar .sb-para{padding:6px 11px}
.selbar .sb-collect{display:inline-flex;align-items:center;gap:4px;padding:6px 11px}
.selbar .sb-collect svg{width:13px;height:13px;flex-shrink:0}
/* 圆点 popover 的标签输入（复用 selbar 浮条外观） */
.selbar .dot-label-in{width:52px;border:none;background:rgba(255,255,255,.16);border-radius:999px;
  color:#fff;font:500 12px/1 inherit;font-family:inherit;padding:6px 9px;outline:none}
.selbar .dot-label-in::placeholder{color:rgba(255,255,255,.6)}
.reading .phrase{background:var(--marker);border-radius:4px;padding:.5px 0;cursor:text;
  -webkit-box-decoration-break:clone;box-decoration-break:clone;transition:background .15s}
.reading .phrase:hover{background:rgba(190,150,80,.42)}
.reading .phrase::after{content:"讲";display:inline-flex;align-items:center;justify-content:center;
  width:1.35em;height:1.35em;font:600 .56em/1 -apple-system,"PingFang SC",sans-serif;color:#fff;
  background:var(--accent);border-radius:50%;margin-left:5px;vertical-align:middle;
  position:relative;top:-1px;cursor:pointer;-webkit-user-select:none;user-select:none;transition:background .15s}
.reading .phrase:hover::after{background:#7c5e2e}
/* 色块高亮（划选荧光笔 + 整段色卡）—— 内联 span，背景走内联 style（var(--wX)），
   不设 z-index：.w / mark.vocab / .sent 天然嵌套在其内部，自然叠在高亮之上。 */
.reading .hl{border-radius:4px;padding:.02em .1em;-webkit-box-decoration-break:clone;
  box-decoration-break:clone;cursor:pointer}
.reading .hl.para{display:block;border-radius:10px;padding:13px 16px;margin:0 -16px .9em}

/* ---- 圆点贴（第二批 Phase 2）：右页缘半圆，锚定复用左侧书签槽同一套几何 ----
   .dotwrap 定位容器（absolute right:0，随书模式覆盖层 #dotLayer 或文章模式行内标记摆放），
   .halfdot 平边贴右缘、弧朝版心（mockup ⑤ 逐像素照抄）；hover 浮 .dotlabel 在半圆左侧。 */
.dotwrap{position:absolute;right:0;width:14px;height:28px;pointer-events:auto;cursor:pointer;z-index:7}
.halfdot{width:14px;height:28px;border-radius:28px 0 0 28px;box-shadow:-1px 1px 3px rgba(50,35,12,.22)}
.dotlabel{position:absolute;right:22px;top:3px;background:var(--paper);border:1px solid var(--border);
  color:#6b6252;border-radius:99px;font-size:11px;line-height:1;padding:4px 9px;white-space:nowrap;
  box-shadow:0 2px 6px rgba(50,35,12,.10);opacity:0;pointer-events:none;transition:opacity .13s ease}
.dotwrap:hover .dotlabel{opacity:1}
/* 文章模式：零高度行内标记（同 .bookmark 技术），随 doSave() 的 HTML 快照持久；
   .halfdot 用 position:relative + 负 margin 顶出正文列右缘（.reading-inner 有 max-width:680px
   居中，右侧留白足够半圆露出）。 */
.dotwrap-a{position:relative;height:0;margin:0;cursor:pointer;user-select:none;transform:translateY(-10px)}
.dotwrap-a .halfdot{position:absolute;right:-28px;top:-14px}
.dotwrap-a .dotlabel{right:-6px;top:-11px;transform:translateX(100%)}
::selection{background:rgba(190,150,80,.45)}
.reading ::selection{background:rgba(190,150,80,.5)}

/* read-aloud current sentence */
.reading .sent.reading-now{background:var(--cur);border-radius:5px;
  box-shadow:0 0 0 4px var(--cur);transition:background .2s,box-shadow .2s;scroll-margin-top:90px}

/* playback bar — compact, defaults to top-centre (between 目录 & 章节), drag from any
   blank part of the pill to reposition (position persists) */
.player{position:fixed;left:50%;top:33px;transform:translateX(-50%);
  display:flex;align-items:center;gap:5px;padding:3px 7px;cursor:grab;
  background:var(--paper);border:1px solid var(--border);border-radius:999px;
  box-shadow:0 7px 20px rgba(70,50,20,.15);z-index:60;
  opacity:0;pointer-events:none;transition:opacity .2s}
.player.show{opacity:1;pointer-events:auto}
.player.dragging{transition:none;cursor:grabbing;box-shadow:0 11px 28px rgba(70,50,20,.24)}
.pl-btn{display:inline-flex;align-items:center;justify-content:center;width:25px;height:25px;
  border:none;border-radius:50%;background:var(--accent);color:#fff;cursor:pointer;
  font-size:9.5px;line-height:1;padding:0;transition:filter .14s,transform .1s}
.pl-btn:hover{filter:brightness(1.08)}
.pl-btn:active{transform:scale(.92)}
.pl-btn.mini{width:21px;height:21px;background:none;color:var(--muted);font-size:12px}
.pl-btn.mini:hover{background:var(--accent-soft);color:var(--accent);filter:none}
.pl-follow{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--fg);
  cursor:pointer;user-select:none;white-space:nowrap}
.pl-follow input{accent-color:var(--accent);cursor:pointer}
.pl-sep{width:1px;height:15px;background:var(--border)}

/* bookmark marker — V1 定稿：发丝渐隐细线 + 右端纯文字日期签（无 emoji），
   hover 变「✕ 移除」，无常驻 ✕。视觉与书模式 .bk-line 同一套（见 #bkLayer 附近注释）。 */
/* transform 把书签线+日期签整体上提 10px 落到段落间隙正中（与书模式 _renderBkLayer 的 gapHalf=10 一致），
   纯视觉位移不引发回流，故放置仍零错位（预览锚点 _artAnchorY 已同步减 10）。 */
.bookmark{position:relative;height:0;margin:0;cursor:pointer;user-select:none;scroll-margin-top:80px;transform:translateY(-10px)}
.bookmark::before{content:"";position:absolute;left:0;right:0;top:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(74,107,133,.48) 6%,rgba(74,107,133,.48) 88%,transparent);
  transition:opacity .14s}
.bookmark:hover::before{opacity:.9}
.bk-mid{position:absolute;right:0;top:-9px;display:inline-flex;align-items:center}
.bk-label{white-space:nowrap;padding:2.5px 8px;border:1px solid rgba(74,107,133,.24);border-radius:999px;
  background:var(--paper);color:rgba(74,107,133,.75);font:500 10px/1 -apple-system,"PingFang SC",sans-serif;
  letter-spacing:.04em;transition:.14s}
.bookmark:hover .bk-label{color:#a4452a;border-color:rgba(164,69,42,.35)}
.bk-label .bk-del-txt{display:none}
.bookmark:hover .bk-label .bk-date-txt{display:none}
.bookmark:hover .bk-label .bk-del-txt{display:inline}
.bookmark.flash::before{animation:bk-flash 1.1s ease-out}
@keyframes bk-flash{
  0%,100%{background:linear-gradient(90deg,transparent,rgba(74,107,133,.48) 6%,rgba(74,107,133,.48) 88%,transparent)}
  28%{background:linear-gradient(90deg,transparent,rgba(74,107,133,.95) 6%,rgba(74,107,133,.95) 88%,transparent);height:2px}
}

/* bookmark dropdown */
.bk-menu{position:fixed;display:none;background:#fff;border:1px solid var(--border);border-radius:12px;
  box-shadow:0 12px 32px rgba(70,50,20,.2);z-index:9999;width:300px;padding:6px}
.bk-menu.show{display:block}
.bk-add{width:100%;text-align:left;border:none;background:none;padding:9px 10px;border-radius:8px;
  font-size:12.5px;color:var(--muted);cursor:default}
.bk-menu-sep{height:1px;background:var(--border);margin:5px 2px}
.bk-menu-list{max-height:320px;overflow:auto}
.bk-empty{color:var(--muted);font-size:12px;padding:14px 10px;text-align:center;line-height:1.7}
.bk-row{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer}
.bk-row:hover{background:var(--accent-soft)}
.bk-row .bk-i{font-size:11px;color:#fff;background:var(--accent);border-radius:999px;
  min-width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.bk-row .bk-t{flex:1;min-width:0;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--fg)}
.bk-row .bk-del{border:none;background:none;color:var(--muted);cursor:pointer;font-size:12px;padding:3px 6px;border-radius:6px;opacity:0;flex-shrink:0}
.bk-row:hover .bk-del{opacity:1}
.bk-row .bk-del:hover{background:#f6e4dc;color:#a4452a}

/* notebook */
.nb-filter{display:flex;gap:7px;flex-wrap:wrap;margin:0 0 12px}
.nb-chip{font:500 12.5px/1 -apple-system,sans-serif;color:#6b665d;background:transparent;
  border:1px solid var(--border);border-radius:999px;padding:6px 12px;cursor:pointer;transition:all .14s}
.nb-chip:hover{border-color:var(--accent);color:var(--accent)}
.nb-chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.nb-chip i{font-style:normal;opacity:.7;margin-left:2px;font-size:11px}
.nb-chip.on i{opacity:.85}
.nb-item{padding:11px 4px;border-bottom:1px solid var(--border);cursor:pointer;transition:box-shadow .16s,background .16s}
.nb-item:hover{background:var(--accent-soft);border-radius:8px}
.nb-item.open{background:#fff;border:1px solid var(--border);border-radius:14px;
  box-shadow:0 8px 22px rgba(70,50,20,.12);padding:15px 17px;margin:8px 0;border-bottom-color:transparent}
.nb-item.open:hover{background:#fff}
.nb-hd{display:flex;align-items:baseline;gap:7px}
.nb-tag{flex:none;font:600 10.5px/1 -apple-system,sans-serif;color:#fff;border-radius:5px;
  padding:3px 6px;letter-spacing:.04em;position:relative;top:-1px}
.t-word{background:#6b5a3e}
.t-phrase{background:#9a6b1f}
.t-sentence{background:#5c6b3a}
.t-para{background:#4a6b85}
.nb-item .nw{font:600 16px/1.3 'Spectral',Georgia,serif;color:var(--lvl,var(--fg))}
.nb-item .ph{font-size:12px;color:var(--accent);margin-left:6px;font-weight:400}
.nb-freq,.ex-freq{flex:none;display:inline-flex;align-items:center;justify-content:center;
  min-width:16px;height:16px;padding:0 3px;margin-left:6px;position:relative;top:-1px;
  font:700 10px/1 -apple-system,sans-serif;color:var(--accent);background:var(--accent-soft);
  border-radius:5px;cursor:default}
.ex-freq{vertical-align:middle}
.nb-item .c{font-size:12.5px;color:#6b665d;margin-top:3px}
.nb-exp{margin-top:9px}
.nb-exp:empty{margin-top:0}
.nb-mastery{margin-top:13px;padding-top:11px;border-top:1px solid var(--border);display:flex;justify-content:flex-end}
.nb-known-btn{border:1px solid var(--border);background:#fff;color:#6b665d;
  font:500 12px/1 -apple-system,"PingFang SC",sans-serif;padding:7px 13px;border-radius:999px;cursor:pointer;transition:.14s}
.nb-known-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.nb-known-btn.undo{color:var(--accent);border-color:#e3d7bf}
.nb-chip.nb-known-view.on{background:#5c6b3a;border-color:#5c6b3a}
/* 侧栏「本篇」：重点星 + 排序段控（词文字永远染频率色，与排序维度无关） */
.nb-dot{flex:none;width:8px;height:8px;border-radius:50%;background:var(--lvl,var(--muted));margin-left:2px;position:relative;top:-1px}
.nb-star{flex:none;border:none;background:none;cursor:pointer;opacity:.4;padding:0 2px;line-height:0;color:#b8ab8f}
.nb-star svg{width:14px;height:14px;display:block}
.nb-star:hover{opacity:.75}.nb-star.on{opacity:1;color:var(--accent)}.nb-star.on svg{fill:currentColor}
.nb-sortseg{display:flex;gap:2px;margin:0 0 10px}
.nb-sortseg button{flex:1;border:1px solid var(--border);background:transparent;color:#6b665d;font:600 11.5px/1 -apple-system,sans-serif;
  padding:6px 4px;cursor:pointer;transition:.14s}
.nb-sortseg button:first-child{border-radius:8px 0 0 8px}.nb-sortseg button:last-child{border-radius:0 8px 8px 0}
.nb-sortseg button:not(:last-child){border-right:none}
.nb-sortseg button.on{background:var(--accent);border-color:var(--accent);color:#fff}
.nb-openall{display:block;width:100%;margin:0 0 12px;border:1px solid var(--accent);background:var(--accent-soft);
  color:var(--accent);font:600 12.5px/1 -apple-system,sans-serif;padding:9px;border-radius:9px;cursor:pointer;transition:.14s}
.nb-openall:hover{background:var(--accent);color:#fff}

/* ============ 生词本大视图 overlay ============ */
.gv-wrap{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;
  background:rgba(40,30,14,.34);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
.gv-wrap.show{display:flex}
.gv{width:940px;max-width:95vw;height:90vh;background:var(--paper);border-radius:20px;
  box-shadow:0 30px 80px rgba(50,35,12,.34);display:flex;flex-direction:column;overflow:hidden}
.gv-head{padding:24px 30px 0;flex-shrink:0;background:linear-gradient(180deg,#fffefa,var(--paper))}
.gv-hrow{display:flex;align-items:flex-start;justify-content:space-between;gap:18px}
.gv-kicker{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:700}
.gv-h{font:600 26px/1.05 'Spectral',Georgia,serif;letter-spacing:.04em;color:var(--fg);margin:9px 0 0}
.gv-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.gv-search{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--border);border-radius:11px;padding:8px 12px;width:178px}
.gv-search input{border:none;outline:none;background:none;font:13px var(--read-font);color:var(--fg);width:100%}
.gv-x{width:34px;height:34px;border-radius:11px;border:1px solid var(--border);background:#fff;color:var(--muted);font-size:17px;cursor:pointer;line-height:1;flex-shrink:0}
.gv-x:hover{border-color:var(--accent);color:var(--accent)}
.gv-scope{display:inline-flex;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:3px}
.gv-scope button{border:none;background:none;padding:7px 14px;border-radius:7px;font-size:12.5px;color:var(--muted);font-weight:600;cursor:pointer}
.gv-scope button.on{background:var(--paper);color:var(--fg);box-shadow:0 1px 3px rgba(70,50,20,.12)}
.gv-toolbar{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-top:20px;border-bottom:1px solid var(--border)}
.gv-types{display:flex;gap:7px;padding-bottom:13px;flex-wrap:wrap}
.gv-type{border:1px solid var(--border);background:#fff;color:var(--muted);font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:999px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s}
.gv-type .n{font-variant-numeric:tabular-nums;opacity:.7;font-weight:500}
.gv-type:hover{border-color:var(--accent);color:var(--accent)}
.gv-type.on{background:var(--fg);border-color:var(--fg);color:#fdf8ee}.gv-type.on .n{opacity:.65}
.gv-sorts{display:flex;gap:2px}
.gv-sort{position:relative;border:none;background:none;color:var(--muted);font-size:13.5px;font-weight:600;padding:6px 13px 14px;cursor:pointer}
.gv-sort:hover{color:var(--fg)}.gv-sort.on{color:var(--fg)}
.gv-sort.on::after{content:"";position:absolute;left:11px;right:11px;bottom:-1px;height:2.5px;border-radius:2px;background:var(--accent)}
.gv-subbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 0 14px;flex-wrap:wrap}
.gv-legend{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.gv-cap{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#bdb29c;font-weight:700}
.gv-lg{display:flex;align-items:center;gap:6px;font-size:11.5px;color:#8a7f69;font-weight:500}
.gv-lg .d{width:9px;height:9px;border-radius:3px}
.gv-tools{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.gv-gin{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted)}
.gv-gsize{width:46px;padding:6px;border:1px solid var(--border);border-radius:8px;background:#fff;text-align:center;font:600 13px var(--read-font);color:var(--fg);outline:none}
.gv-gsize:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.gv-tbtn{border:1px solid var(--border);background:#fff;color:#7d7259;font-size:12px;font-weight:600;padding:7px 12px;border-radius:9px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.15s}
.gv-tbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.gv-tbtn.solid{background:var(--accent);border-color:var(--accent);color:#fff}
.gv-tbtn.solid:hover{filter:brightness(1.07);color:#fff;background:var(--accent)}
.gv-tbtn:disabled{opacity:.4;cursor:default;background:#fff;border-color:var(--border);color:var(--muted)}
.gv-kn{opacity:.55;font-weight:600}
.gv-body{flex:1;overflow:auto;padding:14px 30px 36px}
.gv-empty{text-align:center;color:var(--muted);font:14px/1.8 'Spectral',Georgia,serif;padding:60px 20px}
.gv-group{margin-bottom:22px}
.gv-ghd{display:flex;align-items:center;gap:11px;padding:9px 14px;margin-bottom:11px;background:linear-gradient(180deg,#faf6ec,#f6f0e3);border:1px solid var(--border);border-radius:11px}
.gv-ghd.sel{background:var(--accent-soft);border-color:var(--accent)}
.gv-gname{font-weight:700;font-size:13px;color:var(--fg);cursor:pointer;letter-spacing:.02em}
.gv-gcount{font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums}
.gv-ck{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
.gv-sp{margin-left:auto}
/* 生词本清单行（B 方向：无卡片 / 无左彩条 / 细分隔线；整行文字染频率色 --lvl） */
.gv-card{display:flex;align-items:center;gap:12px;padding:11px 6px;border-bottom:1px solid var(--border);transition:background .14s;cursor:pointer}
.gv-card:hover{background:var(--accent-soft);border-radius:9px}
.gv-card.sel{background:color-mix(in srgb,var(--accent) 16%,transparent);border-radius:9px}
.gv-card.sel:hover{background:color-mix(in srgb,var(--accent) 20%,transparent)}
.gv-card.known{opacity:.5}
.gv-star{border:none;background:none;cursor:pointer;flex-shrink:0;width:19px;color:#b8ab8f;opacity:.4;padding:0;line-height:0;transition:.15s}
.gv-star svg{width:15px;height:15px;display:block}
.gv-star:hover{opacity:.78}
.gv-star.on{opacity:1;color:var(--accent)}.gv-star.on svg{fill:currentColor}
.gv-unit{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1}
.gv-line{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
/* 词条文本可用鼠标拖选（复制释义等）；行内其余区域点击=切换选中 */
.gv-w,.gv-ph,.gv-zh{-webkit-user-select:text;user-select:text;cursor:text}
.gv-w{font:600 17.5px/1.2 var(--read-font);color:var(--lvl,var(--fg))}
.k-c .gv-w{font-style:italic}.k-s .gv-w{font-size:15px;font-weight:500;font-style:italic;line-height:1.4}
.gv-ph{font:400 12px/1 var(--read-font);color:var(--lvl,var(--muted));opacity:.7}
.gv-kind{font:700 9px/1 -apple-system,sans-serif;letter-spacing:.08em;text-transform:uppercase;color:var(--lvl,var(--muted));opacity:.6;flex-shrink:0}
.gv-zh{font:400 13px/1.45 var(--han);color:var(--lvl,#6a6253)}
.gv-badge{font:700 9.5px/1 -apple-system,sans-serif;letter-spacing:.04em;text-transform:uppercase;color:var(--lvl,var(--muted));
  background:color-mix(in srgb,var(--lvl,var(--muted)) 13%,transparent);padding:2px 5px;border-radius:4px;flex-shrink:0}
.gv-clk{font:500 11.5px/1 -apple-system,sans-serif;color:var(--muted);font-variant-numeric:tabular-nums;min-width:24px;text-align:right;flex-shrink:0}
.gv-say,.gv-del{border:none;background:none;cursor:pointer;padding:4px;color:var(--muted);flex-shrink:0;border-radius:7px;line-height:0;display:inline-flex}
.gv-say svg,.gv-del svg{width:17px;height:17px;display:block}
.gv-say:hover{color:var(--accent);background:var(--accent-soft)}
.gv-del:hover{color:#a4452a;background:#f6e4dc}

/* library overlay */
.overlay{position:fixed;inset:0;background:rgba(40,30,14,.34);display:none;align-items:flex-start;justify-content:center;z-index:9998;padding:60px 20px}
.overlay.show{display:flex}
/* ============ 应用内确认框（替代原生 confirm，去火箭）============ */
.cfm-wrap{position:fixed;inset:0;z-index:10000;display:none;align-items:center;justify-content:center;
  background:rgba(40,30,14,.34);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);padding:20px}
.cfm-wrap.show{display:flex}
.cfm{background:var(--paper);border-radius:16px;box-shadow:0 24px 64px rgba(40,30,14,.34);
  width:min(360px,92vw);padding:26px 26px 20px;text-align:left}
.cfm-kicker{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--clay);font-weight:700}
.cfm-h{font:600 20px/1.2 'Spectral',Georgia,serif;color:var(--fg);margin:8px 0 0}
.cfm-msg{font:14px/1.7 var(--read-font);color:var(--muted);margin:11px 0 0}
.cfm-btns{display:flex;justify-content:flex-end;gap:10px;margin-top:22px}
.cfm-btn{border:1px solid var(--border);background:#fff;color:var(--muted);font:600 13.5px var(--read-font);
  padding:9px 18px;border-radius:10px;cursor:pointer;transition:.15s}
.cfm-btn:hover{border-color:var(--accent);color:var(--accent)}
.cfm-btn.danger{background:var(--clay);border-color:var(--clay);color:#fff}
.cfm-btn.danger:hover{filter:brightness(1.06);color:#fff}
.lib-card{background:var(--paper);border-radius:16px;box-shadow:0 20px 56px rgba(40,30,14,.32);width:min(640px,92vw);max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
.lib-head{display:flex;align-items:baseline;gap:10px;padding:18px 22px;border-bottom:1px solid var(--border)}
.lib-head b{font-size:17px;font-family:'Spectral',Georgia,serif}
.lib-sub{color:var(--muted);font-size:12px;flex:1}
.lib-x{border:none;background:none;font-size:16px;color:var(--muted);cursor:pointer}
.lib-list{overflow:auto;padding:8px}
.lib-empty{color:var(--muted);font-size:13px;text-align:center;padding:50px 20px}
.lib-row{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:11px;cursor:pointer}
.lib-row:hover{background:var(--accent-soft)}
.lib-row .info{flex:1;min-width:0}
.lib-row .t{font-size:14.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lib-row .m{font-size:11.5px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lib-row .del{border:none;background:none;color:var(--muted);cursor:pointer;font-size:13px;padding:6px;border-radius:6px;opacity:0;line-height:0;display:inline-flex}
.lib-row .del svg{width:16px;height:16px;display:block}
.lib-row:hover .del{opacity:1}
.lib-row .del:hover{background:#f6e4dc;color:#a4452a}

/* settings */
.set-card{width:min(460px,92vw)}
.set-body{padding:20px 22px 24px;overflow:auto}
.set-lbl{display:block;font-size:12px;color:var(--muted);margin:0 0 6px;font-weight:500}
.set-lbl:not(:first-child){margin-top:16px}
.set-opt{color:var(--muted);font-weight:400}
.set-input{width:100%;padding:10px 12px;font-size:14px;border:1px solid var(--border);border-radius:10px;
  background:#fff;outline:none;font-family:inherit}
.set-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
select.set-input{cursor:pointer}
.set-msg{font-size:13px;line-height:1.6;margin-top:14px;min-height:18px}
.set-msg.ok{color:#1f7a4d}
.set-msg.err{color:#a4452a}
.set-msg.busy{color:var(--muted)}
.set-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.set-help{margin-top:18px;padding-top:16px;border-top:1px solid var(--border);
  font-size:12px;line-height:1.85;color:var(--muted)}
.set-help b{color:var(--fg);font-weight:600}
.set-help a{color:var(--accent);cursor:pointer;text-decoration:none}
.set-help a:hover{text-decoration:underline}

/* paste menu */
.ctx{position:fixed;background:#fff;border:1px solid var(--border);border-radius:9px;
  box-shadow:0 8px 24px rgba(70,50,20,.18);padding:4px;z-index:99999;display:none;min-width:120px}
.ctx.show{display:block}
.ctx button{width:100%;padding:8px 12px;border:none;background:none;color:var(--fg);font-size:13px;
  text-align:left;border-radius:6px}
.ctx button:hover{background:var(--accent-soft)}

/* ---------------- overflow (⋯) menu ---------------- */
.more-wrap{position:relative;display:inline-flex}
.more-btn{width:36px;height:36px;border:1px solid var(--border);border-radius:10px;background:transparent;
  color:var(--fg);font-size:18px;line-height:1;cursor:pointer;transition:.14s}
.more-btn:hover,.more-btn.open{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.more-menu{position:absolute;top:calc(100% + 8px);right:0;z-index:9997;width:268px;
  background:var(--paper);border:1px solid var(--border);border-radius:14px;
  box-shadow:0 16px 40px rgba(70,50,20,.2);padding:8px;display:none}
.more-menu.show{display:block}
.mm-row{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;min-height:40px}
.mm-row:hover{background:var(--accent-soft)}
.mm-lbl{font-size:13px;color:var(--fg);flex:1;white-space:nowrap}
.mm-row select{margin-left:auto}
.mm-row .themebar{margin-left:auto}
.mm-row .pg{font-size:13px;color:var(--fg);width:100%}
.mm-row #accentBtn,.mm-row #exportBtn{margin-left:auto;padding:6px 13px;font-size:13px}
.mm-hint{font-size:11.5px;color:var(--muted);margin-left:auto}
.mm-sep{height:1px;background:var(--border);margin:5px 4px}
.fs-btns{display:flex;gap:4px;margin-left:auto}
.fs-btn{width:32px;height:26px;border:1px solid var(--border);border-radius:7px;background:transparent;font-size:12px;color:var(--fg);cursor:pointer;padding:0;line-height:1}
.fs-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.fs-btn.active{border-color:var(--accent);background:var(--accent);color:#fff}

/* ============================================================
   书模式 (book mode)
   ============================================================ */

/* 顶部章节条：章节标题常显、居中且位置稳定；首页/目录/书签三键平时隐身，
   鼠标移到这条上方才淡入（title 用绝对居中，故三键出没不推动标题）。 */
.book-bar{
  position:relative;flex-shrink:0;display:flex;align-items:center;gap:6px;
  background:var(--paper);border-bottom:1px solid var(--border);
  padding:8px 16px;min-height:44px;
}
/* 首页 / 目录 / 书签 三键：统一细线图标 + 文字，收在一枚浮出的暖纸小胶囊里。暖纸底顺带
   遮住其身后绝对居中的章节标题，窄窗时两者不再穿帮打架。书模式挂 .book-bar，文章模式挂 .art-tools。 */
.tool-chip{
  display:flex;align-items:center;gap:1px;
  background:var(--paper);border:1px solid var(--border);border-radius:12px;
  padding:2px;box-shadow:0 2px 12px rgba(70,50,20,.08);
}
.book-bar .bar-tools{
  position:relative;z-index:2;   /* 浮在绝对居中的章节标题之上，暖纸底把标题左段干净遮住 */
  opacity:0;pointer-events:none;transition:opacity .18s ease;
}
.book-bar:hover .bar-tools,.book-bar .bar-tools.peek{opacity:1;pointer-events:auto}
.toc-btn{
  display:inline-flex;align-items:center;gap:6px;
  border:none;background:none;cursor:pointer;font-size:12.5px;color:#7c7263;
  padding:6px 12px;border-radius:9px;white-space:nowrap;flex-shrink:0;
  font-family:inherit;letter-spacing:.02em;transition:background .14s,color .14s;
}
.toc-btn svg{width:15px;height:15px;flex-shrink:0}
.toc-btn:hover{background:var(--accent-soft);color:var(--accent)}
/* 文章模式：同款胶囊固定左上角（文章无顶栏，故常驻半隐、悬停全显便于发现）。 */
.art-tools{
  position:fixed;top:38px;left:14px;z-index:45;   /* 38＝#app 的 30px 透明标题栏留白 + ~8，与书模式三键同高、不被红绿灯挡 */
  opacity:0;pointer-events:none;transition:opacity .18s ease;
}
/* 常驻显示（文章无顶栏、需可发现），但**不透明**——暖纸底把身后正文干净遮住，
   不像半透明那样透出字来。低调靠 .toc-btn 的暖灰字，不靠整体透明度。 */
body.reading:not(.book-mode-on) .art-tools{opacity:1;pointer-events:auto}
.book-bar .chap-info{
  position:absolute;left:50%;transform:translateX(-50%);max-width:56%;
  text-align:center;pointer-events:none;
  font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.book-bar .chap-info b{color:var(--fg);font-weight:600;margin-right:6px}

/* 翻页视口 — 居中收成可读窄带，每页文本不至于太宽 */
.pager-viewport{
  flex:1;min-height:0;overflow:hidden;position:relative;
  width:100%;max-width:760px;margin-left:auto;margin-right:auto;
}

/* 翻页轨道 — 整个内容在这里，用 translateX 翻页 */
.pager-track{
  height:100%;
  transition:transform .26s cubic-bezier(.3,.7,.3,1);
  /* column-* set dynamically via JS */
}
/* 内容区，带 CSS 多列 —— 必须解除文章模式的 max-width:680px 限制，
   否则列宽 > 容器宽，多列无法形成，永远只有 1 页 */
.pager-track .reading-inner{
  height:100%;
  max-width:none;margin:0;
  /* column-width / column-gap set by JS */
  column-fill:auto;
  box-sizing:border-box;
  scrollbar-width:none;        /* Firefox：隐藏横向滚动条 */
}
/* WebKit/WKWebView：隐藏 inner 的横向滚动条（翻页靠 scrollLeft，不需可见滚动条） */
.pager-track .reading-inner::-webkit-scrollbar{width:0;height:0;display:none}
/* 书模式：reading 不再自己 overflow+scroll，由 pager-viewport 管控 */
.reading.book-mode{
  overflow:hidden;padding:0;display:flex;flex-direction:column;
}

/* 底部翻页条 */
.pager-bar{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:14px;
  padding:2px 16px;background:var(--paper);border-top:1px solid var(--border);
  min-height:30px;
}
.pager-bar .pg-btn{
  border:none;background:none;cursor:pointer;font-size:16px;color:var(--fg);
  width:26px;height:26px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;
  transition:background .13s,color .13s;
}
.pager-bar .pg-btn:hover:not(:disabled){background:var(--accent-soft);color:var(--accent)}
.pager-bar .pg-btn:disabled{opacity:.3;cursor:not-allowed}
.pager-bar .pg-lbl{
  font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:64px;text-align:center;
}

/* ---- 目录抽屉 ---- */
.toc-overlay{
  position:fixed;inset:0;background:rgba(40,30,14,.28);
  display:none;z-index:8000;
}
.toc-overlay.show{display:block}
.toc-drawer{
  position:fixed;left:0;top:0;bottom:0;width:min(300px,85vw);
  background:var(--paper);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding-top:34px;  /* 顶部留白避开 macOS 红绿灯；无标题/关闭键，点主阅读区或按 Esc 即收起 */
  transform:translateX(-100%);transition:transform .24s cubic-bezier(.3,.7,.3,1);
  z-index:8001;box-shadow:4px 0 24px rgba(40,30,14,.14);
}
.toc-drawer.open{transform:translateX(0)}
.toc-list{flex:1;overflow-y:auto;padding:8px 0}
.toc-item{
  display:block;width:100%;text-align:left;border:none;background:none;
  padding:9px 18px;font-size:13.5px;color:var(--fg);cursor:pointer;font-family:inherit;
  border-left:3px solid transparent;transition:background .13s,border-color .13s,color .13s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.toc-item:hover{background:var(--accent-soft);color:var(--accent)}
.toc-item.current{
  background:var(--accent-soft);color:var(--accent);
  border-left-color:var(--accent);font-weight:600;
}

/* ---- 目录抽屉：目录 | 书签 双 tab ---- */
.toc-drawer-tabs{flex-shrink:0;display:flex;gap:4px;padding:10px 14px 0;border-bottom:1px solid var(--border)}
.toc-drawer-tab{flex:1;text-align:center;background:none;border:none;cursor:pointer;font-family:inherit;
  font-size:12.5px;color:var(--muted);padding:7px 0 8px;border-bottom:2px solid transparent;transition:.13s}
.toc-drawer-tab:hover{color:var(--fg)}
.toc-drawer-tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.toc-pane{display:none;flex:1;min-height:0;flex-direction:column}
.toc-pane.on{display:flex}

/* ---- 书签网格（缩略图，两列） ---- */
.bk-grid{flex:1;overflow-y:auto;padding:12px;display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px;align-content:start}
.bk-cell{cursor:pointer;min-width:0}
.bk-cell .bk-thumb{width:100%;height:170px;background:var(--paper);border:1px solid var(--border);
  border-radius:5px;box-shadow:0 3px 10px rgba(50,35,12,.08);overflow:hidden;position:relative;transition:box-shadow .14s}
.bk-cell:hover .bk-thumb{box-shadow:0 5px 14px rgba(50,35,12,.14)}
.bk-thumb .bk-thumb-in{position:absolute;top:0;left:0;width:340px;font:9.5px/1.85 'Bitter',Georgia,serif;
  color:#322d25;transform:scale(.385);transform-origin:0 0;padding:14px 16px;box-sizing:border-box}
.bk-thumb .bk-thumb-in p,.bk-thumb .bk-thumb-in h1,.bk-thumb .bk-thumb-in h2,.bk-thumb .bk-thumb-in h3,
.bk-thumb .bk-thumb-in li,.bk-thumb .bk-thumb-in blockquote{margin:0 0 .8em}
.bk-thumb-line{position:absolute;left:7%;right:7%;border-top:1px solid rgba(74,107,133,.40)}
.bk-thumb-x{position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:50%;
  border:none;background:rgba(255,253,247,.92);color:#4a6b85;font-size:11px;line-height:1;
  display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 6px rgba(50,35,12,.16)}
.bk-thumb-x:hover{background:#4a6b85;color:#fff}
.bk-cell:hover .bk-thumb-x{display:inline-flex}
.bk-cap{margin-top:6px;font-size:11px;color:#6b6252;line-height:1.45}
.bk-cap b{display:block;font-size:11px;color:#4a6b85}
.bk-grid-empty{padding:34px 22px;text-align:center;font-size:12.5px;color:var(--muted);line-height:1.7}

/* ---- book-bar 📑 书签入口 ---- */
.book-bar .bk-entry-btn{
  border:none;background:none;cursor:pointer;font-size:14px;color:var(--fg);
  padding:5px 10px;border-radius:8px;white-space:nowrap;flex-shrink:0;
  transition:background .14s,color .14s;
}
.book-bar .bk-entry-btn:hover{background:var(--accent-soft);color:var(--accent)}

/* ---- 书模式：横线覆盖层（absolute，不推动正文）----
   V1 定稿（用户嫌旧版像分节线+emoji药丸太"UI"）：发丝线两端渐隐（非实体 border），
   纸签去 📑、缩小压暗成不抢戏的纯文字签。 */
#bkLayer{position:absolute;inset:0;pointer-events:none;z-index:5}
.bk-line{position:absolute;pointer-events:auto;cursor:pointer;height:22px;margin-top:-11px}
.bk-line::before{content:"";position:absolute;left:0;right:0;top:11px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(74,107,133,.48) 6%,rgba(74,107,133,.48) 88%,transparent);
  transition:opacity .14s}
.bk-line:hover::before{opacity:.9}
.bk-line .bk-chip{position:absolute;right:0;top:3px;background:var(--paper);
  border:1px solid rgba(74,107,133,.24);color:rgba(74,107,133,.75);border-radius:99px;
  font-size:10px;line-height:1;padding:2.5px 8px;white-space:nowrap;
  letter-spacing:.04em;transition:.14s}
.bk-line:hover .bk-chip{color:#a4452a;border-color:rgba(164,69,42,.35)}
.bk-line .bk-chip .bk-chip-del{display:none}
.bk-line:hover .bk-chip .bk-chip-date{display:none}
.bk-line:hover .bk-chip .bk-chip-del{display:inline}
.bk-line.flash::before{animation:bk-line-flash 1.1s ease-out}
@keyframes bk-line-flash{
  0%,100%{background:linear-gradient(90deg,transparent,rgba(74,107,133,.48) 6%,rgba(74,107,133,.48) 88%,transparent)}
  28%{background:linear-gradient(90deg,transparent,rgba(74,107,133,.95) 6%,rgba(74,107,133,.95) 88%,transparent);height:2px}
}

/* ---- 页缘书签槽（误触方案 A · 用户拍板）----
   正文栏外侧的窄页边即「书签槽」：默认只有一道极淡的竖向页边细线（笔记本装订线的
   隐喻，不抢戏）；鼠标移到槽上→细线加深 + ＋ 跟随行高 + 版心浮出一道落线预览；
   点它就在该行高落书签线。正文/空白区 100% 自由点击，永不再"点空白置签"。
   书模式槽=#bkSlot（pager-viewport 内 absolute 左页边）；文章模式槽=#bkSlotA（fixed，
   贴住居中正文列左侧）。两模式共用 .bk-slot-plus / 落线预览观感。 */
.bk-slot,.bk-slot-a{cursor:pointer;z-index:6}
.bk-slot{position:absolute;left:0;top:0;bottom:0;width:42px}
.bk-slot-a{position:fixed;width:42px;display:none;z-index:40}
body.reading:not(.book-mode-on) .bk-slot-a{display:block}
.bk-slot::before,.bk-slot-a::before{content:"";position:absolute;left:17px;width:1px;
  top:9%;bottom:11%;background:rgba(74,107,133,.16);transition:background .2s ease}
.bk-slot:hover::before,.bk-slot-a:hover::before,
.bk-slot.armed::before,.bk-slot-a.armed::before{background:rgba(74,107,133,.36)}
/* 开卷一次性提示：页边细线短暂亮一下再沉下去，让用户发现"这里能放书签" */
.bk-slot.intro::before,.bk-slot-a.intro::before{animation:bkSlotIntro 1.7s ease-out}
@keyframes bkSlotIntro{
  0%{background:rgba(74,107,133,.05)}
  20%{background:rgba(74,107,133,.52)}
  100%{background:rgba(74,107,133,.16)}
}
.bk-slot-plus{position:absolute;left:6px;width:23px;height:23px;margin-top:-11.5px;
  border-radius:50%;background:var(--paper);border:1px solid rgba(74,107,133,.5);
  color:#4a6b85;font-size:15px;line-height:21px;text-align:center;font-weight:400;
  box-shadow:0 2px 8px rgba(50,35,12,.16);opacity:0;transform:scale(.7);
  transition:opacity .13s ease,transform .13s ease;pointer-events:none}
.bk-slot.armed .bk-slot-plus,.bk-slot-a.armed .bk-slot-plus{opacity:1;transform:scale(1)}
/* 落线预览：横跨正文列的浅色引导线（书模式在 viewport 内 absolute；文章模式 fixed）*/
.bk-slot-guide{position:absolute;left:0;right:0;height:0;z-index:6}
.bk-slot-a-guide{position:fixed;height:0;z-index:40}
.bk-slot-guide,.bk-slot-a-guide{pointer-events:none;display:none}
.bk-slot-guide.show,.bk-slot-a-guide.show{display:block}
.bk-slot-guide::before{content:"";position:absolute;left:44px;right:44px;top:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(74,107,133,.44) 8%,rgba(74,107,133,.44) 92%,transparent)}
.bk-slot-a-guide::before{content:"";position:absolute;left:0;right:0;top:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(74,107,133,.44) 4%,rgba(74,107,133,.44) 96%,transparent)}

/* ---- 页缘圆点槽（第二批 Phase 2）：右页边版书签槽，与左侧 .bk-slot/.bk-slot-a 完全对称 ----
   左侧放书签、右侧放圆点贴，各自 slot 各自覆盖层，互不打架。默认极淡竖线，hover/armed→
   加深 + ＋跟随行高（＋用"上次用色"着色）+ 右缘浮出半圆落点预览。单击=直接落一枚半圆
   （不先弹色板，和左槽一样干脆）；改色/加标签/删除=点已落的半圆弹 popover。
   书模式槽=#dotSlot（pager-viewport 内 absolute 右页边）；文章模式槽=#dotSlotA（fixed，
   贴住居中正文列右侧）。 */
.dot-slot,.dot-slot-a{cursor:pointer;z-index:6}
.dot-slot{position:absolute;right:0;top:0;bottom:0;width:42px}
.dot-slot-a{position:fixed;width:42px;display:none;z-index:40}
body.reading:not(.book-mode-on) .dot-slot-a{display:block}
.dot-slot::before,.dot-slot-a::before{content:"";position:absolute;right:17px;width:1px;
  top:9%;bottom:11%;background:rgba(74,107,133,.16);transition:background .2s ease}
.dot-slot:hover::before,.dot-slot-a:hover::before,
.dot-slot.armed::before,.dot-slot-a.armed::before{background:rgba(74,107,133,.36)}
.dot-slot.intro::before,.dot-slot-a.intro::before{animation:bkSlotIntro 1.7s ease-out}
/* 落点预览＝一枚半透明的半圆「幽灵」，就贴在会落下去的位置、用当前默认色——
   直接预演「点一下就贴这枚彩标」，比抽象的＋圆圈易懂得多。 */
.dot-slot-plus{position:absolute;right:0;width:14px;height:28px;margin-top:-14px;
  border-radius:28px 0 0 28px;background:var(--cP);
  box-shadow:-1px 1px 3px rgba(50,35,12,.14);opacity:0;transform:translateX(6px);
  transition:opacity .14s ease,transform .14s ease,background .12s ease;pointer-events:none}
.dot-slot.armed .dot-slot-plus,.dot-slot-a.armed .dot-slot-plus{opacity:.62;transform:translateX(0)}
/* 落线预览：横跨正文列的浅色引导线（书模式在 viewport 内 absolute；文章模式 fixed）*/
.dot-slot-guide{position:absolute;left:0;right:0;height:0;z-index:6}
.dot-slot-a-guide{position:fixed;height:0;z-index:40}
.dot-slot-guide,.dot-slot-a-guide{pointer-events:none;display:none}
.dot-slot-guide.show,.dot-slot-a-guide.show{display:block}
.dot-slot-guide::before{content:"";position:absolute;left:44px;right:44px;top:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(74,107,133,.44) 8%,rgba(74,107,133,.44) 92%,transparent)}
.dot-slot-a-guide::before{content:"";position:absolute;left:0;right:0;top:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(74,107,133,.44) 4%,rgba(74,107,133,.44) 96%,transparent)}

/* ---- 页码条同色刻度（全书圆点索引）---- */
.pager-bar{position:relative}
.pager-bar .tick{position:absolute;bottom:5px;width:4px;height:4px;border-radius:50%;cursor:pointer}

/* ============================================================
   END 书模式
   ============================================================ */

/* ---------------- 首页：单一入口 + 书墙 + 剪报盒（第三批） ---------------- */
/* 首页＝全屏画廊：不阅读时收起右侧 372px 讲解面板（首页无需讲解），书墙/剪报盒铺满整宽（对齐 mockup）；
   并收回 #reading 给阅读列留的 44px 顶距，让「书架 + 剪报盒」两区一屏全见（≥700px 高窗口不用滚）。 */
body:not(.reading) .panel{display:none}
body:not(.reading) #reading{padding-top:14px}
.hint.welcome{height:auto;min-height:100%;display:block;justify-content:initial;padding:8px 40px 14px;color:var(--fg);text-align:left}
.wel-top{display:flex;flex-direction:column;align-items:flex-start;text-align:left;margin:0 0 8px}
.wel-greet{font-size:15px;font-weight:500;letter-spacing:.03em;color:var(--muted)}
.wel-sub,.wel-serif{display:none}

.home-wrap{width:100%;max-width:1180px;margin:0 auto}

/* 通用区块头（书架 / 剪报盒 共用） */
.wall-head{display:flex;align-items:baseline;gap:12px;margin:0 2px 12px}
.wall-kicker{font:600 11px/1 -apple-system,sans-serif;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.wall-han{font:500 20px/1 var(--han);color:var(--ink);letter-spacing:.04em}
.wall-count{font:500 12px/1 -apple-system,sans-serif;color:var(--muted)}
.wall-rule{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);align-self:center}

/* 单一智能入口 */
.dropzone{display:flex;align-items:center;gap:14px;padding:14px 20px;border:1.5px dashed #d8cbae;
  border-radius:16px;background:linear-gradient(180deg,rgba(255,253,247,.7),rgba(255,253,247,.35));
  transition:border-color .18s,background .18s;margin-bottom:10px}
.dropzone:hover,.dropzone.over{border-color:var(--accent);background:var(--accent-soft)}
/* 前置的向上箭头本身就是「上传文件」按钮（<label for=file>，真手势触发原生选择器，避开 WKWebView 拦截）*/
.dz-ico{flex:none;width:42px;height:42px;border-radius:12px;background:var(--paper);border:1px solid var(--border);
  display:grid;place-items:center;color:var(--ink);cursor:pointer;transition:border-color .15s,background .15s,color .15s}
.dz-ico:hover{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.dz-row{flex:1;min-width:0;display:flex;align-items:center;gap:8px}
.dz-input{flex:1;min-width:0;border:1px solid var(--border);border-radius:10px;background:var(--paper);
  padding:8px 12px;font:400 14px/1.3 -apple-system,sans-serif;color:var(--fg);transition:border-color .15s,box-shadow .15s}
.dz-input::placeholder{color:var(--muted)}
.dz-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.dz-row .btn{flex:none;padding:8px 16px}

/* 首页右上角浮动工具（生词本 · 设置）：绝对定位不占纵向布局，把顶栏原来的高度让给书墙/剪报墙。
   38＝#app 的 30px 透明标题栏留白 + ~8，避开 macOS 红绿灯。仅首页显示。 */
.home-utils{position:absolute;top:38px;right:18px;z-index:50;display:flex;gap:8px}
body.reading .home-utils{display:none}

/* 书墙：hero 大封面 + 小封面网格（方向 B，紧挨着，靠尺寸而非文字区分） */
.book-wall{display:flex;gap:20px;align-items:flex-start}
@media(max-width:560px){.book-wall{flex-wrap:wrap}}
.hero{flex:none;width:172px;cursor:pointer}
.hero .cover{position:relative;width:172px;aspect-ratio:2/3;border-radius:3px 6px 6px 3px;
  box-shadow:0 16px 30px -14px rgba(70,45,12,.5),inset 2px 0 3px rgba(255,255,255,.4),inset -1px 0 6px rgba(0,0,0,.13)}
.hero .cv-title{font-size:21px;line-height:1.22}
.hero .cv-mark{width:16px;margin-bottom:9px}
.hero .cv-by{font-size:12px}
.rest-grid{flex:1;min-width:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:18px 15px;align-content:start}
.rest-grid .book{cursor:pointer}
.rest-grid .cover{aspect-ratio:2/3}
.rest-grid .cv-title{font-size:11.5px;margin-top:3px;line-height:1.25}
.rest-grid .cv-by{font-size:9px}
.rest-grid .cv-mark{width:11px;margin-bottom:5px}
.rest-grid .cv-type{padding:10px 8px 9px}
.rest-grid .book-t{font-size:11px}
.rest-grid .book-p{font-size:9.5px;margin-top:2px}
.rest-grid .book-add .cover{font-size:19px}

.cover{position:relative;aspect-ratio:2/3;border-radius:3px 5px 5px 3px;overflow:hidden;
  box-shadow:0 10px 22px -12px rgba(70,45,12,.5),inset 2px 0 3px rgba(255,255,255,.35),inset -1px 0 4px rgba(0,0,0,.10);
  transition:transform .16s}
.book:hover .cover{transform:translateY(-5px)}
.cv-img{width:100%;height:100%;object-fit:cover;display:block;background:var(--paper)}
.cv-type{background:var(--paper);border:1px solid var(--border);display:flex;flex-direction:column;
  padding:16px 13px 14px;height:100%;position:relative}
.cv-type::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;background:var(--band,var(--amber))}
.cv-spineline{position:absolute;left:5px;top:0;bottom:0;width:1px;background:rgba(60,40,10,.06)}
.cv-title{font:600 18px/1.28 'Spectral',Georgia,serif;color:var(--ink);letter-spacing:.01em;margin-top:6px}
.cv-by{margin-top:auto;font:italic 400 12px/1.4 'Spectral',Georgia,serif;color:var(--muted)}
.cv-mark{width:16px;height:2px;background:var(--band,var(--amber));opacity:.6;margin-bottom:9px}
.cv-prog{position:absolute;left:0;bottom:0;height:3px;background:var(--band,var(--amber));opacity:.85}
.book-meta{margin:9px 3px 0}
.book-t{font:500 13px/1.3 -apple-system,sans-serif;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-p{font:400 11px/1 -apple-system,sans-serif;color:var(--muted);margin-top:3px}
.book-add .cover{box-shadow:none;border:1.5px dashed #d3c5a5;background:transparent;display:grid;place-items:center;
  color:var(--muted);font-size:26px;font-weight:200}
.book-add:hover .cover{border-color:var(--accent);color:var(--accent);transform:none}
/* 展开/收起：低调放在「书架」标题行右端，不占封面格 */
.wall-toggle{flex:none;align-self:center}
.wall-toggle-btn{border:none;background:none;cursor:pointer;font:500 12px/1 -apple-system,sans-serif;
  color:var(--accent);padding:2px 2px;letter-spacing:.02em}
.wall-toggle-btn:hover{text-decoration:underline}
.book-del,.clip-del{position:absolute;top:4px;right:4px;width:19px;height:19px;border:none;border-radius:50%;
  background:rgba(20,12,4,.4);color:#fff;font-size:13px;line-height:1;cursor:pointer;padding:0;z-index:3;
  display:none;align-items:center;justify-content:center;backdrop-filter:blur(1px)}
.book,.hero{position:relative}   /* 删除按钮的定位上下文：封面右上角 */
.book:hover .book-del,.hero:hover .book-del,.clip:hover .clip-del{display:inline-flex}
.book-del:hover,.clip-del:hover{background:rgba(176,60,38,.96)}

/* 剪报盒：文章＝纸片剪报，横向翻阅 */
.clip-band{margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.clip-scroll{display:flex;gap:14px;overflow-x:auto;padding:5px 2px 8px}
.clip{position:relative;background:#fbf6ea;border:1px solid #ece0c8;border-radius:3px;
  padding:12px 14px 10px;box-shadow:0 5px 12px -9px rgba(70,45,12,.4);cursor:pointer;
  transition:transform .15s;flex:none;width:210px;min-height:98px;display:flex;flex-direction:column}
.clip::before{content:"";position:absolute;left:0;top:10px;bottom:10px;width:3px;border-radius:3px;background:var(--band,var(--navy))}
.clip:hover{transform:translateY(-3px)}
.clip-t{font:600 14px/1.34 'Spectral',Georgia,serif;color:var(--fg);margin:0 0 8px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.clip-foot{margin-top:auto}
.clip-date{font:400 10.5px/1 -apple-system,sans-serif;color:var(--muted)}
.clip-add{display:grid;place-items:center;border:1.5px dashed #d8cbae;background:transparent;box-shadow:none;
  color:var(--muted);min-height:84px;width:148px;font-size:13px}
.clip-add::before{display:none}
.clip-add:hover{border-color:var(--accent);color:var(--accent);transform:none}
/* ④ 剪报封面（压低封面 · 用户拍板方案 B）：有 og:image 时顶部矮横幅首图 + 紧凑正文，
   小巧不霸屏（封面 58px、标题 2 行）；来源低调简写落在卡底右侧、与左侧日期对称。无图回落见下方 masthead 形态。 */
.clip.has-cover{padding:0;overflow:hidden;width:194px}
.clip.has-cover::before{display:none}                 /* 有封面就不要左色条，图已是主视觉 */
.clip-cover{height:58px;background-size:cover;background-position:center;background-color:#e7dcc6;flex:none}
.clip-body{padding:9px 14px 9px;display:flex;flex-direction:column;flex:1;min-height:0}
.clip.has-cover .clip-t{font-size:13px;line-height:1.32;-webkit-line-clamp:2;margin:0 0 5px}
.clip.has-cover .clip-foot{margin-top:auto;display:flex;align-items:baseline;justify-content:space-between;gap:8px}
/* 卡底右侧的来源低调简写：复用无图剪报报头(clip-src)的套色小标语言，让有图/无图两形态成套 */
.clip-orig{font:700 8.5px/1 -apple-system,sans-serif;letter-spacing:.1em;text-transform:uppercase;
  color:var(--band,var(--navy));white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:62%;margin-left:auto}
/* ④ 剪报封面 B（回落）：来源小标 + 细线，纯排版造「封面感」 */
.clip-mast{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.clip-src{font:700 8.5px/1 -apple-system,sans-serif;letter-spacing:.15em;text-transform:uppercase;
  color:var(--band,var(--navy));white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.clip-rule{flex:1;height:1px;background:var(--border)}
.home-empty{color:var(--muted);font-size:13px;line-height:1.85;padding:14px 2px;width:100%}

/* 读物精选：剪报盒下方的 RSS 来源带（⑥）。视觉语言完全复用书架/剪报——
   wall-head（kicker + 汉字 + 渐隐细线）+ 来源卡（左侧油墨色条轮转 navy/green/amber）；
   点来源就地滑下该源最新文章列表，点文章走现有 process 入口进阅读。
   逐字复用桌面预览 mockup（~/Desktop/预览/四土/读物精选-首页方案.html）的样式值。 */
.disc-band{margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.disc-outlets{display:flex;gap:14px;flex-wrap:wrap}
.disc-src{position:relative;background:var(--paper);border:1px solid var(--border);border-radius:5px;
  padding:13px 16px 12px 18px;cursor:pointer;width:236px;transition:transform .15s,box-shadow .15s;
  box-shadow:0 4px 12px -10px rgba(70,45,12,.4)}
.disc-src::before{content:"";position:absolute;left:0;top:11px;bottom:11px;width:3px;border-radius:3px;background:var(--band,var(--navy))}
.disc-src:hover{transform:translateY(-3px);box-shadow:0 9px 18px -12px rgba(70,45,12,.5)}
.disc-src.on{box-shadow:inset 0 0 0 1.5px var(--band,var(--navy)),0 4px 12px -10px rgba(70,45,12,.4)}
.ds-name{font:600 15px/1.2 'Spectral',Georgia,serif;color:var(--ink,var(--accent))}
.ds-desc{font:italic 400 11.5px/1.4 'Spectral',Georgia,serif;color:var(--muted);margin-top:3px}
.ds-arrow{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:17px}

/* B：popover 卡片——position:fixed + JS 用 getBoundingClientRect 定位在被点来源卡
   上方/下方，绝不就地撑开挤走首页布局。max-height + 内部滚动，再多文章也只在卡内滚。
   z-index 9500：压过普通内容/书架/剪报，但低于 selbar/overlay/gv-wrap(9998/9999)。 */
.disc-list{position:fixed;background:var(--paper);border:1px solid var(--border);border-radius:10px;
  padding:6px 4px;min-width:320px;max-width:420px;max-height:min(60vh,420px);overflow-y:auto;
  box-shadow:0 16px 40px rgba(70,50,20,.22);z-index:9500}
.disc-list-hd{display:flex;align-items:baseline;gap:10px;padding:8px 14px 6px;position:sticky;top:0;
  background:var(--paper);border-bottom:1px solid var(--border);margin-bottom:2px}
.dlh-src{font:600 13px/1 'Spectral',Georgia,serif;color:var(--ink,var(--accent))}
.dlh-feed{font:500 11px/1 -apple-system,sans-serif;color:var(--muted)}
.dlh-sp{flex:1}
.dlh-act{border:none;background:none;color:var(--accent);font:500 12px/1 -apple-system,sans-serif;cursor:pointer;padding:2px 4px}
/* 补充批2 #3：多 feed 来源（TC）在 popover 头部的子标签，复用 dlh-act 的克制语言，选中态低调实心 */
.dlh-tabs{display:flex;gap:2px}
.dlh-tab{border:none;background:none;color:var(--muted);font:500 11.5px/1 -apple-system,sans-serif;cursor:pointer;padding:3px 7px;border-radius:5px}
.dlh-tab:hover{color:var(--accent)}
.dlh-tab.on{background:var(--accent-soft);color:var(--accent);font-weight:600}
.da{display:flex;align-items:baseline;gap:12px;padding:11px 14px;border-top:1px solid var(--border);cursor:pointer}
.da:first-of-type{border-top:none}
.da:hover{background:var(--accent-soft);border-radius:6px}
.da-t{font:500 14.5px/1.4 'Bitter',Georgia,serif;color:var(--fg);flex:1}
.da-meta{font:400 11px/1 -apple-system,sans-serif;color:var(--muted);white-space:nowrap}
.disc-err-msg{color:var(--muted);font-size:13px;padding:14px 14px 4px}
.disc-loading{color:var(--muted);font-size:13px;padding:14px}

/* ── reading immersion: the top function bar belongs to the home screen only.
   While reading we drop it from layout entirely (the moon FAB replaces it) and
   leave a slim strip up top so the macOS traffic-lights have a clear place. ── */
body.reading .topbar{display:none}
/* thin reading-progress line at the very bottom (article mode) */
.readprog{position:fixed;left:0;right:0;bottom:0;height:3px;background:rgba(156,122,62,.10);z-index:50;display:none}
body.reading:not(.book-mode-on) .readprog{display:block}
.readprog>i{display:block;height:100%;width:0;background:var(--accent);opacity:.5;transition:width .15s ease}

/* ── radial floating menu (bottom-left), shown only while reading ── */
.rfm{position:fixed;left:16px;bottom:46px;z-index:9990;width:38px;height:38px;display:none;
  opacity:.22;transition:opacity .4s ease}
body.reading .rfm{display:block}
.rfm:hover,.rfm.open{opacity:1}
.rfm .fab{position:absolute;inset:0;border:none;cursor:pointer;border-radius:50%;background:var(--paper);color:var(--accent);
  display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(70,50,20,.18),0 0 0 1px var(--border);
  transition:background .3s,color .3s,box-shadow .25s}
.rfm .fab:hover{box-shadow:0 6px 20px rgba(70,50,20,.24),0 0 0 1px var(--accent)}
.rfm.open .fab{background:var(--accent);color:#fff}
.rfm .fab svg{position:absolute;transition:opacity .25s}
.rfm .fab .ic-x{opacity:0}
.rfm.open .fab .ic-menu{opacity:0}
.rfm.open .fab .ic-x{opacity:1}
.rfm .petal{position:absolute;left:0;bottom:0;width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;background:var(--paper);color:var(--accent);border:1px solid #e3d6b8;
  cursor:pointer;box-shadow:0 3px 10px rgba(70,50,20,.14);transform:translate(0,0) scale(.3);opacity:0;
  transition:transform .42s cubic-bezier(.34,1.56,.64,1),opacity .3s,background .15s,color .15s}
.rfm.open .petal{opacity:1;transform:translate(var(--x),var(--y)) scale(1)}
.rfm .petal:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.rfm .petal.size{font:700 16px/1 Georgia,serif}
.rfm .lbl{position:absolute;left:19px;bottom:19px;transform:translate(calc(var(--lx) - 50%),var(--ly));white-space:nowrap;
  font-size:11.5px;color:#9a8c72;opacity:0;transition:opacity .25s .15s;pointer-events:none}
.rfm.open .lbl{opacity:1}

/* ============================================================
   夜览 · 跟随系统深色（@media prefers-color-scheme: dark）
   纯皮肤层：只覆盖颜色，不动任何结构/尺寸/逻辑；删掉此块即回到原亮色。
   暖深褐底（呼应日间暖纸、避免冷蓝塑料感）+ 亮暖金强调（烛光铜调）。
   ============================================================ */
@media (prefers-color-scheme: dark){
  :root{
    --bg:#1c1814; --paper:#262019; --fg:#e8e1d3; --muted:#9c9181; --border:#3a332b;
    --accent:#cca362; --accent-soft:rgba(204,163,98,.15);
    --clay:#cc7d5c; --marker:rgba(204,163,98,.24);
    /* 生词分层色盘 —— 暗底提亮版（仍低饱和、柔和不荧光）*/
    --fA:#8db085; --fB:#88a8c2; --fC:#a695c5; --fD:#d08d73; --fE:#c9a766;  /* 频率 A→E：绿蓝紫红黄 */
    --c1:#8db085; --c2:#c9a766; --c3:#88a8c2; --c4:#d08d73;
    --h0:#8db085; --h1:#c9a766; --h2:#88a8c2; --h3:#d08d73; --h4:#a695c5; --h5:#b8ae6c;
    /* 色块高亮呼吸盘七色 —— 暗底提亮版，洗色透明度略提以保持可辨识 */
    --cA:#c9a766; --cB:#8db085; --cC:#88a8c2; --cD:#d08d73; --cE:#a695c5; --cF:#b8ae6c; --cP:#c495a5;
    --wA:rgba(201,167,102,.26); --wB:rgba(141,176,133,.22); --wC:rgba(136,168,194,.20);
    --wD:rgba(208,141,115,.20); --wE:rgba(166,149,197,.20); --wF:rgba(184,174,108,.22); --wP:rgba(196,149,165,.22);
  }
  /* 生词高亮主题 —— 暗底下主色(vc)提亮才显眼、rare(vr)压暗一档 */
  body[data-theme="blue"]      {--vc:#86accd;--vr:#5e7d96;--cur:rgba(134,172,205,.16)}
  body[data-theme="indigo"]    {--vc:#9fa0d2;--vr:#70729c;--cur:rgba(159,160,210,.16)}
  body[data-theme="teal"]      {--vc:#73b1a2;--vr:#4f8174;--cur:rgba(115,177,162,.16)}
  body[data-theme="terracotta"]{--vc:#d18a5f;--vr:#9e6647;--cur:rgba(209,138,95,.16)}

  /* 正文与次要文字：硬编码深字 → 暖亮字 */
  article{color:#dcd4c4}
  article h3{color:#cfc7b6}
  .ex-kw .g,.nb-item .c,.nb-chip,.gv-lg,.nb-known-btn,.gv-tbtn{color:#a89e8d}
  .wel-sub{color:#b8ad9b}
  .gv-cap{color:#8a8073}

  /* 白底输入面 / 浅卡 / 菜单 → 暖暗面 */
  input[type=text],select,.ask-input input,.ask-chip,.gv-search,.gv-gsize,
  .set-input,.nb-known-btn,.gv-type,.gv-tbtn,.gv-x,.hint code,.navpill,
  .ctx,.bk-menu,.gv-tbtn:disabled,.cfm-btn{background:#241e17}
  .nb-item.open,.nb-item.open:hover{background:#2b241c}
  .gv-head{background:linear-gradient(180deg,#2c2419,var(--paper))}
  .gv-ghd{background:linear-gradient(180deg,#2b241b,#241e16)}
  /* 剪报卡：夜览下由亮奶纸改暖暗面，修正 .clip-t/.clip-date(var(--fg)=浅色) 浅字压浅底不可读的旧问题 */
  .clip{background:#262019;border-color:#3a332b}
