// Expand a range out to whole word elements so we never split a vocab span — BUT
// only swallow an edge word when real letters of it are selected. Words render as
// <mark>/<span> with the inter-word space as a SEPARATE text node; WKWebView often
// anchors a drag at the *end* of the previous word's text node (0 chars selected),
// which used to drag that whole word (e.g. "heightening") into the band. So if the
// selected slice of an edge word is whitespace-only, step past it instead.
function liftRangeToWords(range){
  try{
    let sc=range.startContainer, so=range.startOffset;
    const sEl=(sc.nodeType===3?sc.parentElement:sc);
    const sw=sEl&&sEl.closest?sEl.closest('.w, mark.vocab'):null;
    if(sw&&reading.contains(sw)){
      const tail=(sc.nodeType===3?sc.data.slice(so):(sw.textContent||''));
      if(tail.trim()==='') range.setStartAfter(sw);   // only this word's trailing edge is selected → drop it
      else range.setStartBefore(sw);
    }
    let ec=range.endContainer, eo=range.endOffset;
    const eEl=(ec.nodeType===3?ec.parentElement:ec);
    const ew=eEl&&eEl.closest?eEl.closest('.w, mark.vocab'):null;
    if(ew&&reading.contains(ew)){
      const head=(ec.nodeType===3?ec.data.slice(0,eo):(ew.textContent||''));
      if(head.trim()==='') range.setEndBefore(ew);     // only this word's leading edge is selected → drop it
      else range.setEndAfter(ew);
    }
  }catch(_){}
}
/* 把一个可能跨段落块的 range 按块切开，每段生成一个 span（factory(block,isFirst,isLast) 造
   一个空 span），把该段内的选区片段包进去；调用方在 factory 里给 span 打好「同组」标识
   （data-pid / data-group）。返回 {spans, anchors}（同序；空段跳过；单块退化时长度为 1，
   anchors[i] 是该段书模式锚点或 null——由 _hlComputeAnchor(sub) 在包裹前算出）。
   单块路径与旧行为逐字节等价（回归红线①）：只有 1 个块时直接对原 range 走单 span 包裹。
   多块：先把每个 sub-range 的锚点(node,offset 意义上的 blockOrd/offset)算好、
   再【从最后一个块往前】逐块包裹——包裹会改 DOM，先包后面的块不会打乱前面块的
   range/container 引用，反过来则会串位（最大坑，务必保持这个顺序）。 */
function _wrapRangeAcrossBlocks(range, factory){
  liftRangeToWords(range);
  const BLOCK_SEL='p,h1,h2,h3,li,blockquote';
  let sc=range.startContainer, so=range.startOffset, ec=range.endContainer, eo=range.endOffset;
  const sEl=sc.nodeType===1?sc:sc.parentElement;
  const eEl=ec.nodeType===1?ec:ec.parentElement;
  const startBlock=sEl&&sEl.closest?sEl.closest(BLOCK_SEL):null;
  const endBlock=eEl&&eEl.closest?eEl.closest(BLOCK_SEL):null;
  if(!startBlock || !endBlock || !reading.contains(startBlock) || !reading.contains(endBlock)) return {spans:[], anchors:[]};
  const allBlocks=[...reading.querySelectorAll(BLOCK_SEL)].filter(b=>reading.contains(b));
  const si=allBlocks.indexOf(startBlock), ei=allBlocks.indexOf(endBlock);
  const lo=Math.min(si,ei), hi=Math.max(si,ei);
  const spanBlocks=allBlocks.slice(lo,hi+1).filter(b=>range.intersectsNode(b));
  if(spanBlocks.length<=1){
    // 单段：退化为对原 range 直接单 span 包裹，与旧行为逐字节等价。锚点必须在包裹前算
    // （包裹后 DOM 结构已变，range 的 container 引用不再对应原文档结构）。
    const anchor=bookMode?_hlComputeAnchor(range):null;
    const span=factory(startBlock, true, true);
    try{ range.surroundContents(span); }
    catch(_){ try{ span.appendChild(range.extractContents()); range.insertNode(span); }catch(__){ return {spans:[], anchors:[]}; } }
    return {spans:[span], anchors:[anchor]};
  }
  // 多块：先为每个块构造 sub-range 并（在任何包裹发生前）快照锚点。
  const items=[];
  for(let i=0;i<spanBlocks.length;i++){
    const b=spanBlocks[i];
    const sub=document.createRange();
    sub.selectNodeContents(b);
    if(i===0){ try{ sub.setStart(sc, so); }catch(_){} }
    if(i===spanBlocks.length-1){ try{ sub.setEnd(ec, eo); }catch(_){} }
    if((sub.toString()||'').trim()==='') continue;   // 空段跳过
    const anchor=bookMode?_hlComputeAnchor(sub):null;
    items.push({ block:b, startNode:sub.startContainer, startOffset:sub.startOffset,
                 endNode:sub.endContainer, endOffset:sub.endOffset, anchor, isFirst:i===0, isLast:i===spanBlocks.length-1 });
  }
  const spans=new Array(items.length), anchors=new Array(items.length);
  // 从后往前包：后面块先包裹不影响前面块的 (node,offset) 引用仍然有效。
  for(let i=items.length-1;i>=0;i--){
    const it=items[i];
    const sub=document.createRange();
    try{
      sub.setStart(it.startNode, it.startOffset);
      sub.setEnd(it.endNode, it.endOffset);
    }catch(_){ continue; }
    const span=factory(it.block, it.isFirst, it.isLast);
    try{ sub.surroundContents(span); }
    catch(_){ try{ span.appendChild(sub.extractContents()); sub.insertNode(span); }catch(__){ continue; } }
    spans[i]=span; anchors[i]=it.anchor;
  }
  const outSpans=[], outAnchors=[];
  for(let i=0;i<spans.length;i++){ if(spans[i]){ outSpans.push(spans[i]); outAnchors.push(anchors[i]); } }
  return {spans:outSpans, anchors:outAnchors};
}
// wrap a range (single- or multi-block) in .phrase span(s); returns null if unwrappable
function wrapPhrase(range, text, sentence){
  const host=range.commonAncestorContainer;
  const hostEl=host.nodeType===1?host:host.parentElement;
  if(!hostEl || !reading.contains(hostEl.nodeType===1?hostEl:hostEl.parentElement)) return null;
  const span=document.createElement('span');
  span.className='phrase';
  span.dataset.pid='ph'+Date.now()+'_'+(++_phraseSeq);
  span.dataset.phrase=text; span.dataset.sentence=sentence||''; span.dataset.ex='{}';
  try{ range.surroundContents(span); return span; }
  catch(_){ try{ span.appendChild(range.extractContents()); range.insertNode(span); return span; }catch(__){ return null; } }
}
// 把 ph.dataset.ex 同步到同 pid 组的其余 .phrase span（保证点组内任意一条都能重开讲解、
// 且文章快照持久后重开文章仍一致）。
function _syncPhraseEx(ph){
  const pid=ph.dataset.pid; if(!pid) return;
  reading.querySelectorAll('.phrase[data-pid="'+pid+'"]').forEach(el=>{
    if(el!==ph) el.dataset.ex=ph.dataset.ex;
  });
  if(typeof _syncPhraseAnchorEx==='function') _syncPhraseAnchorEx(pid, ph.dataset.ex);   // ③ 书模式锚点也跟着刷新
}
function removePhrase(ph){
  const pid=ph.dataset.pid;
  const group=pid ? [...reading.querySelectorAll('.phrase[data-pid="'+pid+'"]')] : [ph];
  group.forEach(el=>{
    const parent=el.parentNode; if(!parent) return;
    while(el.firstChild) parent.insertBefore(el.firstChild, el);
    parent.removeChild(el); try{ parent.normalize(); }catch(_){}
    if(_curPhrase===el) _curPhrase=null;
  });
  if(bookMode && pid) _phrases=_phrases.filter(p=>p.pid!==pid);   // ③ 锚点也一并清掉，换章不复活
  scheduleSave();
}

/* ---------- 划选荧光笔高亮 + 整段色卡（第二批 ②③④⑥）----------
   .hl span 复用 .phrase 的包裹技术（surroundContents，失败退 extract/insert），但无讲解、
   class=hl、颜色走内联 style（var(--wX)）。层级：不设 z-index，让 .w/mark.vocab/.sent
   天然嵌套在其内部、自然叠在高亮之上。 */
function wrapHighlight(range, colorKey, kind){
  const span=document.createElement('span');
  span.className='hl';
  span.dataset.hlId='hl'+Date.now()+'_'+(++_hlSeq);
  span.dataset.c=colorKey;
  span.dataset.kind=kind||'span';
  span.style.background='var(--w'+colorKey+')';
  try{ range.surroundContents(span); return span; }
  catch(_){ try{ span.appendChild(range.extractContents()); range.insertNode(span); return span; }catch(__){ return null; } }
}
// 移除已有高亮：span（②划选）解开包裹（有 data-group 则移除同组所有 span）；
// para（④整段色卡）走 unwrapParaCard。
function unwrapHl(el){
  if(el.dataset.kind==='para' || el.classList.contains('para')){ unwrapParaCard(el); return; }
  const group=el.dataset.group;
  const els=group ? [...reading.querySelectorAll('.hl[data-group="'+group+'"]')] : [el];
  els.forEach(e=>{
    const parent=e.parentNode; if(!parent) return;
    while(e.firstChild) parent.insertBefore(e.firstChild, e);
    parent.removeChild(e); try{ parent.normalize(); }catch(_){}
    if(_curHl===e) _curHl=null;
  });
  if(bookMode){
    if(group){ _highlights=_highlights.filter(h=>h.group!==group); }
    else{
      const id=el.dataset.hlId;
      if(id){ const i=_highlights.findIndex(h=>h.id===id); if(i>=0) _highlights.splice(i,1); }
    }
  }
  scheduleSave();
}
// 改色：span 走划选洗色（.wX 原值，有 data-group 则同组所有 span 一起改），
// para 走整段色卡更淡洗色（.16）。
function recolorHighlight(el, colorKey){
  const isPara=el.dataset.kind==='para' || el.classList.contains('para');
  const group=!isPara ? el.dataset.group : null;
  const els=group ? [...reading.querySelectorAll('.hl[data-group="'+group+'"]')] : [el];
  els.forEach(e=>{
    e.dataset.c=colorKey;
    e.style.background=isPara ? (HL_PARA_BG[colorKey]||('var(--w'+colorKey+')')) : 'var(--w'+colorKey+')';
  });
  if(bookMode){
    if(group){ _highlights.forEach(h=>{ if(h.group===group) h.color=colorKey; }); }
    else{
      const rec=_highlights.find(h=>h.id===el.dataset.hlId);
      if(rec) rec.color=colorKey;
    }
  }
  scheduleSave();
}
// 点已有 .hl（span 或 para block）（非讲解词块）→ 弹出改色/移除小工具条
function reopenHl(el, ev){ _curHl=el; const p=_evPt(ev); showHlBar(p.x, p.y); }
// 给整块 block 套「整段色卡」：.hl.para class + 更淡洗色（.16，比划选洗色淡）
function _applyParaCard(block, colorKey, id){
  block.classList.add('hl','para');
  block.dataset.hlId=id; block.dataset.c=colorKey; block.dataset.kind='para';
  block.style.background=HL_PARA_BG[colorKey]||('var(--w'+colorKey+')');
}
function unwrapParaCard(block){
  const id=block.dataset.hlId;
  block.classList.remove('hl','para');
  block.style.background=''; delete block.dataset.hlId; delete block.dataset.c;
  if(_curHl===block) _curHl=null;
  if(bookMode && id){
    const i=_highlights.findIndex(h=>h.id===id);
    if(i>=0) _highlights.splice(i,1);
  }
  scheduleSave();
}
/* 整段色卡命中时自动把整段原文收藏进生词本（kind:'para'，不调 LLM）。两处生成
   整段色卡的调用点（applyHighlight 的整块分支、paragraphCardFromSelection）都要触发，
   抽出这一个 helper 避免漏调。幂等：同段重复收藏由后端 ¶-key 去重。 */
async function _collectPara(text){
  const t=(text||'').trim(); if(!t) return;
  try{
    const r=await api().collect_paragraph({text:t});
    if(r && r.ok){ scheduleSave(); refreshNbCount(); }
  }catch(err){ console.error('collect_paragraph failed', err); }
}
/* 划选后点色点：包裹选区为 .hl；若选区恰好覆盖整块（选中文字 trim 后与块 textContent
   trim 后相等——用户圈选了整段/整章节标题），改走「整段色卡」（④，block 级、更淡洗色），
   否则走普通荧光笔 span（②）。书模式额外算锚点 record 入 _highlights。
   liftRangeToWords 复用 explainSelection 同一套「不切碎生词」处理。 */
function applyHighlight(range, colorKey){
  const r=range.cloneRange();
  liftRangeToWords(r);
  const host=r.commonAncestorContainer;
  const hostEl=host.nodeType===1?host:host.parentElement;
  const block=hostEl?hostEl.closest('p,h1,h2,h3,li,blockquote'):null;
  const selTxt=(r.toString()||'').trim().replace(/\s+/g,' ');
  const blockTxt=block?(block.textContent||'').trim().replace(/\s+/g,' '):'';
  const isWholeBlock=!!block && !!selTxt && selTxt===blockTxt && reading.contains(block);
  try{ window.getSelection().removeAllRanges(); }catch(_){}
  if(isWholeBlock){
    const id='hl'+Date.now()+'_'+(++_hlSeq);
    _applyParaCard(block, colorKey, id);
    if(bookMode){
      const blockOrd=_bkBlocks().indexOf(block);
      if(blockOrd>=0){
        _highlights.push({ id, ch:bookIdx, blockOrd, start:0, end:blockTxt.length, color:colorKey, kind:'para' });
      }
    }
    _collectPara(blockTxt);
    scheduleSave();
    return;
  }
  // 跨段：每段一个 .hl span，共享一个 data-group；每段各自算锚点（在包裹前，由
  // _wrapRangeAcrossBlocks 内部对每个 sub-range 调 _hlComputeAnchor）。单段时退化为
  // 旧的单 span 行为（与旧版逐字节等价）。
  const group='hg'+Date.now()+'_'+(++_hlSeq);
  const {spans, anchors}=_wrapRangeAcrossBlocks(r, ()=>{
    const sp=document.createElement('span');
    sp.className='hl';
    sp.dataset.hlId='hl'+Date.now()+'_'+(++_hlSeq);
    sp.dataset.c=colorKey;
    sp.dataset.kind='span';
    sp.dataset.group=group;
    sp.style.background='var(--w'+colorKey+')';
    return sp;
  });
  if(!spans.length) return;
  if(bookMode){
    spans.forEach((sp,i)=>{
      const anchor=anchors[i]; if(!anchor) return;
      _highlights.push({ id:sp.dataset.hlId, ch:bookIdx, blockOrd:anchor.blockOrd,
        start:anchor.start, end:anchor.end, color:colorKey, kind:'span', group });
    });
  }
  scheduleSave();
}

// 划选工具条「整段」按钮：选一点点即可把 range 跨过的每个段落块整块上色（④ 整段色卡），
// 跨多段则每段各一张卡。用「上次用色」，默认 F（橄榄），与整段色卡 mockup 一致。
let _lastParaColor='F';
function paragraphCardFromSelection(range){
  const BLOCK_SEL='p,h1,h2,h3,li,blockquote';
  const host=range.commonAncestorContainer;
  const hostEl=host.nodeType===1?host:host.parentElement;
  const sEl=range.startContainer.nodeType===1?range.startContainer:range.startContainer.parentElement;
  const eEl=range.endContainer.nodeType===1?range.endContainer:range.endContainer.parentElement;
  const startBlock=sEl&&sEl.closest?sEl.closest(BLOCK_SEL):null;
  const endBlock=eEl&&eEl.closest?eEl.closest(BLOCK_SEL):null;
  if(!startBlock || !endBlock || !reading.contains(startBlock) || !reading.contains(endBlock)) return;
  const allBlocks=[...reading.querySelectorAll(BLOCK_SEL)].filter(b=>reading.contains(b));
  const si=allBlocks.indexOf(startBlock), ei=allBlocks.indexOf(endBlock);
  const lo=Math.min(si,ei), hi=Math.max(si,ei);
  const blocks=allBlocks.slice(lo,hi+1).filter(b=>range.intersectsNode(b));
  blocks.forEach(block=>{
    if(block.classList.contains('para')) return;   // 已是整段卡 → 跳过，不重复叠加
    const blockTxt=(block.textContent||'').trim();
    const id='hl'+Date.now()+'_'+(++_hlSeq);
    _applyParaCard(block, _lastParaColor, id);
    if(bookMode){
      const blockOrd=_bkBlocks().indexOf(block);
      if(blockOrd>=0){
        _highlights.push({ id, ch:bookIdx, blockOrd, start:0, end:blockTxt.length, color:_lastParaColor, kind:'para' });
      }
    }
    _collectPara(blockTxt);
  });
  try{ window.getSelection().removeAllRanges(); }catch(_){}
  scheduleSave();
}

/* ---------- 圆点贴（第二批 Phase 2）----------
   右页缘半圆，锚定复用左侧书签槽同一套几何/手势（_bkBoundaryAtY/_bkFragRect/_bkFragPage）。
   数据：_dots=[{id,ch,ord,side,color,label}]（书模式，镜像后端 dots 字段，随 scheduleSave 写盘）。
   文章模式：dot 记为 .reading-inner 内的一个零高度行内标记（同 .bookmark 技术），随 doSave()
   的 innerHTML 快照天然持久，零后端改动。 */
let _dots=[];
/* 放置永远干净一击，用「上次用色」（首次藕粉）；想改色只在事后点那枚半圆弹菜单里选。 */
let _dotLastColor='P';
function _dotId(){ return 'dot_'+Math.random().toString(36).slice(2,10)+Date.now().toString(36); }

/* ===== 书模式：数据层 + 放置 + 渲染 ===== */
function _dotFind(ch,ord){ return _dots.find(d=>d.ch===ch && d.ord===ord); }
function _dotDelete(dot){
  const i=_dots.indexOf(dot); if(i<0) return;
  _dots.splice(i,1);
  if(_curDot===dot) _curDot=null;
  _renderDotLayer(); _renderPagerTicks();
  scheduleSave();
}
/* 在命中边界处落圆点（书模式）——同一 (ch,ord) 已存在则切换删除；否则新建，默认色=上次用色。 */
function _dotPlaceAtBoundary(hit){
  const { ord, side }=hit;
  const existing=_dotFind(bookIdx, ord);
  if(existing){ _dotDelete(existing); return; }
  const dot={ id:_dotId(), ch:bookIdx, ord, side, color:_dotLastColor, label:'' };
  _dots.push(dot);
  _dots.sort((a,b)=> a.ch-b.ch || a.ord-b.ord);
  _renderDotLayer(); _renderPagerTicks();
  scheduleSave();
}
/* 页缘圆点槽（书模式）鼠标交互：移动→armed + ＋跟随行高（上次用色着色）+ 版心落线预览；点→放置。
   与 _bkSlotMove/_bkSlotClick 完全对称，唯一差别是走 _dotSlot* 系列 DOM id。 */
function _dotSlotMove(e){
  const slot=document.getElementById('dotSlot');
  const plus=slot && slot.querySelector('.dot-slot-plus');
  const guide=document.getElementById('dotSlotGuide');
  const vp=document.getElementById('pagerViewport');
  const hit=_bkBoundaryAtY(e.clientY);
  if(!hit || !vp){ if(slot)slot.classList.remove('armed'); if(guide)guide.classList.remove('show'); return; }
  const vpRect=vp.getBoundingClientRect();
  const ey=(hit.side==='b'?hit.rect.top:hit.rect.bottom);
  const gapHalf=10;
  const y=(ey - vpRect.top) + (hit.side==='a'?gapHalf:-gapHalf);
  if(plus){ plus.style.top=y+'px'; plus.style.background='var(--c'+_dotLastColor+')'; }
  if(slot) slot.classList.add('armed');
  if(guide){ guide.style.top=y+'px'; guide.classList.add('show'); }
}
function _dotSlotLeave(){
  const slot=document.getElementById('dotSlot'), guide=document.getElementById('dotSlotGuide');
  if(slot) slot.classList.remove('armed');
  if(guide) guide.classList.remove('show');
}
function _dotSlotClick(e){
  e.stopPropagation();
  const hit=_bkBoundaryAtY(e.clientY);
  if(hit) _dotPlaceAtBoundary(hit);
}
/* 覆盖层：右页缘画半圆 .halfdot，Y=锚点 fragment 行高，只画当前页当前章。
   side 判定与 _renderBkLayer 同一套：side='b' 锚 blocks[ord] 首 fragment，side='a' 锚
   blocks[ord-1] 末 fragment。 */
function _renderDotLayer(){
  const layer=document.getElementById('dotLayer');
  const vp=document.getElementById('pagerViewport');
  const inner=document.getElementById('readingInner');
  if(!layer||!vp) return;
  layer.innerHTML='';
  if(!inner || !_pageW) return;
  const blocks=_bkBlocks();
  const vpRect=vp.getBoundingClientRect();
  const dots=_dots.filter(d=>d.ch===bookIdx);
  dots.forEach(dot=>{
    const ord=dot.ord;
    const side=dot.side||'b';
    if(ord<0||ord>blocks.length) return;
    let refEl, wantLast;
    if(side==='a'){
      if(ord<=0) return;
      refEl=blocks[ord-1]; wantLast=true;
    } else {
      const isEnd=(ord>=blocks.length);
      refEl=isEnd?blocks[blocks.length-1]:blocks[ord];
      wantLast=isEnd;
    }
    if(!refEl) return;
    const page=_bkFragPage(refEl, wantLast);
    if(page!==_pageIdx) return;   // 只画当前页
    const r=_bkFragRect(refEl, wantLast);
    if(!r) return;
    const gapHalf=10;
    const y=(side==='a' ? (r.bottom - vpRect.top + gapHalf) : (r.top - vpRect.top - gapHalf)) - 14;   // 半圆高28，居中对齐落点
    const wrap=document.createElement('div');
    wrap.className='dotwrap';
    wrap.dataset.dotId=dot.id;
    wrap.style.top=y+'px';
    wrap.innerHTML=`<div class="halfdot" style="background:var(--c${dot.color})"></div>`
      +(dot.label?`<span class="dotlabel">${escapeHtml(dot.label)}</span>`:'');
    layer.appendChild(wrap);
  });
}
/* 页码条同色刻度：left=该 dot 在全书的位置分数（章序占比 + 章内 ord 占比），点击直达那一页/章。 */
function _renderPagerTicks(){
  const bar=document.getElementById('pagerBar');
  if(!bar) return;
  bar.querySelectorAll('.tick').forEach(t=>t.remove());
  if(!bookCount) return;
  // 各章按真实字数加权定位（有 chars 时）：章起点=前面各章字数占比，章宽=本章字数占比；
  // 无 chars（如异常/旧数据）回落到均分各章。
  const haveChars=(bookToc.length===bookCount) && bookToc.every(t=>t&&t.chars>0);
  let cum=[], totalChars=0;
  if(haveChars){ for(let i=0;i<bookCount;i++){ cum.push(totalChars); totalChars+=bookToc[i].chars; } }
  _dots.forEach(dot=>{
    let chFrac, chWidth;
    if(haveChars && totalChars>0){
      chFrac=cum[dot.ch]/totalChars; chWidth=bookToc[dot.ch].chars/totalChars;
    }else{
      chFrac=dot.ch/bookCount; chWidth=1/bookCount;
    }
    const inChFrac=chWidth*Math.min(1, dot.ord/Math.max(1,(dot.ch===bookIdx?_bkBlocks().length:20)));
    const frac=Math.max(0,Math.min(1, chFrac+inChFrac));
    const el=document.createElement('span');
    el.className='tick';
    el.dataset.dotId=dot.id;
    el.style.left=(frac*100)+'%';
    el.style.background='var(--c'+dot.color+')';
    el.title=dot.label||'';
    bar.appendChild(el);
  });
}
/* 跳转到某条圆点：与 _bkJumpTo 同一套（若不同章先换章，渲完按 (ch,ord) 现算页码并翻页）。 */
async function _dotJumpTo(dot){
  if(dot.ch!==bookIdx){ await gotoChapter(dot.ch); }
  await new Promise(res=>setTimeout(res, 140));
  const blocks=_bkBlocks();
  const ord=Math.min(dot.ord, blocks.length);
  const side=dot.side||'b';
  let refEl, wantLast;
  if(side==='a' && ord>0){ refEl=blocks[ord-1]; wantLast=true; }
  else { const isEnd=(ord>=blocks.length); refEl=isEnd?blocks[blocks.length-1]:blocks[ord]; wantLast=isEnd; }
  if(refEl){
    const page=_bkFragPage(refEl, wantLast);
    if(page!==_pageIdx){ _pageIdx=page; _applyPageTransform(); _updatePagerBar(); _renderBkLayer(); _renderDotLayer(); }
  }
}
document.addEventListener('click', e=>{
  const tick=e.target.closest('.pager-bar .tick'); if(!tick) return;
  const dot=_dots.find(d=>d.id===tick.dataset.dotId); if(!dot) return;
  if(bookMode) _dotJumpTo(dot); else _dotJumpToA(dot);
});
/* 点已落的半圆（书模式覆盖层内）→ 浮出 mini popover 改色/加标签/移除 */
document.addEventListener('click', e=>{
  const wrap=e.target.closest('#dotLayer .dotwrap'); if(!wrap) return;
  e.stopPropagation();
  const dot=_dots.find(d=>d.id===wrap.dataset.dotId); if(!dot) return;
  showDotBar(dot, wrap.querySelector('.halfdot').getBoundingClientRect());
});

/* ===== 文章模式：零高度行内标记（同 .bookmark 技术），随 doSave() 的 HTML 快照持久 ===== */
function makeDotEl(color,label){
  const el=document.createElement('div');
  el.className='dotwrap-a'; el.setAttribute('contenteditable','false');
  el.dataset.dotId=_dotId(); el.dataset.c=color||_dotLastColor; el.dataset.label=label||'';
  el.innerHTML=`<div class="halfdot" style="background:var(--c${el.dataset.c})"></div>`
    +(el.dataset.label?`<span class="dotlabel">${escapeHtml(el.dataset.label)}</span>`:'');
  return el;
}
function placeDotAt(target, clientY){
  const inner=reading.querySelector('.reading-inner'); if(!inner) return;
  if(!target) target=blockAtY(clientY);
  const el=makeDotEl(_dotLastColor,'');
  if(target){
    const r=target.getBoundingClientRect();
    if(clientY > r.top + r.height/2) target.after(el); else target.before(el);
  } else { inner.appendChild(el); }
  scheduleSave();
}
function _dotPositionSlotA(){
  const slot=document.getElementById('dotSlotA');
  const guide=document.getElementById('dotSlotAGuide');
  if(!slot) return;
  if(bookMode || !document.body.classList.contains('reading')){
    if(guide) guide.classList.remove('show'); slot.classList.remove('armed'); return;
  }
  const inner=reading.querySelector('.reading-inner'); if(!inner) return;
  const ir=inner.getBoundingClientRect();
  const rr=reading.getBoundingClientRect();
  slot.style.top=rr.top+'px';
  slot.style.height=rr.height+'px';
  slot.style.left=Math.min(rr.right-42, ir.right)+'px';   // 贴列右缘外侧；窄窗兜底不越出 reading
}
function _dotSlotAMove(e){
  const slot=document.getElementById('dotSlotA');
  const plus=slot && slot.querySelector('.dot-slot-plus');
  const guide=document.getElementById('dotSlotAGuide');
  const blk=blockAtY(e.clientY);
  if(!blk){ if(slot)slot.classList.remove('armed'); if(guide)guide.classList.remove('show'); return; }
  const r=blk.getBoundingClientRect();
  const gy=_artAnchorY(e.clientY, blk, r);   // 预览半圆画在真实落点（与放置像素对齐）
  if(plus){ const sr=slot.getBoundingClientRect(); plus.style.top=(gy-sr.top)+'px'; plus.style.background='var(--c'+_dotLastColor+')'; }
  if(slot) slot.classList.add('armed');
  if(guide){
    const inner=reading.querySelector('.reading-inner'); const ir=inner.getBoundingClientRect();
    guide.style.top=gy+'px'; guide.style.left=ir.left+'px'; guide.style.width=ir.width+'px';
    guide.classList.add('show');
  }
}
function _dotSlotALeave(){
  const slot=document.getElementById('dotSlotA'), guide=document.getElementById('dotSlotAGuide');
  if(slot) slot.classList.remove('armed');
  if(guide) guide.classList.remove('show');
}
function _dotSlotAClick(e){
  e.stopPropagation();
  // 槽（fixed，z-index:40）盖在已落半圆之上、且跨层无法靠 z-index 让半圆浮上来，
  // 故命中测试：点位下方若压着一枚已落半圆，就开它的改色/标签菜单，而不是再贴一枚。
  const under=document.elementsFromPoint(e.clientX,e.clientY).find(el=>el.closest&&el.closest('.dotwrap-a'));
  if(under){
    const wrap=under.closest('.dotwrap-a');
    const dot={ id:wrap.dataset.dotId, color:wrap.dataset.c, label:wrap.dataset.label, _el:wrap };
    showDotBar(dot, wrap.querySelector('.halfdot').getBoundingClientRect());
    return;
  }
  const blk=blockAtY(e.clientY); if(!blk) return;
  placeDotAt(blk, e.clientY);
}
(function _bindDotSlotA(){
  const slot=document.getElementById('dotSlotA');
  if(!slot) return;
  slot.addEventListener('mousemove',_dotSlotAMove);
  slot.addEventListener('mouseleave',_dotSlotALeave);
  slot.addEventListener('click',_dotSlotAClick);
  reading.addEventListener('scroll',()=>{ _dotPositionSlotA(); const g=document.getElementById('dotSlotAGuide'); if(g)g.classList.remove('show'); });
  window.addEventListener('resize',_dotPositionSlotA);
})();
// 文章模式点已落的圆点标记 → mini popover；点书签同款事件已在 reading click delegate 里，圆点单独接一个
reading.addEventListener('click', e=>{
  const wrap=e.target.closest('.dotwrap-a'); if(!wrap) return;
  if(performance.now()-_winFocusTs < BK_FOCUS_GUARD_MS) return;
  e.stopPropagation();
  const dot={ id:wrap.dataset.dotId, color:wrap.dataset.c, label:wrap.dataset.label, _el:wrap };
  showDotBar(dot, wrap.querySelector('.halfdot').getBoundingClientRect());
});
async function _dotJumpToA(dot){ /* 页码条只在书模式渲染，文章模式无需跳转 */ }

/* ===== 圆点 mini popover：七色改色 + 标签输入 + 移除（复用 selbar 浮条样式）===== */
let _curDot=null;
const dotBar=document.createElement('div'); dotBar.className='selbar dotbar'; document.body.appendChild(dotBar);
function _dotColorsHtml(cur){
  return HL_COLORS.map(k=>`<span class="sb-c${k===cur?' on':''}" data-c="${k}" style="background:var(--c${k})" title="改色"></span>`).join('');
}
function showDotBar(dot, rect){
  _curDot=dot;
  dotBar.innerHTML=_dotColorsHtml(dot.color)
    +'<span class="sb-sep"></span><input class="dot-label-in" maxlength="3" placeholder="标签" value="'+escapeHtml(dot.label||'')+'">'
    +'<span class="sb-sep"></span><button class="sb-del">移除</button>';
  dotBar.style.left=Math.max(8, Math.min(window.innerWidth-160, rect.left+rect.width/2-70))+'px';
  dotBar.style.top=Math.max(8, rect.top-42)+'px';
  dotBar.classList.add('show');
}
function hideDotBar(){ dotBar.classList.remove('show'); _curDot=null; }
function _dotApplyLabel(dot, label){
  label=(label||'').slice(0,3);
  if(dot._el){   // 文章模式：DOM 标记本身是数据源
    dot._el.dataset.label=label;
    const lb=dot._el.querySelector('.dotlabel');
    if(label){ if(lb) lb.textContent=label; else dot._el.insertAdjacentHTML('beforeend', `<span class="dotlabel">${escapeHtml(label)}</span>`); }
    else if(lb) lb.remove();
    scheduleSave();
  } else {   // 书模式：record + 重画
    dot.label=label;
    _renderDotLayer(); _renderPagerTicks();
    scheduleSave();
  }
}
function _dotApplyColor(dot, color){
  if(dot._el){
    dot._el.dataset.c=color;
    const hd=dot._el.querySelector('.halfdot'); if(hd) hd.style.background='var(--c'+color+')';
    scheduleSave();
  } else {
    dot.color=color;
    _renderDotLayer(); _renderPagerTicks();
    scheduleSave();
  }
  _dotLastColor=color;   // 记住这次选色，下一枚干净放置就用它
}
function _dotRemove(dot){
  if(dot._el){ dot._el.remove(); scheduleSave(); }
  else { const rec=_dots.find(d=>d.id===dot.id); if(rec) _dotDelete(rec); }
}
dotBar.addEventListener('mousedown', e=>{ if(!e.target.classList.contains('dot-label-in')) e.preventDefault(); });   // keep selection/focus except in the label input
dotBar.addEventListener('click', e=>{
  if(e.target.classList.contains('dot-label-in')) return;   // 输入框内点击不关闭
  const cDot=e.target.closest('.sb-c');
  if(cDot && _curDot){
    _dotApplyColor(_curDot, cDot.dataset.c);
    // 原地更新当前色高亮即可，不要重开浮条——重开会以浮条自身 rect 重新定位，导致每点一次就上移一截。
    dotBar.querySelectorAll('.sb-c').forEach(s=>s.classList.toggle('on', s.dataset.c===cDot.dataset.c));
    return;
  }
  if(e.target.closest('.sb-del') && _curDot){ _dotRemove(_curDot); hideDotBar(); return; }
});
dotBar.addEventListener('input', e=>{
  if(!e.target.classList.contains('dot-label-in') || !_curDot) return;
  _dotApplyLabel(_curDot, e.target.value);
});
dotBar.addEventListener('keydown', e=>{ if(e.key==='Enter') hideDotBar(); });

// render (and if needed fetch) a phrase's explanation into the panel
async function showPhrase(ph, refetch){
  switchTab('ex');
  let r={}; try{ r=JSON.parse(ph.dataset.ex||'{}'); }catch(_){}
  const have=r && (r.explanation||r.contextual||r.literal||r.meaning||r.talk);
  if(refetch || !have){
    _panelKey=phraseKey(ph.dataset.phrase);   // ④ 面板立刻切走：让上一个词/短语的在途追问 sink 知道自己已不在场
    panelEx.innerHTML=`<div class="loading"><span class="spinner"></span> 正在讲解 <b>${escapeHtml(ph.dataset.phrase)}</b>…</div>`;
    try{
      const got=await llmCall(()=>api().explain_selection({text:ph.dataset.phrase, sentence:ph.dataset.sentence||''}));
      if(got && got.ok===false){ panelEx.innerHTML=`<div class="ex-empty">${escapeHtml(got.error||'讲解失败')}</div>`; return; }
      const old=r; r={}; for(const k in got){ if(k!=='cached') r[k]=got[k]; }
      if(old && old.followups) r.followups=old.followups;   // preserve any earlier 追问
      ph.dataset.ex=JSON.stringify(r);
      _syncPhraseEx(ph);
    }catch(e){ panelEx.innerHTML=`<div class="ex-empty">出错：${escapeHtml(''+e)}</div>`; return; }
  }
  showExplanation(r, {word:ph.dataset.phrase, sentence:ph.dataset.sentence||'', phraseEl:ph});
  prefetchAudio(ph.dataset.phrase);
  scheduleSave();
}
function reopenPhrase(ph, ev){ _curPhrase=ph; showPhrase(ph, false); const p=_evPt(ev); showPhraseBar(p.x, p.y); }
// the 「讲解·追问」 action: wrap the current selection (possibly across paragraph
// blocks — each block gets its own .phrase span, all sharing one data-pid), then explain it
async function explainSelection(){
  if(!_selRange){ hideBar(); return; }
  const range=_selRange, text=_selText, sentence=_selSent; _selRange=null;
  const pid='ph'+Date.now()+'_'+(++_phraseSeq);
  const {spans, anchors}=_wrapRangeAcrossBlocks(range, ()=>{
    const sp=document.createElement('span');
    sp.className='phrase';
    sp.dataset.pid=pid; sp.dataset.phrase=text; sp.dataset.sentence=sentence||''; sp.dataset.ex='{}';
    return sp;
  });
  if(bookMode) spans.forEach((sp,i)=>_recordPhraseAnchor(sp, anchors[i]));   // ③ 跨章持久锚点
  try{ window.getSelection().removeAllRanges(); }catch(_){}
  if(!spans.length){   // couldn't wrap at all → explain transiently, no band
    hideBar(); switchTab('ex');
    _panelKey=phraseKey(text);   // ④ 面板立刻切走
    panelEx.innerHTML=`<div class="loading"><span class="spinner"></span> 正在讲解 <b>${escapeHtml(text)}</b>…</div>`;
    try{
      const r=await llmCall(()=>api().explain_selection({text, sentence}));
      if(r && r.ok===false){ panelEx.innerHTML=`<div class="ex-empty">${escapeHtml(r.error||'讲解失败')}</div>`; return; }
      showExplanation(r, {word:text, sentence}); prefetchAudio(text); scheduleSave();
    }catch(e){ panelEx.innerHTML=`<div class="ex-empty">出错：${escapeHtml(''+e)}</div>`; }
    return;
  }
  _curPhrase=spans[0]; { const p=_selPt||{x:window.innerWidth/2,y:80}; showPhraseBar(p.x, p.y); }   // keep ✕ visible so a mis-touch can undo
  await showPhrase(spans[0], true);
}

/* ---------- bookmark（文章模式）----------
   去武装模式：正文空白单击直接放置；.bookmark 为 A 样式（黛蓝细线 + 右端日期纸签）；
   点整条线即删除（无撤销，1.6s 自动清 toast）；HTML 持久化不变（data-date 属性随存档走）。 */
function fmtBkDate(ts){
  const d=ts?new Date(ts*1000):new Date();
  return `${d.getMonth()+1}月${d.getDate()}日`;
}
function makeBookmarkEl(ts){
  const mk=document.createElement('div');
  const t=ts||(Date.now()/1000);
  mk.className='bookmark'; mk.setAttribute('contenteditable','false'); mk.dataset.date=String(t);
  mk.innerHTML=`<span class="bk-mid"><span class="bk-label">`
    +`<span class="bk-date-txt">${fmtBkDate(t)}</span><span class="bk-del-txt">✕ 移除</span>`
    +`</span></span>`;
  return mk;
}
function blockAtY(clientY){
  const inner=reading.querySelector('.reading-inner'); if(!inner) return null;
  const blocks=[...inner.querySelectorAll('p,h1,h2,h3,li,blockquote')].filter(b=>!b.closest('.bookmark'));
  let best=null;
  for(const b of blocks){
    const r=b.getBoundingClientRect();
    if(clientY>=r.top && clientY<=r.bottom) return b;
    if(r.top>clientY){ best=best||b; }
  }
  return best || blocks[blocks.length-1] || null;
}
/* 文章模式落点 Y：书签/圆点都插在段落边界，行实际渲染在锚块顶缘（before）或下一块顶缘（after==before next）。
   .bookmark/.dotwrap-a 用 margin:0 消回流 + transform:translateY(-10px) 把标记整体上提到间隙正中，
   故真实视觉 Y = 块边缘 - 10；预览引导线用这个精确 Y，与真实落点像素对齐。 */
const _ART_GAP_LIFT=10;   // 与书模式 _renderBkLayer 的 gapHalf 及 .bookmark/.dotwrap-a 的 transform 同值
function _artAnchorY(clientY, blk, r){
  let edge;
  if(clientY <= r.top + r.height/2){ edge=r.top; }   // before this block → 本块顶缘
  else {
    edge=r.bottom;                                    // 末块之后兜底
    const inner=reading.querySelector('.reading-inner');
    if(inner){
      const blocks=[...inner.querySelectorAll('p,h1,h2,h3,li,blockquote')].filter(b=>!b.closest('.bookmark'));
      const nx=blocks[blocks.indexOf(blk)+1];
      if(nx) edge=nx.getBoundingClientRect().top;      // after == 下一块顶缘
    }
  }
  return edge - _ART_GAP_LIFT;                         // 上提到间隙正中，与 transform 一致
}
function placeBookmarkAt(target, clientY){
  const inner=reading.querySelector('.reading-inner'); if(!inner) return;
  if(!target) target=blockAtY(clientY);
  const mk=makeBookmarkEl();
  // Insert in normal document flow with NO scroll adjustment: everything above
  // the insertion point stays visually fixed, and the marker's height is
  // absorbed by content below it (which moves down). Any scrollTop change here
  // would shift the text above the marker and cause the jump the user dislikes.
  if(target){
    const r=target.getBoundingClientRect();
    if(clientY > r.top + r.height/2) target.after(mk); else target.before(mk);
  } else { inner.appendChild(mk); }
  scheduleSave();
}
function removeBookmark(mk){
  if(!mk) return;
  mk.remove();
  scheduleSave();
}

/* ---- 页缘书签槽（文章模式）：#bkSlotA fixed，贴住居中正文列左侧 ----
   放置手势与书模式统一：移到槽上→＋跟随行 + 落线预览，点它在最近块边界落书签。
   正文滚动/窗口缩放时需重定位（跟住正文列左缘）。 */
function _bkPositionSlotA(){
  const slot=document.getElementById('bkSlotA');
  const guide=document.getElementById('bkSlotAGuide');
  if(!slot) return;
  if(bookMode || !document.body.classList.contains('reading')){
    if(guide) guide.classList.remove('show'); slot.classList.remove('armed'); return;
  }
  const inner=reading.querySelector('.reading-inner'); if(!inner) return;
  const ir=inner.getBoundingClientRect();
  const rr=reading.getBoundingClientRect();
  slot.style.top=rr.top+'px';
  slot.style.height=rr.height+'px';
  slot.style.left=Math.max(rr.left, ir.left-42)+'px';   // 贴列左缘外侧 42px；窄窗兜底不越出 reading
}
function _bkSlotAMove(e){
  const slot=document.getElementById('bkSlotA');
  const plus=slot && slot.querySelector('.bk-slot-plus');
  const guide=document.getElementById('bkSlotAGuide');
  const blk=blockAtY(e.clientY);
  if(!blk){ if(slot)slot.classList.remove('armed'); if(guide)guide.classList.remove('show'); return; }
  const r=blk.getBoundingClientRect();
  const gy=_artAnchorY(e.clientY, blk, r);   // 预览线画在真实落点（与放置像素对齐）
  if(plus){ const sr=slot.getBoundingClientRect(); plus.style.top=(gy-sr.top)+'px'; }
  if(slot) slot.classList.add('armed');
  if(guide){
    const inner=reading.querySelector('.reading-inner'); const ir=inner.getBoundingClientRect();
    guide.style.top=gy+'px'; guide.style.left=ir.left+'px'; guide.style.width=ir.width+'px';
    guide.classList.add('show');
  }
}
function _bkSlotALeave(){
  const slot=document.getElementById('bkSlotA'), guide=document.getElementById('bkSlotAGuide');
  if(slot) slot.classList.remove('armed');
  if(guide) guide.classList.remove('show');
}
function _bkSlotAClick(e){
  e.stopPropagation();
  // 点位下方压着已落书签线（其左段在槽下）→ 当作点线，删除，而不是再叠一条。
  const under=document.elementsFromPoint(e.clientX,e.clientY).find(el=>el.closest&&el.closest('.bookmark'));
  if(under){
    if(performance.now()-_winFocusTs < BK_FOCUS_GUARD_MS) return;   // 焦点保护：刚激活窗口的一击不删
    removeBookmark(under.closest('.bookmark')); return;
  }
  const blk=blockAtY(e.clientY); if(!blk) return;
  placeBookmarkAt(blk, e.clientY);
}
(function _bindBkSlotA(){
  const slot=document.getElementById('bkSlotA');
  if(!slot) return;
  slot.addEventListener('mousemove',_bkSlotAMove);
  slot.addEventListener('mouseleave',_bkSlotALeave);
  slot.addEventListener('click',_bkSlotAClick);
  reading.addEventListener('scroll',()=>{ _bkPositionSlotA(); const g=document.getElementById('bkSlotAGuide'); if(g)g.classList.remove('show'); });
  window.addEventListener('resize',_bkPositionSlotA);
})();

/* ---- bookmark dropdown menu (jump to / delete) ---- */
const bkMenu=$('#bkMenu'), bkMenuList=$('#bkMenuList'), bkAdd=$('#bkAdd');
function bkBlockText(mk){
  const isBlk=el=>el&&el.matches&&el.matches('p,h1,h2,h3,li,blockquote');
  let el=mk.nextElementSibling; while(el&&!isBlk(el)) el=el.nextElementSibling;
  if(!isBlk(el)){ el=mk.previousElementSibling; while(el&&!isBlk(el)) el=el.previousElementSibling; }
  let t=(el?el.textContent:'').replace(/\s+/g,' ').trim();
  return t ? (t.slice(0,46)+(t.length>46?'…':'')) : '书签';
}
function renderBkMenu(){
  const marks=[...reading.querySelectorAll('.bookmark')];
  if(!marks.length){ bkMenuList.innerHTML='<div class="bk-empty">还没有书签。<br>把鼠标移到正文左侧页边，点一下即可放置。</div>'; return; }
  bkMenuList.innerHTML='';
  marks.forEach((mk,i)=>{
    const row=document.createElement('div'); row.className='bk-row';
    row.innerHTML=`<span class="bk-i">${i+1}</span><span class="bk-t"></span><button class="bk-del" title="删除此书签">✕</button>`;
    row.querySelector('.bk-t').textContent=bkBlockText(mk);
    row.addEventListener('click',e=>{
      if(e.target.closest('.bk-del')){ e.stopPropagation(); removeBookmark(mk); renderBkMenu(); return; }
      closeBkMenu();
      mk.scrollIntoView({behavior:'smooth', block:'center'});
      mk.classList.remove('flash'); void mk.offsetWidth; mk.classList.add('flash');
    });
    bkMenuList.appendChild(row);
  });
}
let _bkMenuTrigger=bookmarkBtn;
function openBkMenu(trigger){
  _bkMenuTrigger=trigger||bookmarkBtn;
  const r=_bkMenuTrigger.getBoundingClientRect();
  bkMenu.style.top=(r.bottom+6)+'px';
  bkMenu.style.left=Math.max(8, Math.min(r.left, window.innerWidth-308))+'px';
  renderBkMenu();
  bkMenu.classList.add('show');
}
function closeBkMenu(){ bkMenu.classList.remove('show'); }
bookmarkBtn.addEventListener('click',e=>{

  bkMenu.classList.contains('show') ? closeBkMenu() : openBkMenu(bookmarkBtn);

/* ---------- hybrid pre-generation ---------- */
async function maybePregen(){
  stopPregenPoll();
  if(!llmOn || !pregenChk.checked) return;
  try{ await api().start_pregen({}); }catch(e){ return; }
  pregenTimer=setInterval(pollPregen, 600);
  pollPregen();
}
async function pollPregen(){
  let s;
  try{ s=await api().get_pregen_status(); }catch(e){ return; }
  if(!s || !s.total){ stopPregenPoll(); return; }
  if(s.done < s.total && s.running){
    setStatus(`讲解预备中 ${s.done} / ${s.total}…`);
  } else {
    setStatus(`✓ 讲解已就绪（${s.total} 个生词）`);
    stopPregenPoll();
    setTimeout(clearStatus, 1800);
  }
}

/* file drop / picker —— WKWebView 不暴露 File.path，所以按内容读（FileReader）
   而非按路径，拖拽和点选都不依赖路径，.epub/.txt 都可靠 */
function readAndRun(f){
  if(!f) return;
  const reader=new FileReader();
  reader.onload=()=>runFile(f.name, reader.result);
  reader.onerror=()=>setStatus('❌ 读取文件失败', true);
  reader.readAsDataURL(f);
}
/* dropzone 里：空白＝URL 输入框（点它聚焦、粘贴链接），选文件走 <label for="file">（真手势触发原生选择器，
   规避 WKWebView 对程序化 fileInput.click() 的拦截）；拖入 EPUB 走整窗 drop。故不再给 drop 整体挂点击=选文件。 */
fileInput.addEventListener('change',e=>{readAndRun(e.target.files[0]);});
/* 隐藏桩 addBookBtn 仍被引用（历史入口），点它就选文件；界面添加书走 dropzone 的「选文件」与弦月「添加」。 */
$('#addBookBtn').addEventListener('click',()=>{ fileInput.click(); });

/* ── full-window drag-and-drop ──────────────────────────────────────────────
   Drop a .epub/.txt ANYWHERE over the window (not just the small home zone),
   and it works even while a book is already open. A depth counter keeps the veil
   stable while the cursor moves over child elements. Only reacts to file drags. */
const dragVeil=$('#dragVeil');
let dragDepth=0;
const isFileDrag=e=>{const t=e.dataTransfer;return t && Array.from(t.types||[]).includes('Files');};
window.addEventListener('dragenter',e=>{
  if(!isFileDrag(e))return; e.preventDefault();
  if(++dragDepth===1) dragVeil.classList.add('show');
});
window.addEventListener('dragover',e=>{ if(isFileDrag(e)) e.preventDefault(); });
window.addEventListener('dragleave',e=>{
  if(!isFileDrag(e))return;
  if(--dragDepth<=0){ dragDepth=0; dragVeil.classList.remove('show'); }
});
window.addEventListener('drop',e=>{
  if(!isFileDrag(e))return; e.preventDefault();
  dragDepth=0; dragVeil.classList.remove('show'); drop.classList.remove('over');
  const f=e.dataTransfer.files[0]; if(f) readAndRun(f);
});

/* ---------- 首页：单一入口 + 书墙 + 剪报盒 ---------- */
const BAND_COLORS=['var(--amber)','var(--green)','var(--navy)','var(--clay)','var(--plum)','var(--olive)','var(--mauve)'];
function bandFor(id,i){
  // 按 id 做一个简单 hash，同一本书/文章的套色稳定不跳变；无 id 时退回 index。
  let h=0; const s=String(id||i); for(let k=0;k<s.length;k++) h=(h*31+s.charCodeAt(k))|0;
  return BAND_COLORS[Math.abs(h)%BAND_COLORS.length];
}
function setWelGreeting(){
  const g=document.querySelector('#welGreet'), s=document.querySelector('#welSub'); if(!g||!s) return;
  const hr=new Date().getHours(); let a,b;
  if(hr>=5&&hr<11){a='早安';b='给自己沏杯茶，挑一篇想读的，慢慢开始。';}
  else if(hr>=11&&hr<13){a='中午好';b='读几段，让世界先安静一会儿。';}
  else if(hr>=13&&hr<18){a='下午好';b='一篇文章的时间，刚刚好。';}
  else if(hr>=18&&hr<23){a='晚上好';b='灯亮了，坐下来，读一会儿吧。';}
  else {a='夜深了';b='读一小段，然后好好休息。';}
  g.textContent=a; s.textContent=b;
}
function fmtDateShort(t){
  if(!t) return '';
  const d=new Date(t*1000);
  return (d.getMonth()+1)+' 月 '+d.getDate()+' 日';
}
/* 封面：有真封面（后端从 epub 抽好的 data URL）就用 <img>；没有才落回字排兜底
   （暖纸 + 顶部套色带 + 衬线书名 + 作者/来源）。两种都盖同一条进度色带。 */
function coverHTML(it,i,progressPct){
  const band=bandFor(it.id,i);
  const prog=progressPct>0?'<span class="cv-prog" style="--band:'+band+';width:'+progressPct+'%"></span>':'';
  if(it.cover){
    return '<div class="cover"><img class="cv-img" src="'+it.cover+'" alt="" loading="lazy" draggable="false">'+prog+'</div>';
  }
  const by=escapeHtml(it.source||'');
  return '<div class="cover"><div class="cv-type" style="--band:'+band+'">'
    +'<span class="cv-spineline"></span><span class="cv-mark"></span>'
    +'<div class="cv-title">'+escapeHtml(it.title||'(无标题)')+'</div>'
    +'<div class="cv-by">'+by+'</div>'
    +'</div>'+prog
    +'</div>';
}
function bookProgress(it){
  const total=it.chapter_count||0, cur=it.current_chapter;
  if(total>0 && cur!=null) return Math.max(0,Math.min(100,Math.round((cur+1)/total*100)));
  return 0;
}
function bookHTML(it,i){
  const pct=bookProgress(it);
  // 删除按钮锚在封面右上角（.book 是定位上下文），不再挤进书名行遮字
  return '<div class="book" data-id="'+escapeHtml(String(it.id))+'">'+coverHTML(it,i,pct)
    +'<button class="book-del" data-del="'+escapeHtml(String(it.id))+'" title="从书架删除这本">×</button>'
    +'<div class="book-meta"><div class="book-t">'+escapeHtml(it.title||'(无标题)')+'</div>'
    +'<div class="book-p">'+(pct>0?pct+'% 已读':'未开卷')+'</div></div></div>';
}
function heroHTML(it,i){
  const pct=bookProgress(it);
  return '<div class="hero" data-id="'+escapeHtml(String(it.id))+'">'+coverHTML(it,i,pct)
    +'<button class="book-del" data-del="'+escapeHtml(String(it.id))+'" title="从书架删除这本">×</button></div>';
}
/* 媒体来源→品牌简写：有公认缩写的用缩写（CNA/BBC/NYT…），否则回落干净的品牌名/host。
   ⚠️ 要新增媒体：往这张表加一行即可（键统一用小写；host 与 sitename 两种写法都可命中）。 */
const SOURCE_ABBR={
  'channelnewsasia.com':'CNA','cna':'CNA','channel newsasia':'CNA','channelnewsasia':'CNA',
  'theconversation.com':'The Conversation','the conversation':'The Conversation',
  'straitstimes.com':'The Straits Times','the straits times':'The Straits Times',
  'bbc.com':'BBC','bbc.co.uk':'BBC','bbc news':'BBC','bbc':'BBC',
  'nytimes.com':'NYT','the new york times':'NYT',
  'theguardian.com':'The Guardian','the guardian':'The Guardian',
  'washingtonpost.com':'WaPo','the washington post':'WaPo',
  'wsj.com':'WSJ','the wall street journal':'WSJ',
  'reuters.com':'Reuters','apnews.com':'AP','associated press':'AP','afp.com':'AFP',
  'ft.com':'FT','financial times':'FT','economist.com':'The Economist','the economist':'The Economist',
  'cnn.com':'CNN','npr.org':'NPR','scmp.com':'SCMP','south china morning post':'SCMP',
  'aeon.co':'Aeon','sixthtone.com':'Sixth Tone','sixth tone':'Sixth Tone',
  'nature.com':'Nature','scientificamerican.com':'Sci Am','sciencemag.org':'Science',
};
/* 剪报来源小标：先按 host/sitename 命中品牌简写；否则回落 sitename，再回落 host（去 www.）。非 URL 来源返回空。 */
function clipMasthead(it){
  let host='';
  const m=(it.source||'').match(/^https?:\/\/([^\/]+)/i);
  if(m) host=m[1].replace(/^www\./,'').toLowerCase();
  const name=(it.sitename||'').trim();
  if(host && SOURCE_ABBR[host]) return SOURCE_ABBR[host];
  if(name && SOURCE_ABBR[name.toLowerCase()]) return SOURCE_ABBR[name.toLowerCase()];
  if(name) return name;
  if(host) return host;
  return '';
}
function clipHTML(it,i){
  const band=bandFor(it.id,i);
  const del='<button class="clip-del" data-del="'+escapeHtml(String(it.id))+'" title="从剪报盒删除">×</button>';
  if(it.cover){
    // ④ 压低封面（方案 B）：矮横幅首图 + 紧凑正文；来源低调简写落卡底右侧（与左侧日期对称）
    const origName=clipMasthead(it);
    const orig=origName?('<span class="clip-orig">'+escapeHtml(origName)+'</span>'):'';
    return '<div class="clip has-cover" data-id="'+escapeHtml(String(it.id))+'" style="--band:'+band+'">'
      +'<div class="clip-cover" style="background-image:url(&quot;'+it.cover+'&quot;)"></div>'
      +'<div class="clip-body">'
        +'<div class="clip-t">'+escapeHtml(it.title||'(无标题)')+'</div>'
        +'<div class="clip-foot"><span class="clip-date">'+fmtDateShort(it.saved_at)+'</span>'+orig+'</div>'
      +'</div>'+del+'</div>';
  }
  // ④ B（回落）：无图 → 报刊剪报式，来源小标(套色)+细线+标题+日期
  const name=clipMasthead(it);
  const mast=name?('<div class="clip-mast"><span class="clip-src">'+escapeHtml(name)+'</span><span class="clip-rule"></span></div>'):'';
  return '<div class="clip" data-id="'+escapeHtml(String(it.id))+'" style="--band:'+band+'">'
    +mast
    +'<div class="clip-t">'+escapeHtml(it.title||'(无标题)')+'</div>'
    +'<div class="clip-foot"><span class="clip-date">'+fmtDateShort(it.saved_at)+'</span></div>'
    +del+'</div>';
}
const HOME_ADD_BOOK='<div class="book book-add" title="拖入或粘贴，自动归到书墙"><div class="cover">＋</div><div class="book-meta"><div class="book-t" style="color:var(--muted)">添加书籍</div><div class="book-p">EPUB</div></div></div>';
const HOME_ADD_CLIP='<div class="clip clip-add" title="粘贴链接或文本">＋ 添加文章</div>';

let _homeShowAllBooks=false;     // 「＋还有 N 本」展开后置 true
async function renderHome(){

/* ---------- ⑥ 读物精选：剪报盒下方的 RSS 来源带 ----------
   来源先用手机版已验证可用的两个（santu_app/mobile/discover.js 的 OUTLETS 同一份）；
   mockup 里的 Aeon 是占位，先不放。色条固定 navy/green（呼应 mockup 里"稳定不跳变"的
   套色语言，而非 bandFor 的 hash——两个来源本就该有稳定的自己的颜色）。 */
const DISC_OUTLETS=[
  { id:'cna', name:'CNA', desc:'Channel NewsAsia · 亚洲视角英文新闻', band:'var(--navy)',
    feeds:[ {name:'最新', url:'https://www.channelnewsasia.com/rssfeeds/8395986'} ] },
  // 补充批2 #3：恢复 global/us/uk 三个 feed，改按需加载的子标签切换（不再并行拉 3 个合并），
  // 比原来更快、又能让用户便捷切换地区。
  { id:'tc', name:'The Conversation', desc:'学者撰稿 · 深度解读', band:'var(--green)',
    feeds:[
      {name:'全球', url:'https://theconversation.com/global/articles.atom'},
      {name:'美国', url:'https://theconversation.com/us/articles.atom'},
      {name:'英国', url:'https://theconversation.com/uk/articles.atom'},
    ] },
];
let _discOpenId=null;   // 当前展开的来源 id；再点同一张收起
let _discOpenFeedIdx=0; // 补充批2 #3：当前打开来源里选中的 feed 下标（默认 0＝全球）
const _discCache=new Map();   // D→补充批2 #3：键改为 outletId+':'+feedIdx，每个 feed 各自缓存；↻刷新绕过它重拉
let _discPrefetched=false;    // 每次会话首次进首页后预取一遍，避免重复轰炸
function renderDiscOutlets(){
  const wrap=document.querySelector('#discOutlets'); if(!wrap) return;
  wrap.innerHTML=DISC_OUTLETS.map(o=>
    '<div class="disc-src'+(_discOpenId===o.id?' on':'')+'" data-outlet="'+o.id+'" style="--band:'+o.band+'">'
    +'<div class="ds-name">'+escapeHtml(o.name)+'</div><div class="ds-desc">'+escapeHtml(o.desc)+'</div>'
    +'<span class="ds-arrow">'+(_discOpenId===o.id?'⌄':'›')+'</span></div>'
  ).join('');

function discTimeAgo(dateStr){
  if(!dateStr) return '';
  const ts=Date.parse(dateStr);
  if(isNaN(ts)) return '';
  const diffSec=(Date.now()-ts)/1000;
  if(diffSec<0) return '';
  if(diffSec<3600) return Math.max(1,Math.round(diffSec/60))+'分钟前';
  if(diffSec<86400) return Math.round(diffSec/3600)+'小时前';
  if(diffSec<86400*7) return Math.round(diffSec/86400)+'天前';
  return new Date(ts).toLocaleDateString('zh-CN');
}
/* 补充批2 #3：改成只拉单个 feed（按需加载，切子标签才拉对应地区），不再并行拉该来源全部 feed 合并——
   比原来更快。feedIdx 默认 0（全球/该来源首个 feed）。
   D：结果写入 _discCache，键为 outlet.id+':'+feedIdx；forceFresh=true（↻刷新）绕过缓存直接重拉并覆盖。 */
const _discInflight=new Map();   // key -> Promise：在途去重。预取与点击同时命中同一 feed 时复用同一请求，
                                 // 不再各打一次（既省一次往返，也减轻 CNA 这类慢源的并发压力、降低超时概率）。
async function discLoadOutlet(outlet, feedIdx, forceFresh){
  feedIdx=feedIdx||0;
  const key=outlet.id+':'+feedIdx;
  if(!forceFresh && _discCache.has(key)) return _discCache.get(key);
  if(!forceFresh && _discInflight.has(key)) return _discInflight.get(key);   // 复用在途请求
  const feed=outlet.feeds[feedIdx]; if(!feed) return {ok:false, error:'无此 feed'};
  const p=(async()=>{
    const r=await api().fetch_feed({url:feed.url}).catch(e=>({ok:false,error:String(e)}));
    let out;
    if(!r || !r.ok){
      out={ok:false, error:(r&&r.error)||'加载失败'};
    }else{
      const items=(r.items||[]).slice().sort((a,b)=>(Date.parse(b.date)||0)-(Date.parse(a.date)||0));
      out={ok:true, items};
    }
    if(out.ok) _discCache.set(key, out);   // 只缓存成功结果，失败下次照样重试
    return out;
  })();
  _discInflight.set(key, p);
  try{ return await p; } finally { _discInflight.delete(key); }
}
/* D→补充批2 #3：首页加载后 idle 时静默预取所有来源，写进 _discCache——用户点任意来源时多半已命中、秒开。
   只预取每个来源的 feedIdx 0（全球），保持预取轻量；其余 feed 点到才拉。只在每次会话首次进首页时跑一遍。 */
function discPrefetchAll(){
  if(_discPrefetched) return;
  _discPrefetched=true;
  const run=()=>DISC_OUTLETS.forEach(o=>{ if(!_discCache.has(o.id+':0')) discLoadOutlet(o, 0).catch(()=>{}); });
  if('requestIdleCallback' in window) requestIdleCallback(run, {timeout:4000});
  else setTimeout(run, 800);
}
/* B：把 #discList 定位成锚在 srcEl 附近的浮层卡片——position:fixed + getBoundingClientRect，
   不受滚动影响。优先浮在来源卡上方（bottom 对齐卡片顶、留 8px 间隙）；上方空间不足则浮下方；
   水平左对齐卡片左缘，超右边界则右对齐视口内。 */
function positionDiscList(list, srcEl){
  const r=srcEl.getBoundingClientRect();
  const gap=8, vw=window.innerWidth, vh=window.innerHeight;
  list.style.left='0px'; list.style.top='0px'; list.style.bottom=''; // reset before measuring
  const lw=Math.min(420, Math.max(320, r.width)), maxH=Math.min(vh*0.6, 420);
  let left=r.left; if(left+lw>vw-8) left=Math.max(8, vw-8-lw);
  const spaceAbove=r.top-gap, spaceBelow=vh-r.bottom-gap;
  if(spaceAbove>=Math.min(200, maxH) || spaceAbove>=spaceBelow){
    // 浮上方：卡片底边贴来源卡顶边
    list.style.top=''; list.style.bottom=(vh-r.top+gap)+'px';
  }else{
    list.style.bottom=''; list.style.top=(r.bottom+gap)+'px';
  }
  list.style.left=left+'px';
}
function closeDiscList(){
  _discOpenId=null; _discOpenFeedIdx=0; renderDiscOutlets();
  const list=document.querySelector('#discList'); if(list) list.style.display='none';
}
/* 补充批2 #3：discOpenOutlet 加 feedIdx 参数（默认 0）。多 feed 来源（目前 TC）在 popover 头部
   渲染一排 feed 子标签（全球/美国/英国），点子标签切换重新按该 feedIdx 加载渲染；
   单 feed 来源（CNA）不出子标签，行为与之前一致。 */
async function discOpenOutlet(id, feedIdx){
  const outlet=DISC_OUTLETS.find(o=>o.id===id); if(!outlet) return;
  feedIdx=feedIdx||0;
  if(_discOpenId===id && _discOpenFeedIdx===feedIdx){
    // 只有列表真开着才当 toggle 收起；若是残留态（如上次点文章进阅读、回首页后
    // _discOpenId 没清），这一击应视为「重新打开」，否则首点会被白白吃掉。
    const lst=document.querySelector('#discList');
    if(lst && lst.style.display!=='none'){ closeDiscList(); return; }
  }
  _discOpenId=id; _discOpenFeedIdx=feedIdx; renderDiscOutlets();
  const list=document.querySelector('#discList'); if(!list) return;
  const srcEl=document.querySelector('.disc-src[data-outlet="'+id+'"]');
  list.style.display='block';
  if(srcEl) positionDiscList(list, srcEl);
  const cacheKey=id+':'+feedIdx;
  const cached=_discCache.get(cacheKey);
  const renderHd=()=>{
    const tabs=outlet.feeds.length>1
      ? '<span class="dlh-tabs">'+outlet.feeds.map((f,i)=>
          '<button class="dlh-tab'+(i===feedIdx?' on':'')+'" data-disc-feed="'+i+'">'+escapeHtml(f.name)+'</button>'
        ).join('')+'</span>'
      : '<span class="dlh-feed">'+escapeHtml(outlet.feeds[0].name)+'</span>';
    return '<div class="disc-list-hd"><span class="dlh-src">'+escapeHtml(outlet.name)+'</span>'
      +tabs+'<span class="dlh-sp"></span>'
      +'<button class="dlh-act" data-disc-refresh="1">↻ 刷新</button><button class="dlh-act" data-disc-close="1">✕</button></div>';
  };
  const renderResult=(r)=>{
    if(_discOpenId!==id || _discOpenFeedIdx!==feedIdx) return;   // 加载期间用户切了别的来源/feed/收起了 → 别再写过期结果
    list.innerHTML=renderHd();
    if(!r.ok){
      const err=document.createElement('div'); err.className='disc-err-msg'; err.textContent='加载失败：'+(r.error||'未知错误');
      list.appendChild(err);
    }else if(!r.items.length){
      const empty=document.createElement('div'); empty.className='disc-err-msg'; empty.textContent='暂无文章';
      list.appendChild(empty);
    }else{
      const rows=r.items.map(it=>
        '<div class="da" data-url="'+escapeHtml(it.url)+'"><span class="da-t">'+escapeHtml(it.title)+'</span>'
        +'<span class="da-meta">'+escapeHtml(discTimeAgo(it.date))+'</span></div>'
      ).join('');
      list.insertAdjacentHTML('beforeend', rows);
    }
    if(srcEl) positionDiscList(list, srcEl);   // 内容定型后按实际高度（max-height 封顶）重新定位一次
  };
  if(cached){ renderResult(cached); return; }   // D：缓存命中，0 延迟渲染
  list.innerHTML=renderHd()+'<div class="disc-loading">载入中…</div>';
  const r=await discLoadOutlet(outlet, feedIdx);
  renderResult(r);
}

// 补充批2 #1：popover 用 fixed+rect 定位；滚动时不再直接关闭，改为跟随来源卡重定位，
// 用 rAF 节流合并高频 scroll 事件；仅当来源卡本身滚出视口才收起。resize 布局剧变仍直接关闭。
let _discScrollTicking=false;
function _discRepositionOnScroll(){
  _discScrollTicking=false;
  if(!_discOpenId) return;
  const list=document.querySelector('#discList');
  const srcEl=document.querySelector('.disc-src[data-outlet="'+_discOpenId+'"]');
  if(!list || !srcEl){ closeDiscList(); return; }
  const r=srcEl.getBoundingClientRect();
  if(r.bottom<0 || r.top>window.innerHeight){ closeDiscList(); return; }
  positionDiscList(list, srcEl);
}
window.addEventListener('scroll', ()=>{
  if(!_discOpenId || _discScrollTicking) return;
  _discScrollTicking=true;
  requestAnimationFrame(_discRepositionOnScroll);
}, true);
// ⚠️ 曾是「一有 resize 就 closeDiscList」——冷启动时 App 窗口尺寸会抖动几帧，抖动 resize
// 会误杀刚点开的浮层 → 表现为「首次点 CNA 没反应、第二次才行」（按排除法：单点一下不做别的操作，
// 能关掉浮层的只剩这个 resize 兜底）。改为跟随来源卡重定位（与滚动一致，rAF 节流），
// 仅当来源卡真滚出视口才由 _discRepositionOnScroll 收起。
let _discResizeTicking=false;
window.addEventListener('resize', ()=>{

/* 应用内确认框：返回 Promise<bool>。替代原生 confirm()（去 pywebview 火箭图标）。
   opts: {title, msg, ok, kicker}。取消/✕外点/Esc 都 resolve(false)。 */
function showConfirm({title, msg, ok='删除', kicker='删除确认'}={}){
  const wrap=$('#cfmWrap');
  $('#cfmKicker').textContent=kicker;
  $('#cfmTitle').textContent=title||'';
  $('#cfmMsg').textContent=msg||'';
  $('#cfmOk').textContent=ok;
  return new Promise(resolve=>{
    let done=false;
    const finish=(v)=>{ if(done) return; done=true;
      wrap.classList.remove('show');
      $('#cfmOk').removeEventListener('click',onOk);
      $('#cfmCancel').removeEventListener('click',onCancel);
      wrap.removeEventListener('click',onBackdrop);
      document.removeEventListener('keydown',onKey);
      resolve(v);
    };
    const onOk=()=>finish(true), onCancel=()=>finish(false);
    const onBackdrop=(e)=>{ if(e.target===wrap) finish(false); };
    const onKey=(e)=>{ if(e.key==='Escape') finish(false); };
    $('#cfmOk').addEventListener('click',onOk);
    $('#cfmCancel').addEventListener('click',onCancel);
    wrap.addEventListener('click',onBackdrop);
    document.addEventListener('keydown',onKey);
    wrap.classList.add('show');
    $('#cfmCancel').focus();
  });
}

/* ============================================================
   书模式 — 全部逻辑
   ============================================================ */

/* ----- 书态全局变量 ----- */
let bookMode=false, bookToc=[], bookIdx=0, bookCount=0, bookTitle='';
let _pageIdx=0, _pageTotal=1;
let _pageW=0, _pageGap=48;   // dynamically computed
let _restorePage=0;           // 从存档恢复时设为目标页码，_initPager 消费后清零

/* ----- 书签数据层（书模式）-----
   锚定绝不存页码：只存 {ch, ord}；页码只在跳转当刻用几何现算。
   _bookmarks 镜像后端存档字段，随 scheduleSave() 一起写盘。 */
let _bookmarks=[];
function _bkId(){ return 'bk_'+Math.random().toString(36).slice(2,10)+Date.now().toString(36); }
function _bkFind(ch,ord){ return _bookmarks.find(b=>b.ch===ch && b.ord===ord); }
function _bkRemoveByRef(bk){
  const i=_bookmarks.indexOf(bk); if(i<0) return;
  _bookmarks.splice(i,1);
  scheduleSave();
}
function _bkDelete(bk){
  _bkRemoveByRef(bk);
  _renderBkLayer();
  _renderBkGrid();
}

/* 正文块列表（与 _soup_to_blocks 产物一致：p,h1,h2,h3,li,blockquote 叶子块） */
function _bkBlocks(){
  const inner=document.getElementById('readingInner'); if(!inner) return [];
  return [...inner.querySelectorAll('p,h1,h2,h3,li,blockquote')];
}

/* ----- 色块高亮数据层（书模式）-----
   文章模式：.hl span 随 doSave() 的 innerHTML 快照天然持久，零后端改动（同 .phrase/.bookmark）。
   书模式：章节每次从 article_html 重渲，必须走锚点 record：
   {id, ch, blockOrd, start, end, color, kind:'span'|'para'}——start/end 是在
   blocks[blockOrd]（=_bkBlocks()[blockOrd]）textContent 里的字符偏移（含 .sent/.w 内的文字，
   按文档序遍历所有后代文本节点累加）。_highlights 镜像后端 highlights 字段，随
   scheduleSave() 一起写盘；renderBook 装载、每次渲完章节后 _applyHighlightsForChapter() 重应用。 */
let _highlights=[];

/* 把 (textNode, offset) 换算成"该 textNode 所在块 blockOrd + 块内字符偏移"。
   找不到所属块（例如落在块外）返回 null。 */
function _hlPointToBlockOffset(node, offset){
  const blocks=_bkBlocks();
  let el=node.nodeType===3?node.parentElement:node;
  let block=el && el.closest ? el.closest('p,h1,h2,h3,li,blockquote') : null;
  if(!block) return null;
  const blockOrd=blocks.indexOf(block);
  if(blockOrd<0) return null;
  // 用 Range 从块内容开头量到边界点，取跨过的文本长度 = 块内字符偏移。
  // 必须这样而不是"只匹配文本节点"——真实正文每个词都是 <span class="w">，
  // liftRangeToWords 会把选区起止吸附到 .w / mark.vocab 的**元素边界**（此时
  // node 是父元素、offset 是子节点序号，不是文本节点）；旧实现只认文本节点，
  // 一遇词边界就返回 null → 书模式高亮锚点全丢、换章/重开不复现（canned 用纯
  // 文本无 .w 故没暴露）。Range.toString().length 对元素/文本边界都成立，
  // 与 _hlOffsetToPoint 的逐文本节点累加口径一致。
  const r=document.createRange();
  r.selectNodeContents(block);
  try{ r.setEnd(node, offset); }catch(_){ return null; }
  return { blockOrd, offset: r.toString().length };
}
// 划选包裹前，先把 Range 的起止换算成字符偏移锚点（包裹后 DOM 结构变了就没法再算）
function _hlComputeAnchor(range){
  const sp=_hlPointToBlockOffset(range.startContainer, range.startOffset);
  const ep=_hlPointToBlockOffset(range.endContainer, range.endOffset);
  if(!sp || !ep || sp.blockOrd!==ep.blockOrd) return null;   // 跨块选区本批不支持锚定
  return { blockOrd: sp.blockOrd, start: Math.min(sp.offset,ep.offset), end: Math.max(sp.offset,ep.offset) };
}
// 把块内字符偏移换算回 (textNode, offset)，用于把 record 映射回一个可包裹的 Range
function _hlOffsetToPoint(block, charOffset){
  const walker=document.createTreeWalker(block, NodeFilter.SHOW_TEXT, null);
  let acc=0, tn, last=null;
  while((tn=walker.nextNode())){
    last=tn;
    const len=tn.data.length;
    if(charOffset<=acc+len) return { node:tn, offset:Math.max(0,charOffset-acc) };
    acc+=len;
  }
  return last ? { node:last, offset:last.data.length } : null;   // 越界兜底到最后一个文本节点末尾
}
/* 章节渲完（生词高亮已在 DOM 里）后，按 _highlights 锚点重新包裹当前章的色块高亮。
   整段色卡（kind:'para'）不用包 Range，直接给 block 加 .hl.para class + 背景。 */
function _applyHighlightsForChapter(){
  const inner=document.getElementById('readingInner'); if(!inner) return;
  const blocks=_bkBlocks();
  const recs=_highlights.filter(h=>h.ch===bookIdx);
  recs.forEach(rec=>{
    const block=blocks[rec.blockOrd]; if(!block) return;
    if(rec.kind==='para'){ _applyParaCard(block, rec.color, rec.id); return; }
    const sp=_hlOffsetToPoint(block, rec.start);
    const ep=_hlOffsetToPoint(block, rec.end);
    if(!sp || !ep) return;
    try{
      const range=document.createRange();
      range.setStart(sp.node, sp.offset);
      range.setEnd(ep.node, ep.offset);
      const span=wrapHighlight(range, rec.color, 'span');
      if(span){
        span.dataset.hlId=rec.id;   // 用 record 里的 id 覆盖新生成的，保持稳定引用
        if(rec.group) span.dataset.group=rec.group;   // 保证换章重渲后同组仍能一起改色/移除
      }
    }catch(_){}
  });
}

/* ----- .phrase（讲解带/收藏带）数据层（书模式，照抄 _highlights 那一整套）-----
   文章模式：.phrase 随 doSave() 的 innerHTML 快照天然持久，零改动。
   书模式：章节每次从 article_html 重渲，.phrase 不像 .hl 走 innerHTML 快照，必须走锚点
   record：{id, ch, blockOrd, start, end, text, sentence, pid, ex}——start/end 口径与
   _highlights 完全一致（同一套 _hlPointToBlockOffset/_hlOffsetToPoint）。ex 是该 pid 组
   共享的 data-ex JSON 字符串（讲解 + 追问历史），换章重渲后要把它还原回 dataset.ex，
   追问历史才能跟着复原。同一 pid 跨块会有多条 record（各自 blockOrd 不同），共享同一个
   ex——同步方式与 DOM 里的 _syncPhraseEx 对应。 */
let _phrases=[];
// 记录一个刚包好的 .phrase span 的锚点（在 wrapPhrase 系调用之后调用，此时 DOM 已稳定）
function _recordPhraseAnchor(span, anchor){
  if(!bookMode || !anchor) return;
  _phrases.push({
    id:'ph'+Date.now()+'_'+(++_hlSeq), ch:bookIdx, blockOrd:anchor.blockOrd,
    start:anchor.start, end:anchor.end,
    text:span.dataset.phrase||'', sentence:span.dataset.sentence||'',
    pid:span.dataset.pid||'', ex:span.dataset.ex||'{}',
  });
}
// dataset.ex 有更新（讲解到手/追问完成）时，把同 pid 的书模式 record 也一起刷新，
// 保证换章重渲后 mountExplanation 能读到最新的追问历史。
function _syncPhraseAnchorEx(pid, ex){
  if(!bookMode || !pid) return;
  _phrases.forEach(p=>{ if(p.pid===pid) p.ex=ex; });
}
/* 章节渲完（生词/色块高亮已在 DOM 里）后，按 _phrases 锚点重新包裹当前章的 .phrase 带，
   并把 data-ex 还原，讲解/追问历史跟着复原。照抄 _applyHighlightsForChapter 的口径。 */
function _applyPhrasesForChapter(){
  const inner=document.getElementById('readingInner'); if(!inner) return;
  const blocks=_bkBlocks();
  const recs=_phrases.filter(p=>p.ch===bookIdx);
  recs.forEach(rec=>{
    const block=blocks[rec.blockOrd]; if(!block) return;
    const sp=_hlOffsetToPoint(block, rec.start);
    const ep=_hlOffsetToPoint(block, rec.end);
    if(!sp || !ep) return;
    try{
      const range=document.createRange();
      range.setStart(sp.node, sp.offset);
      range.setEnd(ep.node, ep.offset);
      if((range.toString()||'').trim()==='') return;
      const span=wrapPhrase(range, rec.text, rec.sentence);
      if(span){
        span.dataset.pid=rec.pid||span.dataset.pid;
        span.dataset.ex=rec.ex||'{}';
      }
    }catch(_){}
  });
}
/* fragment 感知几何：块跨列时 getBoundingClientRect() 返回联合矩形（横跨两列、top 取到
   后一列顶部），画线必错位。改用 getClientRects()：ord 指向块顶部时取阅读序第一个 fragment，
   ord==块总数（章末）时取最后一个块的最后一个 fragment。返回 viewport 坐标系的 rect（与
   getBoundingClientRect 同坐标系，调用方按需再减 vpRect 转成层内坐标）。 */
function _bkFragRect(el, wantLast){
  if(!el) return null;
  const rects=el.getClientRects();
  if(!rects || !rects.length) return el.getBoundingClientRect();
  return wantLast ? rects[rects.length-1] : rects[0];
}
/* 与 _pageOfElement 同一套换算（viewport rect → inner 布局坐标 → 页码），但可选首/末 fragment。
   跨列块的两个 fragment 可能分属不同页，书签相关的"这条线该画在哪一页"一律走这个函数
   （而不是拿整块 offsetLeft 去算——那样跨列时会落到某个 fragment 都不在的错误页）。 */
function _bkFragPage(el, wantLast){
  const inner=document.getElementById('readingInner');
  if(!inner || !_pageW) return 0;
  const r=_bkFragRect(el, wantLast);
  if(!r) return 0;
  const ir=inner.getBoundingClientRect();
  const absX=(r.left-ir.left)+inner.scrollLeft;
  return Math.max(0, Math.min(_pageTotal-1, Math.floor(absX/_pageW)));
}
/* 采集放置当刻同页可见块的快照（≤10块，供缩略图离线渲染），并记录 frac（线在该页纵向 0..1 的大致位置） */
function _bkSnapshot(blocks, ord, page, lineTopInPage){
  // 「同页」判定要按 fragment 而不是整块 offsetLeft——块跨列时第一/最后 fragment 可能
  // 分属不同页，只要有一个 fragment 落在目标页就该收进快照（否则跨列块要么被漏收、
  // 要么被错误地整块归到它并不在的那一页，缩略图内容会跟真实页面对不上）。
  const same=blocks.filter(b=>_bkFragPage(b,false)===page || _bkFragPage(b,true)===page).slice(0,10);
  const snap=same.map(b=>({ t:(b.tagName||'p').toLowerCase(), x:(b.textContent||'').trim().slice(0,160) }));
  const inner=document.getElementById('readingInner');
  const vp=document.getElementById('pagerViewport');
  let frac=0.5;
  if(inner && vp){
    const vpH=vp.clientHeight||1;
    frac=Math.max(0,Math.min(1, lineTopInPage/vpH));
  }
  return { snap, frac };
}
function _bkExcerpt(blocks, ord){
  const anchor=blocks[Math.min(ord, blocks.length-1)];
  const t=(anchor?anchor.textContent:'').trim().replace(/\s+/g,' ');
  return t.slice(0,60);
}

/* ----- 放置精度重做：fragment 级 + 列（=页，本设计一列即一屏）感知命中 -----
   旧实现用 getBoundingClientRect() 联合矩形筛"同列候选块"，跨列块会同时命中多列、
   Y 距离也被联合矩形的顶/底带偏；且 X 不落任何块的兜底是"退回全章所有块找最近"，
   点列间距/页边空白时会误配到别的页上的块，线画错位置。这里重做为：
   1) 只枚举「真段落边界」——块的第一个 fragment 顶部（ord=blockIdx,side:'b'）、
      块的最后一个 fragment 底部（ord=blockIdx+1,side:'a'）；块中段的续接 fragment
      不是段落边界，不收录。
   2) 列命中：edge 所在 fragment 的 [left,right] 包住点击 x 才算"同列候选"；
      一个都不中 → 找距点击 x 最近的 fragment 左右边界，≤48px 才吸附进那一列；
      再不中 = 页边距/列间距点击，交给调用方判定为"忽略"。
   3) 同列候选里取 Y 距离最近的边界；若同列一个有效边界都没有（整列都是某长段中段），
      退而在全书候选里找 Y 距离最近的（书内跨章不会发生，全书=全章边界表）。 */
function _bkBoundaries(blocks, vpRect){
  const list=[];
  blocks.forEach((b,i)=>{
    const rects=[...b.getClientRects()];
    if(!rects.length) return;
    const topFrag=rects[0], botFrag=rects[rects.length-1];
    // 只收当前视口内可见的 fragment——多列布局下，一个块可能跨好几页，
    // 不可见页上的 fragment 若混进候选，X 命中检测会把"隔壁页同一横坐标区间"
    // 误判成本页的列，导致列外远处点击也能命中（原样跨列 bug 的变体）。
    if(!vpRect || _bkRectVisible(topFrag, vpRect)) list.push({ ord:i, side:'b', rect:topFrag });
    if(!vpRect || _bkRectVisible(botFrag, vpRect)) list.push({ ord:i+1, side:'a', rect:botFrag });
  });
  return list;
}
/* fragment 是否与当前视口有纵向交集（横向也基本落在视口内）——用来把"隔壁页/隔壁列"
   的 fragment 从候选边界表里滤掉，只留读者眼前这一页真实可点的段落边界。 */
function _bkRectVisible(r, vpRect){
  if(!r) return false;
  return r.bottom>=vpRect.top-2 && r.top<=vpRect.bottom+2 &&
         r.right>=vpRect.left-2 && r.left<=vpRect.right+2;
}
