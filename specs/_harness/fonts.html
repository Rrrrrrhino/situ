<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>四土 · 英文字体候选对比</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,600;1,7..72,400&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;1,6..72,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=Vollkorn:ital,wght@0,400;0,600;1,400&family=Bitter:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f2e8; --paper:#fffdf7; --fg:#34302a; --muted:#a89c86; --border:#e9e0cd;
  --accent:#9c7a3e; --accent-soft:rgba(156,122,62,.13);
  --vc:#45487e; --cur:rgba(69,72,126,.13);
  --article:#322d25;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--fg);
  font:15px/1.6 -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
  padding:34px 30px 60px}
.head{max-width:1280px;margin:0 auto 26px}
.head h1{font:600 22px/1.3 'Spectral',Georgia,serif;letter-spacing:.04em;margin:0 0 6px;color:var(--fg)}
.head p{margin:0;font-size:13.5px;color:var(--muted);line-height:1.7}
.grid{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:22px}
.card{background:var(--paper);border:1px solid var(--border);border-radius:16px;
  padding:24px 28px 26px;box-shadow:0 1px 3px rgba(70,50,20,.05)}
.card.cur{border-color:var(--accent);box-shadow:0 0 0 1.5px var(--accent-soft),0 1px 3px rgba(70,50,20,.05)}
.tag{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;
  padding-bottom:12px;border-bottom:1px dashed var(--border)}
.tag .n{font:600 16px/1 -apple-system,sans-serif;color:var(--accent);letter-spacing:.02em}
.tag .meta{font-size:11.5px;color:var(--muted)}
.tag .cur-badge{margin-left:auto;font-size:10.5px;color:#fff;background:var(--accent);
  border-radius:5px;padding:2px 8px;letter-spacing:.04em}
.sample{color:var(--article)}
.sample h2{font-size:1.28em;font-weight:600;line-height:1.36;margin:0 0 .5em;color:var(--fg)}
.sample p{margin:0 0 .85em;font-size:18px;line-height:1.85}
.sample p:last-child{margin-bottom:0}
mark.vocab{background:none;color:var(--vc);font-weight:600;font-style:normal;
  border-bottom:2px solid var(--cur);padding-bottom:1px}
.cur-now{font-variant:small-caps}

/* per-font families applied to .sample */
.f-spectral .sample{font-family:'Spectral',Georgia,serif}
.f-literata .sample{font-family:'Literata',Georgia,serif}
.f-newsreader .sample{font-family:'Newsreader',Georgia,serif}
.f-source .sample{font-family:'Source Serif 4',Georgia,serif}
.f-vollkorn .sample{font-family:'Vollkorn',Georgia,serif}
.f-bitter .sample{font-family:'Bitter',Georgia,serif}
</style>
</head>
<body>
<div class="head">
  <h1>四土 · 英文正文字体候选</h1>
  <p>同一段真实英文 · 同一套四土配色（暖米底／墨金强调／靛蓝生词）· 同字号 18px／行距 1.85。当前正文是 Spectral（左上，描金边框）。挑一个告诉我，我替你换上。</p>
</div>
<div class="grid">
  <!-- template duplicated per font; content identical so only the typeface differs -->
</div>

<template id="tpl">
  <div class="card">
    <div class="tag"><span class="n"></span><span class="meta"></span></div>
    <div class="sample">
      <h2>The Quiet Craft of Reading Well</h2>
      <p>To read with attention is a quiet, <mark class="vocab">deliberate</mark> craft. A good page does not shout; it invites the eye to move along the line and rest at the turn, the way a walker pauses at the crest of a hill to take in the valley below.</p>
      <p>The typeface matters more than we admit. A face built for the screen keeps its <mark class="vocab">composure</mark> at small sizes, holding each letter distinct so the mind never stumbles — and an hour of reading leaves you refreshed rather than <mark class="vocab">fatigued</mark>.</p>
    </div>
  </div>
</template>

<script>
const FONTS=[
  {cls:'f-spectral',  n:'Spectral（当前）',     meta:'Production Type · 为屏幕做的衬线，偏瘦偏冷', cur:true},
  {cls:'f-literata',  n:'Literata（我的首选）', meta:'Google 电子书阅读器定制 · 温润耐读，配米底极搭'},
  {cls:'f-newsreader',n:'Newsreader',          meta:'杂志／社论气质 · 斜体尤其漂亮'},
  {cls:'f-source',    n:'Source Serif 4',      meta:'人文主义 · 现代干净、可读性极高'},
  {cls:'f-vollkorn',  n:'Vollkorn',            meta:'最暖、最“书本味”的老式衬线 · 沉稳不廉价'},
  {cls:'f-bitter',    n:'Bitter',              meta:'板状衬线 · 高对比、小字也清晰'},
];
const grid=document.querySelector('.grid'), tpl=document.querySelector('#tpl');
for(const f of FONTS){
  const node=tpl.content.cloneNode(true);
  const card=node.querySelector('.card');
  card.classList.add(f.cls);
  if(f.cur) card.classList.add('cur');
  card.querySelector('.n').textContent=f.n;
  card.querySelector('.meta').textContent=f.meta;
  if(f.cur){ const b=document.createElement('span'); b.className='cur-badge'; b.textContent='现状'; card.querySelector('.tag').appendChild(b); }
  grid.appendChild(node);
}
</script>
</body>
</html>
