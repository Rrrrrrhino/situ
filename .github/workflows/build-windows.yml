name: Build Windows app

# 手动触发：在 GitHub 仓库 → Actions → 选这个 workflow → Run workflow
# 也会在打 tag（v*）时自动跑。
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"          # 让 Windows 正确处理「三土」中文文件名
      PYTHONIOENCODING: "utf-8"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # 3.12 在 Windows 上 spaCy/thinc/blis 轮子最全

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pythonnet        # pywebview 在 Windows 用 Edge WebView2 后端需要
          pip install pyinstaller pillow zipp
          python -m spacy download en_core_web_sm

      - name: Smoke test (frozen-independent import check)
        run: python -c "import spacy, trafilatura, webview, reader_core.vocab; print('imports OK')"

      - name: Build with PyInstaller
        run: pyinstaller packaging/santu_win.spec --noconfirm --distpath packaging/dist --workpath packaging/build

      - name: Zip the app
        shell: pwsh
        run: |
          Compress-Archive -Path "packaging/dist/三土" -DestinationPath "三土-win.zip" -Force
          Get-Item "三土-win.zip" | Format-List Name,Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 三土-win
          path: 三土-win.zip
          retention-days: 30
